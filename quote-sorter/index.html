<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quote Sorter — Different Lives</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,600;0,700;1,400&display=swap');

:root {
  --bg:      #0b0c10;
  --surface: #13151a;
  --border:  rgba(255,255,255,0.08);
  --text:    #eef0f4;
  --dim:     rgba(238,240,244,0.45);
  --gold:    #f5c842;
  --flash:   #00e5b0;
  --r1: #3b7dd8;
  --r2: #c0392b;
  --r3: #d88b3b;
  --rc: var(--r1);
}

*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{
  background:var(--bg); color:var(--text);
  font-family:'DM Sans',sans-serif;
  display:flex; flex-direction:column;
}
body::before{
  content:''; position:fixed; inset:0; pointer-events:none; z-index:1000;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:0.4;
}

/* ── HEADER ── */
header{
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:8px 16px; display:flex; align-items:center;
  justify-content:space-between; flex-shrink:0; gap:12px;
}
.logo{ font-family:'Bebas Neue',sans-serif; font-size:1.4rem; letter-spacing:0.08em; color:var(--gold); }
.hbtns{ display:flex; gap:8px; }
.hbtn{
  padding:5px 14px; border-radius:5px; border:1px solid var(--border);
  background:rgba(255,255,255,0.06); color:var(--text);
  font-family:'DM Sans',sans-serif; font-size:0.78rem; font-weight:600;
  cursor:pointer; transition:all 0.15s;
}
.hbtn:hover{ background:rgba(255,255,255,0.14); }

/* ── SETUP ── */
#setup{
  flex:1; overflow-y:auto; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:24px; padding:24px 16px;
}
.setup-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(2rem,6vw,3.5rem);
  letter-spacing:0.06em; color:var(--gold);
  text-align:center; line-height:1;
}
.setup-sub{ color:var(--dim); font-size:0.88rem; text-align:center; margin-top:4px; }

.teams-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; width:100%; max-width:560px; }
.team-card{
  display:flex; align-items:center; gap:8px;
  background:rgba(255,255,255,0.04); border:1px solid var(--border);
  border-radius:10px; padding:10px 12px; transition:border-color 0.2s;
}
.team-card.on{ border-color:var(--tc); }
.team-dot{ width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.team-card input{
  flex:1; background:none; border:none; color:var(--text);
  font-family:'DM Sans',sans-serif; font-size:0.82rem; font-weight:600;
}
.team-tog{
  padding:2px 8px; border-radius:4px; border:1px solid var(--border);
  background:transparent; color:var(--dim); font-size:0.75rem;
  cursor:pointer; transition:all 0.15s; white-space:nowrap;
}
.team-tog.on{ background:var(--tc); color:#000; border-color:var(--tc); }

.round-cards{ display:flex; gap:12px; flex-wrap:wrap; justify-content:center; max-width:680px; }
.round-card{
  flex:1; min-width:180px; max-width:220px;
  background:rgba(255,255,255,0.04); border:2px solid var(--border);
  border-radius:12px; padding:16px 14px; cursor:pointer;
  transition:all 0.2s; text-align:center;
}
.round-card:hover{ transform:translateY(-2px); }
.round-card.selected{ border-color:var(--rc); }
.rc-emoji{ font-size:1.8rem; margin-bottom:6px; }
.rc-name{ font-size:0.82rem; font-weight:800; margin-bottom:4px; }
.rc-desc{ font-size:0.72rem; color:var(--dim); line-height:1.4; }

.start-btn{
  padding:14px 48px; border-radius:50px;
  background:var(--gold); color:#000;
  font-family:'DM Sans',sans-serif; font-size:1rem;
  font-weight:800; border:none; cursor:pointer;
  transition:background 0.15s;
}
.start-btn:hover{ background:#e6b820; }

/* ── GAME ── */
#game{ flex:1; display:none; flex-direction:column; overflow:hidden; }

/* Scorebar */
#scorebar{
  background:rgba(0,0,0,0.4); border-bottom:1px solid var(--border);
  padding:6px 16px; display:flex; align-items:center; gap:12px;
  flex-shrink:0; overflow-x:auto;
}
.score-team{
  display:flex; align-items:center; gap:6px;
  background:rgba(255,255,255,0.05); border-radius:6px;
  padding:4px 10px; border:1px solid var(--border);
  white-space:nowrap; transition:all 0.3s;
}
.score-team.active{ border-color:var(--tc); background:rgba(255,255,255,0.1); }
.score-dot{ width:8px; height:8px; border-radius:50%; }
.score-name{ font-size:0.78rem; font-weight:700; }
.score-pts{ font-size:0.78rem; color:var(--gold); font-weight:800; margin-left:4px; }
#rbadge{
  margin-left:auto; font-family:'Bebas Neue',sans-serif;
  font-size:0.95rem; letter-spacing:0.08em;
  padding:3px 10px; border-radius:4px; color:#000; flex-shrink:0;
}
#rname{ font-size:0.8rem; font-weight:700; color:var(--dim); white-space:nowrap; }

/* Category strip */
#catstrip{
  display:flex; gap:8px; padding:8px 16px;
  flex-wrap:wrap; flex-shrink:0;
  border-bottom:1px solid var(--border);
}
.catpill{
  padding:4px 14px; border-radius:20px;
  border:2px solid var(--cc); color:var(--cc);
  font-size:0.78rem; font-weight:700; letter-spacing:0.04em;
  transition:all 0.3s;
}
.catpill.highlight{
  background:var(--cc); color:#000;
  transform:scale(1.08);
}

/* ── FLIP CARD AREA ── */
#cardarea{
  flex:1; display:flex; align-items:center; justify-content:center;
  padding:20px; perspective:1200px;
}

.flip-card{
  width:min(680px, 90vw); height:min(300px, 40vh);
  cursor:pointer;
  transform-style:preserve-3d;
  transition:transform 0.6s cubic-bezier(0.4,0,0.2,1);
  position:relative;
}
.flip-card.flipped{ transform:rotateY(180deg); }

.flip-front, .flip-back{
  position:absolute; inset:0;
  backface-visibility:hidden;
  border-radius:20px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:32px 36px; text-align:center;
  border:2px solid var(--border);
}
.flip-front{
  background:var(--surface);
  border-color:var(--rc);
  box-shadow:0 0 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);
}
.flip-front-label{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(1rem,3vw,1.6rem);
  letter-spacing:0.1em; color:var(--rc);
  margin-bottom:10px;
}
.flip-front-icon{ font-size:clamp(2rem,6vw,4rem); margin-bottom:8px; }
.flip-front-hint{ font-size:0.78rem; color:var(--dim); }

.flip-back{
  background:linear-gradient(135deg, #1a1d25 0%, #0f1116 100%);
  border-color:var(--rc);
  transform:rotateY(180deg);
  box-shadow:0 0 60px rgba(0,0,0,0.6);
}
.quote-text{
  font-size:clamp(0.9rem,2.2vw,1.25rem);
  font-style:italic; line-height:1.6;
  color:var(--text); margin-bottom:16px;
  quotes:"\201C""\201D";
}
.quote-text::before{ content:open-quote; color:var(--rc); font-size:1.4em; line-height:0; vertical-align:-0.3em; margin-right:2px; }
.quote-text::after{ content:close-quote; color:var(--rc); font-size:1.4em; line-height:0; vertical-align:-0.3em; margin-left:2px; }
.quote-source{ font-size:0.75rem; color:var(--dim); letter-spacing:0.06em; text-transform:uppercase; }

/* answer reveal */
.answer-badge{
  margin-top:14px; padding:6px 20px;
  border-radius:20px; background:var(--cc,var(--rc));
  color:#000; font-weight:800; font-size:0.88rem;
  opacity:0; transition:opacity 0.4s 0.2s;
  display:inline-block;
}
.answer-badge.show{ opacity:1; }

/* ── CONTROLS ── */
#controls{
  background:rgba(0,0,0,0.4); border-top:1px solid var(--border);
  padding:10px 16px; display:flex; align-items:center;
  gap:8px; flex-shrink:0; flex-wrap:wrap;
}
.ctrl-btn{
  padding:7px 18px; border-radius:6px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.06); color:var(--text);
  font-family:'DM Sans',sans-serif; font-size:0.82rem;
  font-weight:700; cursor:pointer; transition:all 0.15s;
}
.ctrl-btn:hover{ background:rgba(255,255,255,0.14); }
.ctrl-btn.gold{ background:var(--gold); color:#000; border-color:var(--gold); }
.ctrl-btn.gold:hover{ background:#e6b820; }
.ctrl-sep{ width:1px; height:28px; background:var(--border); }
.team-award{
  display:flex; align-items:center; gap:5px;
  padding:5px 12px; border-radius:6px;
  border:1px solid var(--border); background:transparent;
  color:var(--text); font-family:'DM Sans',sans-serif;
  font-size:0.78rem; font-weight:700; cursor:pointer;
  transition:all 0.15s;
}
.team-award:hover{ background:rgba(255,255,255,0.07); }
.award-dot{ width:8px; height:8px; border-radius:50%; flex-shrink:0; }
#progress{ margin-left:auto; font-size:0.75rem; color:var(--dim); white-space:nowrap; }

/* ── ROUND INTRO OVERLAY ── */
.round-intro{
  position:fixed; inset:0; z-index:500;
  background:rgba(0,0,0,0.92);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:16px; padding:32px;
}
.ri-num{ font-size:0.75rem; font-weight:700; letter-spacing:0.14em; color:var(--dim); text-transform:uppercase; }
.ri-title{ font-family:'Bebas Neue',sans-serif; font-size:clamp(2.2rem,7vw,4rem); letter-spacing:0.06em; text-align:center; }
.ri-desc{ font-size:0.9rem; color:var(--dim); text-align:center; max-width:420px; line-height:1.5; }
.ri-cats{ display:flex; gap:8px; flex-wrap:wrap; justify-content:center; max-width:500px; }
.ri-cat{
  padding:4px 14px; border-radius:20px; border:2px solid;
  font-size:0.78rem; font-weight:700;
}
.ri-btn{
  margin-top:8px; padding:12px 40px; border-radius:40px;
  background:var(--gold); color:#000; border:none;
  font-family:'DM Sans',sans-serif; font-size:1rem;
  font-weight:800; cursor:pointer;
}

/* ── FINAL OVERLAY ── */
.final-overlay{
  position:fixed; inset:0; z-index:600;
  background:rgba(0,0,0,0.94);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:16px; padding:32px;
}
.final-title{ font-family:'Bebas Neue',sans-serif; font-size:clamp(2.5rem,8vw,5rem); color:var(--gold); letter-spacing:0.06em; }
.final-rows{ display:flex; flex-direction:column; gap:8px; width:100%; max-width:380px; }
.final-row{
  display:flex; align-items:center; justify-content:space-between;
  background:rgba(255,255,255,0.05); border-radius:8px;
  padding:10px 16px; border:1px solid var(--border);
}
.final-row.top{ background:rgba(245,200,66,0.1); border-color:var(--gold); }
.fr-name{ font-weight:700; font-size:0.9rem; }
.fr-pts{ font-size:1.1rem; font-weight:800; color:var(--gold); }
.final-btn{
  margin-top:8px; padding:12px 36px; border-radius:40px;
  background:var(--gold); color:#000; border:none;
  font-family:'DM Sans',sans-serif; font-size:1rem;
  font-weight:800; cursor:pointer;
}
</style>
</head>
<body>

<header>
  <div class="logo">📖 Quote Sorter</div>
  <div class="hbtns">
    <button class="hbtn" onclick="document.documentElement.requestFullscreen?.()">⛶ Fullscreen</button>
    <button class="hbtn" onclick="window.location.href='../index.html'">⌂ Home</button>
  </div>
</header>

<!-- SETUP -->
<div id="setup">
  <div>
    <div class="setup-title">Quote Sorter</div>
    <div class="setup-sub">Different Lives · S9 Unit 8 · Flip the card — sort the quote!</div>
  </div>

  <div style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.14em;color:var(--flash);margin-bottom:-12px;">Teams</div>
  <div class="teams-grid" id="teamsGrid"></div>

  <div style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.14em;color:var(--flash);margin-bottom:-12px;">Choose rounds</div>
  <div class="round-cards" id="roundCards"></div>

  <button class="start-btn" onclick="startGame()">▶ Start Game</button>
</div>

<!-- GAME -->
<div id="game">
  <div id="scorebar">
    <div id="rbadge">R1</div>
    <div id="rname"></div>
  </div>
  <div id="catstrip"></div>
  <div id="cardarea">
    <div class="flip-card" id="flipCard" onclick="flipCard()">
      <div class="flip-front" id="flipFront">
        <div class="flip-front-icon">🃏</div>
        <div class="flip-front-label">TAP TO REVEAL</div>
        <div class="flip-front-hint">Teams — get ready to shout your answer!</div>
      </div>
      <div class="flip-back" id="flipBack">
        <div class="quote-text" id="quoteText"></div>
        <div class="quote-source" id="quoteSource"></div>
        <div class="answer-badge" id="answerBadge"></div>
      </div>
    </div>
  </div>
  <div id="controls">
    <button class="ctrl-btn" onclick="showAnswer()">👁 Reveal Answer</button>
    <button class="ctrl-btn gold" onclick="nextCard()">Next ▶</button>
    <div class="ctrl-sep"></div>
    <div id="teamAwards"></div>
    <div id="progress"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
//  ROUND DATA
// ══════════════════════════════════════════════════════════════
const ROUNDS = [
  {
    id: 'speaker',
    name: 'Who Said It?',
    emoji: '🎭',
    color: '#3b7dd8',
    desc: 'A quote flashes up from I Want to Fly — shout which character said or wrote it!',
    cats: ['Yinka', 'Mankwinji', 'Stage Direction', 'Playwright'],
    catColors: ['#3b7dd8', '#d84040', '#00e5b0', '#f5c842'],
    items: [
      { text: 'I want to fly like an eagle, fly high and far / Using my flamboyant wings and I will let / The winds blow me away.', source: 'I Want to Fly', cat: 'Yinka' },
      { text: 'No Mama I won\'t, this is my dream and it means so much to me.', source: 'I Want to Fly', cat: 'Yinka' },
      { text: 'I made it Mama, it\'s my passion.', source: 'I Want to Fly', cat: 'Yinka' },
      { text: 'My daughter how far can you go? The hunters have already laid a trap for you.', source: 'I Want to Fly', cat: 'Mankwinji' },
      { text: 'You are already destined to remain in this village and you shall plough back your fruits to this village not to any other.', source: 'I Want to Fly', cat: 'Mankwinji' },
      { text: 'How many times must I tell you to stop dreaming, haa?', source: 'I Want to Fly', cat: 'Mankwinji' },
      { text: 'Have you started preparing the evening meal, Yinka?', source: 'I Want to Fly', cat: 'Mankwinji' },
      { text: 'Yinka is on the stage, miming flying like a bird, using her arms.', source: 'I Want to Fly', cat: 'Stage Direction' },
      { text: 'Mankwinji grabs the miniature aeroplane and throws it to the far end of the stage.', source: 'I Want to Fly', cat: 'Stage Direction' },
      { text: 'Mankwinji breathes out loudly and paces up and down the room in confusion.', source: 'I Want to Fly', cat: 'Stage Direction' },
      { text: 'The story has two settings in juxtaposition, one represents the rich and the other the poor.', source: 'I Want to Fly', cat: 'Playwright' },
      { text: 'The poor area is depicted by a reed mat and a rolled up torn blanket.', source: 'I Want to Fly', cat: 'Playwright' },
      { text: 'The second area depicts a wealthier lifestyle — the painting on the canvas shows two quality chairs and a round table.', source: 'I Want to Fly', cat: 'Playwright' },
    ]
  },
  {
    id: 'technique',
    name: 'Spot the Technique',
    emoji: '🎤',
    color: '#c0392b',
    desc: 'A line from Emma Watson\'s speech flashes up — shout which persuasive technique it uses!',
    cats: ['Rhetorical Question', 'Direct Address', 'Emotive Language', 'Statistic', 'Metaphor / Image'],
    catColors: ['#c0392b', '#3b7dd8', '#9b59b6', '#00e5b0', '#d88b3b'],
    items: [
      { text: 'If not me, who? If not now, when?', source: 'He for She — Emma Watson', cat: 'Rhetorical Question' },
      { text: 'How can we affect change in the world when only half of it is invited or feels welcome to participate in the conversation?', source: 'He for She — Emma Watson', cat: 'Rhetorical Question' },
      { text: 'I am inviting you to step forward, to be seen, to speak up, to be the \'he\' for \'she\'.', source: 'He for She — Emma Watson', cat: 'Direct Address' },
      { text: 'Men — I would like to take this opportunity to extend your formal invitation. Gender equality is your issue too.', source: 'He for She — Emma Watson', cat: 'Direct Address' },
      { text: 'I\'ve seen young men suffering from mental illness unable to ask for help for fear it would make them look less \'macho\'.', source: 'He for She — Emma Watson', cat: 'Emotive Language' },
      { text: 'Both men and women should feel free to be sensitive. Both men and women should feel free to be strong.', source: 'He for She — Emma Watson', cat: 'Emotive Language' },
      { text: 'It won\'t be until 2086 before all rural African girls will be able to receive a secondary education.', source: 'He for She — Emma Watson', cat: 'Statistic' },
      { text: 'If we do nothing it will take 75 years, or for me to be nearly a hundred before women can expect to be paid the same as men.', source: 'He for She — Emma Watson', cat: 'Statistic' },
      { text: 'We don\'t often talk about men being imprisoned by gender stereotypes, but I can see that they are.', source: 'He for She — Emma Watson', cat: 'Metaphor / Image' },
      { text: 'I want men to take up this mantle so that their daughters, sisters and mothers can be free from prejudice.', source: 'He for She — Emma Watson', cat: 'Metaphor / Image' },
      { text: 'If we stop defining each other by what we are not and start defining ourselves by what we are — we can all be freer.', source: 'He for She — Emma Watson', cat: 'Emotive Language' },
    ]
  },
  {
    id: 'text',
    name: 'Which Text?',
    emoji: '📚',
    color: '#d88b3b',
    desc: 'A quote or description flashes up — shout which text from the unit it comes from!',
    cats: ['I Want to Fly', 'Just Crash Through It', 'He for She', 'Binti'],
    catColors: ['#3b7dd8', '#9b59b6', '#c0392b', '#00e5b0'],
    items: [
      { text: 'In spite of her background, Yinka wants a different life — she wants to be a pilot.', source: 'S9 Unit 8', cat: 'I Want to Fly' },
      { text: 'The set has two contrasting areas — one showing poverty through a reed mat, one showing wealth through quality chairs.', source: 'S9 Unit 8', cat: 'I Want to Fly' },
      { text: 'A wealthy, big man who loves fashion and riches. He is a hypocrite.', source: 'S9 Unit 8', cat: 'I Want to Fly' },
      { text: 'At 45, I am a happy wife, an adoring mum, a successful business-woman, an artist — constantly busy and totally content.', source: 'S9 Unit 8', cat: 'Just Crash Through It' },
      { text: 'I also have little legs which end above the knee but with feet, and from each shoulder I have two fingers.', source: 'S9 Unit 8', cat: 'Just Crash Through It' },
      { text: 'Just before Christmas we discovered I was pregnant. We were both ecstatic and petrified.', source: 'S9 Unit 8', cat: 'Just Crash Through It' },
      { text: 'Inevitably some kids would stare and ask James questions — I had a wonderful afternoon with 66 five-year-olds.', source: 'S9 Unit 8', cat: 'Just Crash Through It' },
      { text: 'Today we are launching a campaign called HeForShe. I am reaching out to you because I need your help.', source: 'S9 Unit 8', cat: 'He for She' },
      { text: 'There is no one country in the world where all women can expect to receive these rights.', source: 'S9 Unit 8', cat: 'He for She' },
      { text: 'If you believe in equality, I applaud you. Thank you.', source: 'S9 Unit 8', cat: 'He for She' },
      { text: 'My transporter was cheap, so even a droplet of moisture, or more likely a grain of sand, would cause it to short.', source: 'S9 Unit 8', cat: 'Binti' },
      { text: 'My nine siblings, all older than me except for my younger sister and brother, would never see this coming.', source: 'S9 Unit 8', cat: 'Binti' },
      { text: 'I was on the threshold now, between home and my future.', source: 'S9 Unit 8', cat: 'Binti' },
      { text: 'Your identity reads that you\'re a harmonizer, a masterful one who builds some of the finest astrolabes.', source: 'S9 Unit 8', cat: 'Binti' },
      { text: 'The ship was a magnificent piece of living technology, enhanced to grow three breathing chambers within their bodies.', source: 'S9 Unit 8', cat: 'Binti' },
    ]
  }
];

// ══════════════════════════════════════════════════════════════
//  TEAM CONFIG
// ══════════════════════════════════════════════════════════════
const TC = ['#00e5b0','#f5c842','#ff6b6b','#a78bfa','#38bdf8','#fb923c'];
const TNAMES = ['Team 1','Team 2','Team 3','Team 4','Team 5','Team 6'];
let teamCfg = TNAMES.map((n,i)=>({name:n,color:TC[i],on:i<3}));
let selectedRounds = [0,1,2];

function buildSetup(){
  const tg = document.getElementById('teamsGrid'); tg.innerHTML='';
  teamCfg.forEach((t,i)=>{
    const d=document.createElement('div');
    d.className='team-card'+(t.on?' on':'');
    d.style.setProperty('--tc',t.color);
    d.innerHTML=`<div class="team-dot" style="background:${t.color}"></div>
      <input type="text" value="${t.name}" onchange="teamCfg[${i}].name=this.value">
      <div class="team-tog${t.on?' on':''}" style="--tc:${t.color}" onclick="toggleTeam(${i})">${t.on?'✓':'+'}</div>`;
    tg.appendChild(d);
  });
  const rc = document.getElementById('roundCards'); rc.innerHTML='';
  ROUNDS.forEach((r,i)=>{
    const d=document.createElement('div');
    d.className='round-card'+(selectedRounds.includes(i)?' selected':'');
    d.style.setProperty('--rc',r.color);
    d.innerHTML=`<div class="rc-emoji">${r.emoji}</div>
      <div class="rc-name" style="color:${r.color}">${r.name}</div>
      <div class="rc-desc">${r.desc}</div>`;
    d.onclick=()=>{
      if(selectedRounds.includes(i)) selectedRounds=selectedRounds.filter(x=>x!==i);
      else selectedRounds.push(i);
      buildSetup();
    };
    rc.appendChild(d);
  });
}

function toggleTeam(i){
  const on=teamCfg.filter(t=>t.on);
  if(teamCfg[i].on&&on.length<=2) return;
  teamCfg[i].on=!teamCfg[i].on;
  buildSetup();
}

// ══════════════════════════════════════════════════════════════
//  GAME STATE
// ══════════════════════════════════════════════════════════════
let teams=[], rounds=[], roundIdx=0, itemIdx=0, scores={};
let cardFlipped=false, answerRevealed=false;

function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function startGame(){
  teams=teamCfg.filter(t=>t.on).map(t=>({...t}));
  if(teams.length<2){alert('Enable at least 2 teams.');return;}
  if(!selectedRounds.length){alert('Select at least one round.');return;}
  rounds=selectedRounds.map(i=>({...ROUNDS[i], items:shuffle([...ROUNDS[i].items])}));
  roundIdx=0; itemIdx=0;
  teams.forEach(t=>scores[t.name]=0);
  document.getElementById('setup').style.display='none';
  document.getElementById('game').style.display='flex';
  showRoundIntro();
}

function showSetup(){
  document.getElementById('game').style.display='none';
  document.querySelectorAll('.round-intro,.final-overlay').forEach(e=>e.remove());
  document.getElementById('setup').style.display='flex';
  buildSetup();
}

// ══════════════════════════════════════════════════════════════
//  ROUND INTRO
// ══════════════════════════════════════════════════════════════
function showRoundIntro(){
  const r=rounds[roundIdx];
  const el=document.createElement('div');
  el.className='round-intro';
  const catPills=r.cats.map((c,i)=>`<div class="ri-cat" style="border-color:${r.catColors[i]};color:${r.catColors[i]}">${c}</div>`).join('');
  el.innerHTML=`
    <div class="ri-num">ROUND ${roundIdx+1} OF ${rounds.length}</div>
    <div class="ri-title" style="color:${r.color}">${r.emoji} ${r.name}</div>
    <div class="ri-cats">${catPills}</div>
    <div class="ri-desc">${r.desc}</div>
    <button class="ri-btn" onclick="this.closest('.round-intro').remove(); renderRound();">Let's Go!</button>`;
  document.body.appendChild(el);
}

// ══════════════════════════════════════════════════════════════
//  RENDER ROUND
// ══════════════════════════════════════════════════════════════
function renderRound(){
  const r=rounds[roundIdx];
  document.getElementById('game').style.setProperty('--rc', r.color);
  document.getElementById('rbadge').textContent=`R${roundIdx+1}`;
  document.getElementById('rbadge').style.background=r.color;
  document.getElementById('rname').textContent=`${r.emoji} ${r.name}`;

  // Category strip
  const strip=document.getElementById('catstrip'); strip.innerHTML='';
  r.cats.forEach((c,i)=>{
    const p=document.createElement('div');
    p.className='catpill';
    p.id='cat-'+i;
    p.style.setProperty('--cc',r.catColors[i]);
    p.textContent=c;
    strip.appendChild(p);
  });

  renderScores();
  buildAwardButtons();
  loadCard();
}

// ══════════════════════════════════════════════════════════════
//  CARD
// ══════════════════════════════════════════════════════════════
function loadCard(){
  const r=rounds[roundIdx];
  const item=r.items[itemIdx];
  cardFlipped=false;
  answerRevealed=false;

  // Reset flip
  const card=document.getElementById('flipCard');
  card.classList.remove('flipped');

  // Front face
  document.getElementById('flipFront').querySelector('.flip-front-label').textContent='TAP TO REVEAL';
  document.getElementById('flipFront').querySelector('.flip-front-icon').textContent=r.emoji;

  // Back face
  document.getElementById('quoteText').textContent=item.text;
  document.getElementById('quoteSource').textContent=`— ${item.source}`;
  const badge=document.getElementById('answerBadge');
  badge.textContent=item.cat;
  badge.classList.remove('show');

  // Find colour for this cat
  const catIdx=r.cats.indexOf(item.cat);
  badge.style.setProperty('--cc', r.catColors[catIdx]||r.color);

  // Unhighlight all cat pills
  document.querySelectorAll('.catpill').forEach(p=>p.classList.remove('highlight'));

  updateProgress();
}

function flipCard(){
  if(cardFlipped) return;
  cardFlipped=true;
  document.getElementById('flipCard').classList.add('flipped');
}

function showAnswer(){
  if(!cardFlipped) flipCard();
  const r=rounds[roundIdx];
  const item=r.items[itemIdx];
  const badge=document.getElementById('answerBadge');
  badge.classList.add('show');
  answerRevealed=true;

  // Highlight matching cat pill
  const catIdx=r.cats.indexOf(item.cat);
  const pill=document.getElementById('cat-'+catIdx);
  if(pill) pill.classList.add('highlight');
}

function nextCard(){
  itemIdx++;
  if(itemIdx>=rounds[roundIdx].items.length){
    roundIdx++;
    if(roundIdx>=rounds.length){
      showFinal();
      return;
    }
    itemIdx=0;
    showRoundIntro();
    return;
  }
  loadCard();
}

function updateProgress(){
  const r=rounds[roundIdx];
  document.getElementById('progress').textContent=
    `Card ${itemIdx+1} / ${r.items.length}  ·  Round ${roundIdx+1} / ${rounds.length}`;
}

// ══════════════════════════════════════════════════════════════
//  SCORES
// ══════════════════════════════════════════════════════════════
function renderScores(){
  const sb=document.getElementById('scorebar');
  // Remove old score elements (keep badge and rname)
  sb.querySelectorAll('.score-team').forEach(e=>e.remove());
  teams.forEach(t=>{
    const d=document.createElement('div');
    d.className='score-team';
    d.id='score-'+t.name;
    d.style.setProperty('--tc',t.color);
    d.innerHTML=`<div class="score-dot" style="background:${t.color}"></div>
      <span class="score-name">${t.name}</span>
      <span class="score-pts" id="pts-${t.name}">${scores[t.name]}</span>`;
    sb.insertBefore(d, document.getElementById('rbadge'));
  });
}

function buildAwardButtons(){
  const ta=document.getElementById('teamAwards'); ta.innerHTML='';
  teams.forEach(t=>{
    const b=document.createElement('button');
    b.className='team-award';
    b.innerHTML=`<div class="award-dot" style="background:${t.color}"></div>+1 ${t.name}`;
    b.onclick=()=>awardPoint(t.name);
    ta.appendChild(b);
  });
}

function awardPoint(name){
  scores[name]=(scores[name]||0)+1;
  const el=document.getElementById('pts-'+name);
  if(el){ el.textContent=scores[name]; el.style.transform='scale(1.4)'; setTimeout(()=>el.style.transform='',300); }
}

// ══════════════════════════════════════════════════════════════
//  FINAL
// ══════════════════════════════════════════════════════════════
function showFinal(){
  const sorted=[...teams].sort((a,b)=>(scores[b.name]||0)-(scores[a.name]||0));
  const el=document.createElement('div');
  el.className='final-overlay';
  const rows=sorted.map((t,i)=>`
    <div class="final-row${i===0?' top':''}">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="width:10px;height:10px;border-radius:50%;background:${t.color}"></div>
        <span class="fr-name">${i===0?'🏆 ':''}${t.name}</span>
      </div>
      <span class="fr-pts">${scores[t.name]||0} pts</span>
    </div>`).join('');
  el.innerHTML=`
    <div class="final-title">Game Over!</div>
    <div class="final-rows">${rows}</div>
    <button class="final-btn" onclick="this.closest('.final-overlay').remove(); showSetup();">Play Again</button>`;
  document.body.appendChild(el);
}

// ── INIT ──────────────────────────────────────────────────────
buildSetup();
</script>
</body>
</html>
