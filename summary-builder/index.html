<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Summary Builder — IGCSE English</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Unbounded:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-dark: #0a0d14;
      --gold: #f0b429;
      --teal: #3ecfcf;
      --green: #4caf50;
      --red: #e53e3e;
      --text-light: #ffffff;
      --text-muted: #b0b8c1;
      --card-bg: #131a24;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-light);
      font-family: 'DM Sans', sans-serif;
      font-size: 18px;
      line-height: 1.6;
      min-height: 100vh;
    }

    h1, h2, h3 {
      font-family: 'Unbounded', sans-serif;
      font-weight: 900;
      letter-spacing: -0.02em;
    }

    h1 { font-size: 3rem; }
    h2 { font-size: 2.2rem; }
    h3 { font-size: 1.8rem; }

    .screen {
      display: none;
      min-height: 100vh;
      padding: 3rem;
      animation: fadeIn 0.4s ease-in-out;
    }

    .screen.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* ============ PICKER SCREEN ============ */
    .picker-container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .picker-header {
      text-align: center;
      margin-bottom: 4rem;
    }

    .picker-header h1 {
      color: var(--gold);
      margin-bottom: 0.5rem;
    }

    .picker-header p {
      font-size: 1.5rem;
      color: var(--text-muted);
    }

    .picker-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 2rem;
    }

    .passage-card {
      background: var(--card-bg);
      border: 3px solid transparent;
      border-radius: 12px;
      padding: 2rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .passage-card:hover {
      border-color: var(--gold);
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(240, 180, 41, 0.15);
    }

    .passage-card h3 {
      color: var(--gold);
      margin-bottom: 1rem;
    }

    .passage-card p {
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      font-size: 1.1rem;
    }

    .difficulty-badge {
      display: inline-block;
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      background: rgba(62, 207, 207, 0.2);
      color: var(--teal);
    }

    /* ============ INTRO SCREEN ============ */
    .intro-container {
      max-width: 900px;
      margin: 0 auto;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 100vh;
      padding: 3rem;
    }

    .intro-container h1 {
      color: var(--gold);
      margin-bottom: 2rem;
    }

    .intro-container p {
      font-size: 1.8rem;
      color: var(--text-muted);
      margin-bottom: 3rem;
      line-height: 1.8;
    }

    .btn {
      display: inline-block;
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 1.2rem 3rem;
      font-size: 1.3rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .btn:hover {
      background: #ffcc00;
      transform: scale(1.05);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-secondary {
      background: transparent;
      border: 3px solid var(--teal);
      color: var(--teal);
      margin-left: 1rem;
    }

    .btn-secondary:hover {
      background: rgba(62, 207, 207, 0.1);
    }

    /* ============ GAME SCREEN ============ */
    .game-container {
      max-width: 1100px;
      margin: 0 auto;
    }

    .game-header {
      margin-bottom: 2rem;
      padding-bottom: 2rem;
      border-bottom: 2px solid rgba(62, 207, 207, 0.3);
    }

    .game-header h2 {
      color: var(--gold);
      margin-bottom: 0.5rem;
    }

    .game-instruction {
      font-size: 1.3rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    .selected-count {
      display: inline-block;
      background: rgba(240, 180, 41, 0.2);
      color: var(--gold);
      padding: 0.7rem 1.5rem;
      border-radius: 6px;
      font-weight: 700;
      font-size: 1.1rem;
    }

    .passage-text-section {
      background: var(--card-bg);
      border-left: 4px solid var(--teal);
      padding: 2rem;
      border-radius: 8px;
      margin-bottom: 3rem;
      max-height: 40vh;
      overflow-y: auto;
    }

    .passage-text-section h3 {
      color: var(--teal);
      margin-bottom: 1.5rem;
    }

    .passage-text {
      font-size: 1.1rem;
      line-height: 1.8;
      color: var(--text-muted);
    }

    .passage-text p {
      margin-bottom: 1rem;
    }

    .bullets-container {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.2rem;
      margin-bottom: 3rem;
    }

    .bullet-item {
      background: var(--card-bg);
      border: 2px solid rgba(240, 180, 41, 0.2);
      border-radius: 8px;
      padding: 1.5rem;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: flex-start;
      gap: 1.5rem;
    }

    .bullet-item:hover {
      border-color: var(--gold);
      background: rgba(240, 180, 41, 0.08);
    }

    .bullet-item.checked {
      border-color: var(--gold);
      background: rgba(240, 180, 41, 0.12);
    }

    .bullet-checkbox {
      width: 40px;
      height: 40px;
      min-width: 40px;
      margin-top: 2px;
      cursor: pointer;
      accent-color: var(--gold);
    }

    .bullet-text {
      flex: 1;
      font-size: 1.2rem;
      line-height: 1.7;
    }

    .warning-message {
      background: rgba(229, 62, 62, 0.15);
      border-left: 4px solid var(--red);
      color: #ff9999;
      padding: 1rem 1.5rem;
      border-radius: 6px;
      margin-bottom: 2rem;
      font-weight: 600;
      display: none;
    }

    .warning-message.show {
      display: block;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .game-actions {
      text-align: center;
      padding-top: 2rem;
      border-top: 2px solid rgba(62, 207, 207, 0.3);
    }

    .btn-submit {
      background: var(--teal);
      color: #000;
      font-weight: 700;
      padding: 1.2rem 3rem;
      font-size: 1.3rem;
    }

    .btn-submit:hover {
      background: #5ee5e5;
    }

    .btn-submit:disabled {
      background: var(--text-muted);
      cursor: not-allowed;
      opacity: 0.5;
    }

    /* ============ RESULTS SCREEN ============ */
    .results-container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .results-header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .results-header h1 {
      color: var(--gold);
      margin-bottom: 1rem;
    }

    .results-score {
      font-size: 2.5rem;
      font-weight: 900;
      color: var(--teal);
      margin-bottom: 1rem;
    }

    .results-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
      margin-bottom: 3rem;
    }

    .result-card {
      background: var(--card-bg);
      border-left: 5px solid var(--green);
      border-radius: 8px;
      padding: 2rem;
      display: flex;
      gap: 1.5rem;
      align-items: flex-start;
    }

    .result-card.incorrect {
      border-left-color: var(--red);
    }

    .result-icon {
      font-size: 2rem;
      flex-shrink: 0;
      width: 50px;
      text-align: center;
    }

    .result-content {
      flex: 1;
    }

    .result-text {
      font-size: 1.2rem;
      line-height: 1.7;
      margin-bottom: 0.8rem;
      color: var(--text-light);
    }

    .result-explanation {
      font-size: 1rem;
      color: var(--text-muted);
      font-style: italic;
      padding: 1rem;
      background: rgba(176, 184, 193, 0.1);
      border-radius: 6px;
      margin-bottom: 1rem;
    }

    .discussion-prompt {
      font-size: 1rem;
      color: var(--teal);
      padding: 1rem;
      background: rgba(62, 207, 207, 0.1);
      border-left: 3px solid var(--teal);
      border-radius: 6px;
      font-style: italic;
      margin-top: 1rem;
    }

    .discussion-prompt-correct {
      border-left-color: var(--green);
      color: var(--text-muted);
      background: rgba(76, 175, 80, 0.08);
    }

    .results-actions {
      text-align: center;
      padding-top: 2rem;
      border-top: 2px solid rgba(62, 207, 207, 0.3);
    }

    .btn-primary {
      background: var(--gold);
      color: #000;
      margin-right: 1rem;
    }

    .btn-primary:hover {
      background: #ffcc00;
    }

    .btn-secondary {
      background: transparent;
      border: 3px solid var(--teal);
      color: var(--teal);
    }

    .btn-secondary:hover {
      background: rgba(62, 207, 207, 0.1);
    }

    /* ============ RESPONSIVE ============ */
    @media (max-width: 768px) {
      .screen {
        padding: 2rem;
      }

      h1 { font-size: 2rem; }
      h2 { font-size: 1.6rem; }
      h3 { font-size: 1.4rem; }

      .picker-grid {
        grid-template-columns: 1fr;
      }

      .intro-container {
        min-height: auto;
      }

      .intro-container p {
        font-size: 1.4rem;
      }

      .passage-text-section {
        max-height: 50vh;
      }

      .bullet-item {
        flex-direction: column;
        gap: 1rem;
      }

      .bullet-checkbox {
        width: 30px;
        height: 30px;
      }

      .btn {
        padding: 1rem 2rem;
        font-size: 1.1rem;
      }

      .btn-secondary {
        display: block;
        margin-left: 0;
        margin-top: 1rem;
      }
    }
  </style>
</head>
<body>

  <!-- ============ PICKER SCREEN ============ -->
  <div id="pickerScreen" class="screen active">
    <div class="picker-container">
      <div class="picker-header">
        <h1>Choose a Passage</h1>
        <p>Select the text your class will summarise today</p>
      </div>
      <div class="picker-grid" id="pickerGrid">
        <!-- Populated by JS -->
      </div>
    </div>
  </div>

  <!-- ============ INTRO SCREEN ============ -->
  <div id="introScreen" class="screen">
    <div class="intro-container">
      <h1 id="introTitle"></h1>
      <p id="introInstruction"></p>
      <div>
        <button class="btn" onclick="startGame()">Begin</button>
        <button class="btn btn-secondary" onclick="switchScreen('pickerScreen')">Change Passage</button>
      </div>
    </div>
  </div>

  <!-- ============ GAME SCREEN ============ -->
  <div id="gameScreen" class="screen">
    <div class="game-container">
      <div class="game-header">
        <h2 id="gameTitle"></h2>
        <p class="game-instruction">Select the 5 best summary points for this passage. Read carefully!</p>
        <div class="selected-count">Selected: <span id="selectedCount">0</span>/5</div>
      </div>

      <div class="passage-text-section">
        <h3>The Passage</h3>
        <div class="passage-text" id="gamePassageText"></div>
      </div>

      <div class="warning-message" id="warningMessage">
        You can only select 5 bullet points. Please uncheck one before selecting another.
      </div>

      <div class="bullets-container" id="bulletsContainer">
        <!-- Populated by JS -->
      </div>

      <div class="game-actions">
        <button class="btn btn-submit" id="submitBtn" onclick="submitAnswers()" disabled>Submit Answers</button>
      </div>
    </div>
  </div>

  <!-- ============ RESULTS SCREEN ============ -->
  <div id="resultsScreen" class="screen">
    <div class="results-container">
      <div class="results-header">
        <h1>Results</h1>
        <div class="results-score" id="resultsScore"></div>
      </div>

      <div class="results-grid" id="resultsGrid">
        <!-- Populated by JS -->
      </div>

      <div class="results-actions">
        <button class="btn btn-primary" onclick="tryAnother()">Try Another Passage</button>
      </div>
    </div>
  </div>

  <script>
    // ============ DATA ============
    const PASSAGES = [
      {
        id: 'wildfire',
        title: 'Wildfire in New Zealand',
        description: 'A news report about the Christchurch Port Hills wildfire',
        difficulty: 'Intermediate',
        text: `Firefighters battled a massive wildfire in the Port Hills area of Christchurch, New Zealand, as strong winds fanned the flames across dry hillsides. Hundreds of residents were forced to evacuate their homes as the blaze spread rapidly overnight. Emergency services worked through the night to contain the fire, which destroyed several properties and threatened key infrastructure.

The fire, described by local officials as one of the worst in the region's history, was fuelled by drought conditions and gusting northwesterly winds. Helicopters dropped water on the flames while ground crews worked to create firebreaks. The New Zealand Defence Force was called in to assist, deploying personnel and equipment to support overstretched fire services.

Many residents described the scene as terrifying, with one evacuee saying she had only minutes to grab essentials before fleeing. Community centres were opened as emergency shelters, and donations of food and clothing poured in from across the city. Environmental groups warned that such extreme fire events were likely to become more common due to climate change.`,
        bullets: [
          { text: "Firefighters battled a wildfire in the Port Hills area near Christchurch, New Zealand.", correct: true, explanation: "This is the key opening fact — who, what, where.", discussion: "Ask the class: what would be missing from our summary if we left out this opening fact?" },
          { text: "Strong winds and dry drought conditions helped the fire spread rapidly overnight.", correct: true, explanation: "The cause of the fire's spread is essential context for a summary.", discussion: "Ask the class: is the cause of an event important enough to always include in a summary?" },
          { text: "Emergency services, helicopters, and the New Zealand Defence Force all helped fight the fire.", correct: true, explanation: "The scale of the response is a key detail.", discussion: "Ask the class: why does the variety of emergency responders matter here?" },
          { text: "One evacuee said she had only minutes to grab her belongings before fleeing.", correct: false, explanation: "This is an illustrative quote — vivid but too specific for a summary.", discussion: "Ask the class: personal quotes add impact, but do they belong in a neutral summary?" },
          { text: "Residents were evacuated and community centres were opened as emergency shelters.", correct: true, explanation: "The human impact and community response are important summary points.", discussion: "Ask the class: why is the community response relevant in a summary of a disaster?" },
          { text: "Environmental groups warned that such fires may become more frequent due to climate change.", correct: true, explanation: "This is the broader significance — a good summary point.", discussion: "Ask the class: should a summary always include the wider significance of an event?" },
          { text: "Donations of food and clothing poured in from across the city.", correct: false, explanation: "A supportive detail, but not essential — it overlaps with point 5.", discussion: "Ask the class: can two points cover the same idea? How do you choose which to keep?" },
          { text: "The fire destroyed several properties and threatened key infrastructure.", correct: false, explanation: "True, but covered in the broader context of points 1 and 3.", discussion: "Ask the class: when a detail is already implied by another point, should it be included?" },
          { text: "The New Zealand Defence Force deployed personnel and equipment to the fire.", correct: false, explanation: "Too specific — this is already captured by the broader response point.", discussion: "Ask the class: is it better to be specific or concise in a summary?" },
          { text: "Officials described it as one of the worst wildfires in the region's history.", correct: false, explanation: "Dramatic but adds little extra information compared to what's already summarised.", discussion: "Ask the class: does a superlative claim ('one of the worst') strengthen a summary or weaken it?" }
        ]
      },
      {
        id: 'lighthouse',
        title: 'The Last Lighthouse Keeper',
        description: 'A descriptive travel piece about visiting a remote lighthouse',
        difficulty: 'Advanced',
        text: `The lighthouse at Dunmore Head stands alone at the edge of Ireland's most westerly point, a defiant white tower against the endless grey Atlantic. Once a beacon of hope for sailors navigating treacherous coastal waters, it has not been staffed by a human keeper since 1987, when automation quietly ended a tradition stretching back centuries.

I arrived in early morning, when low cloud still clung to the clifftops and the sea below churned in shades of iron and slate. The lighthouse itself was smaller than I had imagined — perhaps twelve metres tall — but its presence commanded the landscape entirely. A rusted gate, half-open, led to a gravel path worn smooth by decades of keeper's boots.

Inside the small adjacent cottage, a local heritage organisation has preserved the last keeper's living quarters exactly as they were left. His log book sits open on a scarred wooden table, the final entry dated March 14th, 1987. 'Wind: north-westerly, Force 6. Visibility: poor. Lamp: operational.' Six words to mark the end of an era.

The automation of lighthouses was driven by economics — it was simply cheaper to install electronic systems than to pay and house keepers in such remote locations. But local fishermen still speak of the keepers with affection, recalling how they would wave from the clifftop when boats passed safely, a human gesture that no automated light can replicate.`,
        bullets: [
          { text: "Dunmore Head lighthouse is Ireland's most westerly lighthouse, and has been automated since 1987.", correct: true, explanation: "Key facts — location and historical shift to automation.", discussion: "Ask the class: why is the date 1987 significant enough to include?" },
          { text: "The lighthouse is approximately twelve metres tall.", correct: false, explanation: "A minor descriptive detail — not important enough for a summary.", discussion: "Ask the class: does the height of the lighthouse change our understanding of the story?" },
          { text: "The lighthouse was once used to guide sailors away from dangerous coastal waters.", correct: true, explanation: "The original purpose is essential context.", discussion: "Ask the class: how does knowing the original purpose help readers understand the loss described later?" },
          { text: "A heritage organisation has preserved the last keeper's living quarters in the cottage.", correct: true, explanation: "Shows the cultural significance of the site — worth summarising.", discussion: "Ask the class: why might preserving the keeper's quarters matter to local people?" },
          { text: "The keeper's final log entry on 14 March 1987 read: 'Wind: north-westerly, Force 6.'", correct: false, explanation: "Vivid but too specific — a quotation rather than a summary point.", discussion: "Ask the class: this detail is powerful in the original — why doesn't it work in a summary?" },
          { text: "Lighthouses were automated for economic reasons — electronic systems were cheaper than employing keepers.", correct: true, explanation: "The reason for automation is a key fact.", discussion: "Ask the class: does explaining why something happened make a summary more useful?" },
          { text: "Local fishermen remember the keepers warmly and value the human connection they provided.", correct: true, explanation: "This captures the emotional significance — the human element the article builds towards.", discussion: "Ask the class: is the human feeling described here too vague for a summary, or just right?" },
          { text: "The writer arrived in the morning when cloud still covered the clifftops.", correct: false, explanation: "Atmospheric scene-setting, but not part of the information being summarised.", discussion: "Ask the class: descriptive writing creates atmosphere — but should atmosphere appear in a summary?" },
          { text: "The rusted gate at the lighthouse had been worn smooth by decades of use.", correct: false, explanation: "A descriptive image, not a factual summary point.", discussion: "Ask the class: there are many vivid images in this passage — how do you decide which, if any, to include?" },
          { text: "The lighthouse ended the practice of having human keepers on remote Irish coastlines.", correct: false, explanation: "Slightly misleading — it was the automation of this and other lighthouses collectively, not this one alone.", discussion: "Ask the class: does a summary point need to be completely accurate, or is 'close enough' acceptable?" }
        ]
      },
      {
        id: 'techclass',
        title: 'Tech Classrooms: Promise or Problem?',
        description: 'An opinion piece about technology in schools',
        difficulty: 'Advanced',
        text: `Schools across the world are racing to equip classrooms with the latest technology. Interactive whiteboards, tablets, and AI-driven learning platforms have become the hallmarks of a modern education. Yet as investment in ed-tech soars, a growing number of researchers and educators are asking whether the evidence actually supports the hype.

A major review published by the Education Endowment Foundation found that simply providing technology does not improve learning outcomes. What matters, the review concluded, is how technology is used and whether teachers have received adequate training to deploy it effectively. In classrooms where teachers were confident users of digital tools, student engagement and attainment both improved. In classrooms where technology was added without proper training, outcomes were no better — and sometimes worse.

Critics also point to the issue of screen time. Pupils in digitally intensive classrooms spend an average of four to five hours each day looking at screens, prompting concern from health professionals about the effects on sleep, concentration, and social development. Some schools in Sweden — long considered a model for progressive education — have recently reversed their digital-first policies, reintroducing printed textbooks after a decline in reading comprehension scores.

Proponents argue that technology prepares students for a digital world and can personalise learning in ways a single teacher cannot. The debate, it seems, is not whether to use technology in schools, but how to use it wisely.`,
        bullets: [
          { text: "Schools worldwide are investing heavily in classroom technology such as tablets and AI platforms.", correct: true, explanation: "Sets up the context — the scale of investment is the starting point.", discussion: "Ask the class: why is it important to state the scale of something at the start of a summary?" },
          { text: "Research shows that providing technology alone does not improve student learning outcomes.", correct: true, explanation: "The key finding from the review — central to the article's argument.", discussion: "Ask the class: does this finding surprise you? How does it change the argument?" },
          { text: "Technology improves outcomes only when teachers are well-trained in how to use it.", correct: true, explanation: "The nuanced conclusion — what actually makes a difference.", discussion: "Ask the class: how does this point change the conclusion we should draw from the research?" },
          { text: "The Education Endowment Foundation published its review on digital technology in schools.", correct: false, explanation: "The source is named in the article, but naming it adds nothing to a summary.", discussion: "Ask the class: should a summary name the sources of evidence, or just report the findings?" },
          { text: "Pupils in digitally intensive classrooms spend four to five hours a day looking at screens.", correct: false, explanation: "A specific statistic that illustrates the concern but is too detailed for a summary.", discussion: "Ask the class: statistics are convincing in an argument — are they still useful in a summary?" },
          { text: "Health professionals have raised concerns about the effects of high screen time on pupils.", correct: true, explanation: "The health concern is a distinct and important thread in the article.", discussion: "Ask the class: the original says 'sleep, concentration, and social development' — is it better to keep all three or summarise?" },
          { text: "Some Swedish schools have returned to printed textbooks after reading scores declined.", correct: true, explanation: "A concrete example that supports the case against uncritical tech adoption.", discussion: "Ask the class: examples make arguments concrete — do examples belong in summaries?" },
          { text: "Supporters of ed-tech say it can personalise learning in ways a teacher alone cannot.", correct: false, explanation: "Valid, but the article ends on this — it's a balancing note, not the main argument.", discussion: "Ask the class: when a passage gives both sides of an argument, which side should your summary favour?" },
          { text: "Sweden was long considered a model for progressive education.", correct: false, explanation: "Background detail about Sweden's reputation — too minor for a summary.", discussion: "Ask the class: background context helps in an article — does it help in a summary too?" },
          { text: "The debate is not whether to use technology in schools, but how to use it wisely.", correct: false, explanation: "This is the article's concluding line — a summary of the whole piece, not a summary point.", discussion: "Ask the class: if a sentence already summarises the whole article, is it still useful as a bullet point?" }
        ]
      }
    ];

    // ============ STATE ============
    let currentPassage = null;
    let selectedBulletIndices = [];

    // ============ INITIALIZATION ============
    function init() {
      renderPickerScreen();
    }

    // ============ SCREEN MANAGEMENT ============
    function switchScreen(screenId) {
      const screens = document.querySelectorAll('.screen');
      screens.forEach(screen => screen.classList.remove('active'));
      document.getElementById(screenId).classList.add('active');
    }

    // ============ PICKER SCREEN ============
    function renderPickerScreen() {
      const grid = document.getElementById('pickerGrid');
      grid.innerHTML = '';

      PASSAGES.forEach((passage, index) => {
        const card = document.createElement('div');
        card.className = 'passage-card';
        card.innerHTML = `
          <h3>${passage.title}</h3>
          <p>${passage.description}</p>
          <div class="difficulty-badge">${passage.difficulty}</div>
        `;
        card.onclick = () => selectPassage(index);
        grid.appendChild(card);
      });
    }

    function selectPassage(index) {
      currentPassage = PASSAGES[index];
      selectedBulletIndices = [];
      document.getElementById('introTitle').textContent = currentPassage.title;
      document.getElementById('introInstruction').textContent = `You will have a few moments to read the passage. Your class must then select the 5 most important points to include in a summary. Let's begin!`;
      switchScreen('introScreen');
    }

    // ============ GAME SCREEN ============
    function startGame() {
      // Render passage text
      const passageDiv = document.getElementById('gamePassageText');
      const paragraphs = currentPassage.text.split('\n\n').map(p => p.trim()).filter(p => p);
      passageDiv.innerHTML = paragraphs.map(p => `<p>${p}</p>`).join('');

      // Render game title
      document.getElementById('gameTitle').textContent = currentPassage.title;

      // Render bullets
      const bulletsContainer = document.getElementById('bulletsContainer');
      bulletsContainer.innerHTML = '';

      currentPassage.bullets.forEach((bullet, index) => {
        const bulletDiv = document.createElement('div');
        bulletDiv.className = 'bullet-item';
        bulletDiv.innerHTML = `
          <input type="checkbox" class="bullet-checkbox" data-index="${index}" onchange="handleBulletChange(${index})">
          <div class="bullet-text">${bullet.text}</div>
        `;
        bulletsContainer.appendChild(bulletDiv);
      });

      switchScreen('gameScreen');
    }

    function handleBulletChange(index) {
      const checkbox = document.querySelector(`input[data-index="${index}"]`);
      const warning = document.getElementById('warningMessage');

      if (checkbox.checked) {
        if (selectedBulletIndices.length >= 5) {
          checkbox.checked = false;
          warning.classList.add('show');
          setTimeout(() => warning.classList.remove('show'), 3000);
          return;
        }
        selectedBulletIndices.push(index);
      } else {
        selectedBulletIndices = selectedBulletIndices.filter(i => i !== index);
      }

      updateBulletDisplay();
    }

    function updateBulletDisplay() {
      document.getElementById('selectedCount').textContent = selectedBulletIndices.length;

      const bullets = document.querySelectorAll('.bullet-item');
      bullets.forEach((bullet, index) => {
        if (selectedBulletIndices.includes(index)) {
          bullet.classList.add('checked');
        } else {
          bullet.classList.remove('checked');
        }
      });

      // Enable submit button when exactly 5 are selected
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = selectedBulletIndices.length !== 5;
    }

    // ============ RESULTS SCREEN ============
    function submitAnswers() {
      // Score the answers
      let correctCount = 0;
      const results = [];

      currentPassage.bullets.forEach((bullet, index) => {
        const isSelected = selectedBulletIndices.includes(index);
        const isCorrect = bullet.correct;
        const matchesExpectation = isSelected === isCorrect;

        if (matchesExpectation) {
          correctCount++;
        }

        results.push({
          index,
          bullet,
          isSelected,
          isCorrect,
          matchesExpectation
        });
      });

      // Render results screen
      const scoresDiv = document.getElementById('resultsScore');
      scoresDiv.textContent = `${correctCount} / 10 correct`;

      const resultsGrid = document.getElementById('resultsGrid');
      resultsGrid.innerHTML = '';

      results.forEach(result => {
        const resultCard = document.createElement('div');
        resultCard.className = `result-card ${result.isCorrect ? 'correct' : 'incorrect'}`;

        const icon = result.isCorrect ? 'Yes' : 'No';
        const statusClass = result.isCorrect ? 'correct' : 'incorrect';

        let discussionHtml = '';
        if (result.bullet.discussion) {
          const promptClass = result.isCorrect ? 'discussion-prompt-correct' : '';
          discussionHtml = `<div class="discussion-prompt ${promptClass}">${result.bullet.discussion}</div>`;
        }

        resultCard.innerHTML = `
          <div class="result-icon">${icon}</div>
          <div class="result-content">
            <div class="result-text">${result.bullet.text}</div>
            <div class="result-explanation">${result.bullet.explanation}</div>
            ${discussionHtml}
          </div>
        `;
        resultsGrid.appendChild(resultCard);
      });

      switchScreen('resultsScreen');
    }

    // ============ RESET ============
    function tryAnother() {
      currentPassage = null;
      selectedBulletIndices = [];
      document.getElementById('warningMessage').classList.remove('show');
      switchScreen('pickerScreen');
    }

    // Initialize on load
    window.addEventListener('DOMContentLoaded', init);
  </script>

</body>
</html>
