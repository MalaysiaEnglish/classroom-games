<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POV Detector</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0d14 0%, #1a1f2e 100%);
            font-family: 'DM Sans', sans-serif;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        /* Setup Screen */
        .setup-screen {
            display: flex;
            flex-direction: column;
            gap: 30px;
            align-items: center;
        }

        .setup-header {
            text-align: center;
        }

        .setup-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            color: #f0b429;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        .setup-header p {
            font-size: 1.1rem;
            color: #a0a0a0;
        }

        .team-setup {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(240, 180, 41, 0.3);
            border-radius: 16px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .team-count-input {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .team-count-input label {
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #a0a0a0;
            font-size: 0.9rem;
        }

        .team-count-input input {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid #3ecfcf;
            color: #e0e0e0;
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'DM Sans', sans-serif;
        }

        .team-count-input input:focus {
            outline: none;
            border-color: #f0b429;
            background: rgba(255, 255, 255, 0.12);
        }

        #teamNamesContainer {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .team-name-input {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .team-name-input input {
            flex: 1;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid #3ecfcf;
            color: #e0e0e0;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: 'DM Sans', sans-serif;
        }

        .team-name-input input:focus {
            outline: none;
            border-color: #f0b429;
            background: rgba(255, 255, 255, 0.12);
        }

        .team-label {
            font-size: 0.85rem;
            color: #a0a0a0;
            min-width: 60px;
        }

        .setup-button {
            background: rgba(62, 207, 207, 0.15);
            border: 2px solid #3ecfcf;
            color: #3ecfcf;
            padding: 14px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.3s ease;
            align-self: center;
        }

        .setup-button:hover {
            background: rgba(62, 207, 207, 0.25);
            transform: translateY(-2px);
        }

        /* Game Screen */
        .game-screen {
            display: none;
            flex-direction: column;
            gap: 30px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(240, 180, 41, 0.3);
            border-radius: 16px;
            padding: 20px 30px;
        }

        .progress-pips {
            display: flex;
            gap: 6px;
        }

        .pip {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .pip.active {
            background: #f0b429;
            box-shadow: 0 0 12px rgba(240, 180, 41, 0.6);
        }

        .question-counter {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #a0a0a0;
        }

        .current-team {
            font-size: 1.2rem;
            font-weight: 600;
            color: #f0b429;
        }

        .passage-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(62, 207, 207, 0.4);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
        }

        .question-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #a0a0a0;
            margin-bottom: 15px;
        }

        .passage-text {
            font-size: 1.2rem;
            line-height: 1.8;
            color: #e0e0e0;
            font-style: italic;
            margin-bottom: 30px;
        }

        .pov-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
            margin-top: 30px;
        }

        .pov-button {
            padding: 18px 14px;
            border: 2px solid;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.05);
            text-align: center;
            line-height: 1.4;
        }

        .pov-button:hover:not(:disabled) {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
        }

        .pov-button:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .first {
            border-color: #60a5fa;
            color: #60a5fa;
        }

        .first:hover {
            background: rgba(96, 165, 250, 0.2);
        }

        .second {
            border-color: #f0b429;
            color: #f0b429;
        }

        .second:hover {
            background: rgba(240, 180, 41, 0.2);
        }

        .third_limited {
            border-color: #34d399;
            color: #34d399;
        }

        .third_limited:hover {
            background: rgba(52, 211, 153, 0.2);
        }

        .third_omniscient {
            border-color: #a78bfa;
            color: #a78bfa;
        }

        .third_omniscient:hover {
            background: rgba(167, 139, 250, 0.2);
        }

        .explanation {
            display: none;
            margin-top: 30px;
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .explanation.correct {
            border-left-color: #34d399;
            color: #34d399;
        }

        .explanation.incorrect {
            border-left-color: #f472b6;
            color: #f472b6;
        }

        .next-button {
            display: none;
            padding: 14px 40px;
            background: rgba(62, 207, 207, 0.15);
            border: 2px solid #3ecfcf;
            color: #3ecfcf;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.3s ease;
            align-self: center;
        }

        .next-button:hover {
            background: rgba(62, 207, 207, 0.25);
            transform: translateY(-2px);
        }

        /* End Screen */
        .end-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            text-align: center;
        }

        .end-screen h2 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: #f0b429;
        }

        .results-grid {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(240, 180, 41, 0.3);
            border-radius: 16px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
        }

        .result-team {
            font-weight: 600;
            font-size: 1.1rem;
            color: #f0b429;
        }

        .result-score {
            font-size: 1.5rem;
            font-weight: 700;
            color: #3ecfcf;
        }

        .end-message {
            font-size: 1.2rem;
            color: #a0a0a0;
            max-width: 500px;
        }

        .restart-button {
            padding: 14px 50px;
            background: rgba(240, 180, 41, 0.15);
            border: 2px solid #f0b429;
            color: #f0b429;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.3s ease;
        }

        .restart-button:hover {
            background: rgba(240, 180, 41, 0.25);
            transform: translateY(-2px);
        }

        @media (max-width: 700px) {
            .setup-header h1 {
                font-size: 2.5rem;
            }

            .passage-text {
                font-size: 1rem;
            }

            .pov-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .top-bar {
                flex-direction: column;
                gap: 15px;
            }

            .end-screen h2 {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Setup Screen -->
        <div class="setup-screen" id="setupScreen">
            <div class="setup-header">
                <h1>POV Detector</h1>
                <p>Identify narrative viewpoint in literary passages.</p>
            </div>

            <div class="team-setup">
                <div class="team-count-input">
                    <label for="teamCount">Number of Teams (2-6)</label>
                    <input type="number" id="teamCount" min="2" max="6" value="2" onchange="updateTeamInputs()">
                </div>
                <div id="teamNamesContainer"></div>
                <button class="setup-button" onclick="startGame()">Start Game</button>
            </div>
        </div>

        <!-- Game Screen -->
        <div class="game-screen" id="gameScreen">
            <div class="top-bar">
                <div class="progress-pips" id="pipsContainer"></div>
                <div class="current-team" id="currentTeam">Team 1</div>
                <div class="question-counter" id="questionCounter">Question 1 / 12</div>
            </div>

            <div class="passage-card">
                <div class="question-label">What is the narrative viewpoint?</div>
                <div class="passage-text" id="passageText">I turned nineteen on the train from Paris...</div>
                <div class="pov-grid" id="povGrid"></div>
                <div class="explanation" id="explanation"></div>
                <button class="next-button" id="nextButton" onclick="nextQuestion()">Next Question</button>
            </div>
        </div>

        <!-- End Screen -->
        <div class="end-screen" id="endScreen">
            <h2>Game Complete!</h2>
            <div class="results-grid" id="resultsGrid"></div>
            <div class="end-message">Excellent work identifying narrative viewpoints!</div>
            <button class="restart-button" onclick="location.reload()">Play Again</button>
        </div>
    </div>

    <script>
        const PASSAGES = [
            { text: "I turned nineteen on the train from Paris. Outside the window, the flat winter fields moved past. I had one suitcase, forty francs, and the kind of certainty that only the young and foolish possess.", viewpoint: "first", explanation: "1ST PERSON — the narrator uses 'I' and tells their own story from inside their experience. We see the world entirely through their eyes and thoughts." },
            { text: "You wake up at 5.35am in a station you have never visited. You cannot control your excitement. You have been waiting for this moment for twenty years, and now the gilded doors of Luxor Station are right in front of you.", viewpoint: "second", explanation: "2ND PERSON — the narrator uses 'you' to place the reader directly inside the experience. This is unusual in fiction and creates an immediate, immersive effect." },
            { text: "She pressed the key into his hand and looked away. She did not know why she could not meet his eyes. She only knew, with a certainty she could not explain, that this was the last time she would see him.", viewpoint: "third_limited", explanation: "3RD PERSON LIMITED — 'she' is used, and we are inside only her thoughts and feelings. We know what she feels but not what he is thinking — the perspective is limited to one character." },
            { text: "As Maya handed over the key, her heart clenched with a grief she could not name. Across the room, David watched her and felt, for the first time, afraid. Neither of them knew that they would both spend the next decade thinking of this moment.", viewpoint: "third_omniscient", explanation: "3RD PERSON OMNISCIENT — we have access to BOTH characters' inner thoughts and feelings, and the narrator even knows what will happen decades later. An all-knowing narrator." },
            { text: "I had been walking for six hours when I first saw the valley. My boots had worn through. I sat down in the grass and, for a long while, I didn't move. I just looked.", viewpoint: "first", explanation: "1ST PERSON — 'I' throughout, subjective experience, personal physical sensations. The narrator tells their own story." },
            { text: "You will never stand on your own for long in Luxor. From the moment you step off the train, the city wraps itself around you — the heat, the noise, the hands reaching out, the voices calling your name before you've told anyone what it is.", viewpoint: "second", explanation: "2ND PERSON — consistent use of 'you'. The reader is placed directly in the scene, which creates an unusual, involving quality in travel writing and literary non-fiction." },
            { text: "He did not knock. He stood outside the door for exactly a minute, watching the shadow of feet under the frame. He had been standing outside doors like this for thirty years. He knew how to wait.", viewpoint: "third_limited", explanation: "3RD PERSON LIMITED — we follow one character ('he') and access only his thoughts and perceptions. We don't know what is behind the door — only what he knows." },
            { text: "In the cottage, the old woman laid out the cards and said nothing. In the city thirty miles away, her granddaughter was at that exact moment putting down her phone, suddenly unable to remember what she had been about to search for.", viewpoint: "third_omniscient", explanation: "3RD PERSON OMNISCIENT — the narrator moves freely between two separate locations and two different characters' experiences simultaneously. Only an all-knowing narrator can do this." },
            { text: "My mother stood at the top of the bank, one hand raised. I did not wave back. I have thought about that every day since.", viewpoint: "first", explanation: "1ST PERSON — 'my', 'I', the narrator's personal guilt and retrospection. First person often creates intimacy and emotional honesty." },
            { text: "She woke before the alarm. She already knew, in the way that bodies know things before minds do, that the day would not be ordinary.", viewpoint: "third_limited", explanation: "3RD PERSON LIMITED — 'she' throughout, but with access to her physical intuition and interior knowledge. We are in her experience alone." },
            { text: "You make your choice in the moment before thought catches up with action. You reach out. You take it. You will not understand why until years later.", viewpoint: "second", explanation: "2ND PERSON — the use of 'you' creates a sense of shared human experience. Common in reflective non-fiction and literary memoir-style writing." },
            { text: "While the captain slept soundly in his cabin, the first mate stood at the helm, counting her mistakes. Below decks, the youngest crew member, who had said nothing for three days, was composing a letter she would never send.", viewpoint: "third_omniscient", explanation: "3RD PERSON OMNISCIENT — three characters in three locations, their inner states all described. Only an omniscient narrator can occupy all perspectives simultaneously." },
        ];

        let teams = [];
        let scores = {};
        let currentTeamIndex = 0;
        let currentQuestionIndex = 0;
        let answered = false;

        function updateTeamInputs() {
            const count = parseInt(document.getElementById('teamCount').value);
            const container = document.getElementById('teamNamesContainer');
            container.innerHTML = '';

            for (let i = 1; i <= count; i++) {
                const div = document.createElement('div');
                div.className = 'team-name-input';
                div.innerHTML = `
                    <span class="team-label">Team ${i}</span>
                    <input type="text" placeholder="Team name" value="Team ${i}">
                `;
                container.appendChild(div);
            }
        }

        function startGame() {
            const inputs = document.querySelectorAll('#teamNamesContainer input');
            teams = Array.from(inputs).map(input => input.value || input.placeholder);

            teams.forEach(team => {
                scores[team] = 0;
            });

            shuffleArray(PASSAGES);
            document.getElementById('setupScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'flex';
            renderPips();
            showQuestion();
        }

        function renderPips() {
            const container = document.getElementById('pipsContainer');
            container.innerHTML = '';
            for (let i = 0; i < PASSAGES.length; i++) {
                const pip = document.createElement('div');
                pip.className = `pip ${i === currentQuestionIndex ? 'active' : ''}`;
                container.appendChild(pip);
            }
        }

        function showQuestion() {
            const passage = PASSAGES[currentQuestionIndex];
            document.getElementById('passageText').textContent = passage.text;
            document.getElementById('currentTeam').textContent = teams[currentTeamIndex];
            document.getElementById('questionCounter').textContent = `Question ${currentQuestionIndex + 1} / ${PASSAGES.length}`;
            document.getElementById('explanation').style.display = 'none';
            document.getElementById('nextButton').style.display = 'none';
            answered = false;
            renderPovButtons();
            updatePips();
        }

        function renderPovButtons() {
            const grid = document.getElementById('povGrid');
            grid.innerHTML = '';
            const povs = [
                { key: 'first', label: '👤 1st Person' },
                { key: 'second', label: '👉 2nd Person' },
                { key: 'third_limited', label: '🔍 3rd Limited' },
                { key: 'third_omniscient', label: '🌐 3rd Omniscient' }
            ];

            povs.forEach(pov => {
                const btn = document.createElement('button');
                btn.className = `pov-button ${pov.key}`;
                btn.textContent = pov.label;
                btn.onclick = () => selectViewpoint(pov.key);
                btn.disabled = answered;
                grid.appendChild(btn);
            });
        }

        function selectViewpoint(selected) {
            if (answered) return;
            answered = true;

            const passage = PASSAGES[currentQuestionIndex];
            const isCorrect = selected === passage.viewpoint;

            const explanation = document.getElementById('explanation');
            explanation.className = `explanation ${isCorrect ? 'correct' : 'incorrect'}`;
            explanation.style.display = 'block';

            if (isCorrect) {
                scores[teams[currentTeamIndex]]++;
                explanation.textContent = '✓ ' + passage.explanation;
            } else {
                explanation.textContent = '✗ ' + passage.explanation;
            }

            document.querySelectorAll('.pov-button').forEach(btn => btn.disabled = true);
            document.getElementById('nextButton').style.display = 'block';
        }

        function nextQuestion() {
            currentQuestionIndex++;

            if (currentQuestionIndex < PASSAGES.length) {
                currentTeamIndex = (currentTeamIndex + 1) % teams.length;
                showQuestion();
            } else {
                endGame();
            }
        }

        function updatePips() {
            const pips = document.querySelectorAll('.pip');
            pips.forEach((pip, index) => {
                pip.classList.toggle('active', index === currentQuestionIndex);
            });
        }

        function endGame() {
            document.getElementById('gameScreen').style.display = 'none';
            document.getElementById('endScreen').style.display = 'flex';

            const resultsGrid = document.getElementById('resultsGrid');
            resultsGrid.innerHTML = '';

            const sortedTeams = teams.sort((a, b) => scores[b] - scores[a]);

            sortedTeams.forEach((team, index) => {
                const row = document.createElement('div');
                row.className = 'result-row';
                const medal = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : '';
                row.innerHTML = `
                    <div class="result-team">${medal} ${team}</div>
                    <div class="result-score">${scores[team]} / 12</div>
                `;
                resultsGrid.appendChild(row);
            });
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        updateTeamInputs();
    </script>
</body>
</html>
