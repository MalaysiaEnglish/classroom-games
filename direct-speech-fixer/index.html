<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Direct Speech Fixer — Year 7</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    /* ── Setup ──────────────────────────────────────── */
    #setup {
      max-width: 520px;
      margin: 40px auto;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 32px 28px;
      text-align: center;
    }
    #setup h2 { font-size: 1.3rem; color: #fda4af; margin-bottom: 6px; font-weight: 700; }
    #setup p  { font-size: 0.88rem; color: rgba(255,255,255,0.55); margin-bottom: 24px; }
    .team-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
    .team-row input[type="text"] {
      flex:1; background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.18); border-radius:8px;
      color:#fff; font-size:0.95rem; padding:7px 12px;
    }
    .team-dot { width:18px; height:18px; border-radius:50%; flex-shrink:0; }
    .setup-row { display:flex; gap:10px; justify-content:center; align-items:center; margin-bottom:20px; }
    .setup-row label { font-size:0.88rem; color:rgba(255,255,255,0.7); }
    .setup-row input[type="number"] {
      width:64px; padding:6px 10px;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.18);
      border-radius:8px; color:#fff; font-size:0.95rem; text-align:center;
    }
    #startBtn {
      background:linear-gradient(135deg,#f43f5e,#be123c);
      border:none; color:#fff; font-size:1.1rem;
      padding:13px 40px; border-radius:12px;
      cursor:pointer; font-weight:800; margin-top:8px;
      transition:filter 0.15s, transform 0.1s;
    }
    #startBtn:hover { filter:brightness(1.15); transform:translateY(-2px); }

    /* ── Game layout ────────────────────────────────── */
    #game { display:none; }

    /* Progress */
    .progress-bar {
      display:flex; justify-content:center; align-items:center;
      gap:12px; margin-bottom:10px;
      font-size:0.82rem; color:rgba(255,255,255,0.5);
    }
    .progress-pips { display:flex; gap:5px; }
    .pip { width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,0.15); transition:background 0.3s; }
    .pip.done   { background:#22c55e; }
    .pip.active { background:#f7b731; }

    /* Rule badge */
    .rule-badge {
      display:inline-block;
      background:rgba(244,63,94,0.18);
      border:1px solid rgba(244,63,94,0.45);
      color:#fda4af; border-radius:8px;
      padding:4px 14px; font-size:0.78rem; font-weight:700;
      text-transform:uppercase; letter-spacing:0.07em;
      margin: 0 auto 10px;
      display:block; text-align:center; max-width:600px;
    }

    /* Main card */
    .main-card {
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.14);
      border-radius:18px; padding:24px 28px;
      max-width:860px; margin:0 auto 16px;
      transition:border-color 0.4s, background 0.4s;
    }

    /* Sentence sections */
    .section-label {
      font-size:0.72rem; font-weight:800; text-transform:uppercase;
      letter-spacing:0.1em; margin-bottom:8px;
    }
    .section-label.wrong { color:#f43f5e; }
    .section-label.right { color:#22c55e; }

    .sentence-display {
      font-size:clamp(1.3rem,3vw,1.9rem);
      font-weight:500; line-height:1.5;
      padding:14px 18px; border-radius:12px;
      margin-bottom:16px; font-family:'Georgia', serif;
    }
    .sentence-display.incorrect {
      background:rgba(239,68,68,0.08);
      border:1px solid rgba(239,68,68,0.25);
      color:#fca5a5;
    }
    .sentence-display.correct-hidden {
      background:rgba(34,197,94,0.05);
      border:1px dashed rgba(34,197,94,0.25);
      color:rgba(255,255,255,0.25);
      filter:blur(5px);
      user-select:none;
      transition:filter 0.5s, color 0.5s;
    }
    .sentence-display.correct-revealed {
      background:rgba(34,197,94,0.1);
      border:1px solid rgba(34,197,94,0.45);
      color:#bbf7d0;
      filter:blur(0);
    }

    /* Error list */
    .errors-section { margin-bottom:16px; }
    .errors-title {
      font-size:0.75rem; font-weight:700; color:rgba(255,255,255,0.5);
      text-transform:uppercase; letter-spacing:0.08em; margin-bottom:8px;
    }
    .error-items { display:flex; flex-direction:column; gap:7px; }
    .error-item {
      display:flex; align-items:flex-start; gap:10px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:10px; padding:10px 14px;
      cursor:pointer; transition:all 0.2s;
    }
    .error-item:hover:not(.revealed) { border-color:rgba(244,63,94,0.4); background:rgba(244,63,94,0.06); }
    .error-item.revealed {
      background:rgba(34,197,94,0.08);
      border-color:rgba(34,197,94,0.35);
      cursor:default;
    }
    .error-badge {
      width:26px; height:26px; border-radius:50%;
      background:rgba(244,63,94,0.25); border:1px solid rgba(244,63,94,0.5);
      color:#fda4af; font-size:0.8rem; font-weight:800;
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0; transition:all 0.3s;
    }
    .error-item.revealed .error-badge {
      background:rgba(34,197,94,0.25);
      border-color:rgba(34,197,94,0.6);
      color:#86efac;
    }
    .error-text {
      font-size:0.88rem; color:rgba(255,255,255,0.35);
      transition:color 0.3s; line-height:1.45;
    }
    .error-item.revealed .error-text { color:rgba(255,255,255,0.85); }
    .error-hint { font-size:0.72rem; color:rgba(255,255,255,0.3); margin-top:2px; }
    .error-item.revealed .error-hint { color:#86efac; }

    /* Rule box */
    .rule-box {
      background:rgba(251,191,36,0.08);
      border:1px solid rgba(251,191,36,0.3);
      border-radius:12px; padding:12px 16px;
      margin-bottom:16px;
      opacity:0; transition:opacity 0.5s;
      pointer-events:none;
    }
    .rule-box.visible { opacity:1; pointer-events:auto; }
    .rule-box-title { font-size:0.72rem; font-weight:800; color:#fbbf24; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:4px; }
    .rule-box-text  { font-size:0.88rem; color:#fde68a; line-height:1.5; }

    /* Action buttons */
    .action-row {
      display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-bottom:4px;
    }
    .reveal-btn {
      background:linear-gradient(135deg,#22c55e,#16a34a);
      border:none; color:#fff; font-size:0.95rem;
      padding:11px 30px; border-radius:10px;
      cursor:pointer; font-weight:800;
      transition:filter 0.15s, transform 0.1s;
    }
    .reveal-btn:hover { filter:brightness(1.12); transform:translateY(-2px); }
    .reveal-btn:disabled { opacity:0.4; cursor:default; transform:none; filter:none; }

    #nextBtn {
      background:linear-gradient(135deg,#f7b731,#d97706);
      border:none; color:#1a0f00; font-size:0.95rem;
      padding:11px 30px; border-radius:10px;
      cursor:pointer; font-weight:800;
      transition:filter 0.15s, transform 0.1s;
      display:none;
    }
    #nextBtn:hover { filter:brightness(1.12); transform:translateY(-2px); }

    /* Score strip */
    .score-strip {
      display:flex; flex-wrap:wrap; gap:10px;
      justify-content:center; max-width:900px;
      margin:12px auto 4px;
    }
    .score-card {
      display:flex; flex-direction:column; align-items:center;
      background:rgba(255,255,255,0.07);
      border:2px solid rgba(255,255,255,0.12);
      border-radius:12px; padding:8px 18px;
      min-width:90px; cursor:pointer;
      transition:all 0.18s; user-select:none;
    }
    .score-card:hover { border-color:rgba(247,183,49,0.6); background:rgba(247,183,49,0.1); }
    .score-card:active { transform:scale(0.95); }
    .sc-name  { font-size:0.78rem; font-weight:700; color:rgba(255,255,255,0.75); text-transform:uppercase; letter-spacing:0.06em; }
    .sc-score { font-size:1.8rem; font-weight:900; line-height:1.1; }
    .sc-hint  { font-size:0.62rem; color:rgba(255,255,255,0.3); margin-top:1px; }
    @keyframes bump { 0%{transform:scale(1)} 40%{transform:scale(1.22)} 100%{transform:scale(1)} }
    .score-card.bumped { animation:bump 0.3s ease; }

    /* End screen */
    #endScreen { display:none; text-align:center; padding:40px 20px; }
    #endScreen h2 { font-size:2.2rem; font-weight:900; color:#f7b731; margin-bottom:24px; }
    .end-scores { display:flex; flex-wrap:wrap; gap:14px; justify-content:center; margin-bottom:32px; }
    .end-card { background:rgba(255,255,255,0.08); border-radius:16px; padding:18px 28px; font-size:2.4rem; font-weight:900; }
    .end-card .end-name { font-size:0.85rem; font-weight:700; color:rgba(255,255,255,0.6); text-transform:uppercase; letter-spacing:0.07em; margin-bottom:4px; }
    .end-card.winner { border:2px solid #f7b731; background:rgba(247,183,49,0.12); }

    /* Flash */
    #flash { pointer-events:none; position:fixed; inset:0; z-index:999; opacity:0; transition:opacity 0.5s; }
    #flash.show { background:rgba(34,197,94,0.15); opacity:1; }
  </style>
</head>
<body>

<div id="flash"></div>

<!-- ═══ SETUP ═══ -->
<div id="setup">
  <h2>🔧 Direct Speech Fixer</h2>
  <p>Year 7 · Terms 1 &amp; 2 — Spot and fix the punctuation errors in each sentence</p>
  <div class="setup-row">
    <label>Number of teams:
      <input type="number" id="teamCount" min="2" max="6" value="3">
    </label>
  </div>
  <div id="teamInputs"></div>
  <button id="startBtn" onclick="startGame()">Start Game</button>
</div>

<!-- ═══ GAME ═══ -->
<div id="game">
  <h1>Direct Speech Fixer</h1>

  <div class="controls">
    <button onclick="location.href='../index.html'" id="home">🏠 Home</button>
    <button onclick="toggleFullscreen()" id="fullscreen">⛶ Fullscreen</button>
    <button onclick="restartGame()">↺ Restart</button>
  </div>

  <div class="progress-bar">
    <span id="progressText">Sentence 1 / 12</span>
    <div class="progress-pips" id="pips"></div>
  </div>

  <div class="main-card" id="mainCard">
    <div class="rule-badge" id="ruleBadge"></div>

    <div class="section-label wrong">❌ Find the errors:</div>
    <div class="sentence-display incorrect" id="incorrectSentence"></div>

    <div class="errors-section">
      <div class="errors-title">Click each error to reveal it →</div>
      <div class="error-items" id="errorItems"></div>
    </div>

    <div class="section-label right">✅ Corrected version:</div>
    <div class="sentence-display correct-hidden" id="correctSentence"></div>

    <div class="rule-box" id="ruleBox">
      <div class="rule-box-title">📌 The Rule</div>
      <div class="rule-box-text" id="ruleText"></div>
    </div>
  </div>

  <div class="action-row">
    <button class="reveal-btn" id="revealAllBtn" onclick="revealAll()">Reveal All</button>
    <button id="nextBtn" onclick="nextQuestion()">Next Sentence →</button>
  </div>

  <div class="score-strip" id="scoreStrip"></div>
  <p style="text-align:center;font-size:0.75rem;color:rgba(255,255,255,0.3);margin-top:4px;">
    👆 Tap a team card to award a point
  </p>
</div>

<!-- ═══ END SCREEN ═══ -->
<div id="endScreen">
  <h2>🏆 Game Over!</h2>
  <div class="end-scores" id="endScores"></div>
  <button onclick="restartGame()" style="background:#f7b731;border:none;color:#1a0f00;font-size:1rem;padding:13px 40px;border-radius:12px;font-weight:800;cursor:pointer;">Play Again</button>
  &nbsp;
  <button onclick="location.href='../index.html'" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.25);color:#fff;font-size:1rem;padding:13px 40px;border-radius:12px;font-weight:700;cursor:pointer;">🏠 Home</button>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  SENTENCE BANK  —  Y7 Terms 1 & 2
//  Four rules of direct speech:
//  1. Speech marks wrap spoken words
//  2. Comma (or ! or ?) before closing speech mark
//     when a reporting clause follows
//  3. Capital letter to start spoken words
//  4. Lower case for reporting clause after closing mark
// ═══════════════════════════════════════════════════════
const SENTENCES = [

  // ── RULE 1: Missing speech marks ─────────────────────
  {
    ruleName: "Rule 1 — Speech marks around the spoken words",
    incorrect: `I think we should go back, she whispered.`,
    correct:   `"I think we should go back," she whispered.`,
    errors: [
      { label: "①", text: "Opening speech mark is missing before 'I'", hint: 'Speech marks open at the very start of the spoken words.' },
      { label: "②", text: "Closing speech mark is missing after 'back'", hint: 'Speech marks close at the end of the spoken words — before the comma and reporting clause.' },
      { label: "③", text: "The comma belongs INSIDE the closing speech mark", hint: '"...back," — comma first, then the closing speech mark.' }
    ],
    rule: 'Speech marks (" ") wrap everything that is spoken aloud. The reporting clause (she whispered) sits outside the speech marks.'
  },

  {
    ruleName: "Rule 1 — Speech marks around the spoken words",
    incorrect: `The stranger turned and said, follow me if you dare.`,
    correct:   `The stranger turned and said, "Follow me if you dare."`,
    errors: [
      { label: "①", text: "Opening speech mark missing before 'follow'", hint: 'The spoken words begin after the comma following \"said\".' },
      { label: "②", text: "'follow' needs a capital 'F' — it starts the spoken sentence", hint: 'The first word inside the speech marks gets a capital letter.' },
      { label: "③", text: "Closing speech mark missing after 'dare'", hint: 'Speech marks close at the end of the spoken words.' }
    ],
    rule: 'Speech marks open and close around the spoken words. The first word spoken always starts with a capital letter.'
  },

  // ── RULE 2: Comma/punctuation before closing mark ────
  {
    ruleName: "Rule 2 — Comma before the closing speech mark",
    incorrect: `"We have to find the map." he said urgently.`,
    correct:   `"We have to find the map," he said urgently.`,
    errors: [
      { label: "①", text: "The full stop should be a comma", hint: "When a reporting clause follows (he said...), the spoken sentence ends with a comma, not a full stop." },
      { label: "②", text: "'he' is correct — lower case after the closing speech mark ✓", hint: "Because the speech mark is followed by a reporting clause, 'he' stays lower case. This one is already right!" }
    ],
    rule: "When the spoken words are followed by a reporting clause (she said / he whispered), use a comma before the closing speech mark — not a full stop."
  },

  {
    ruleName: "Rule 2 — Comma before the closing speech mark",
    incorrect: `"Come closer." she whispered, "I have something to show you."`,
    correct:   `"Come closer," she whispered, "I have something to show you."`,
    errors: [
      { label: "①", text: "Full stop should be a comma after 'closer'", hint: "The reporting clause 'she whispered' splits the speech. A comma (not full stop) ends the first part of the speech." },
      { label: "②", text: "'she' is correct — lower case after the speech mark ✓", hint: "Because the speech is interrupted (not ended) by the reporting clause, 'she' is lower case." }
    ],
    rule: "When a reporting clause interrupts speech, the first part of the speech ends with a comma inside the closing speech mark."
  },

  // ── RULE 3: Capital letter to open speech ────────────
  {
    ruleName: "Rule 3 — Capital letter to start the spoken words",
    incorrect: `"don't go in there," she warned, grabbing his arm.`,
    correct:   `"Don't go in there," she warned, grabbing his arm.`,
    errors: [
      { label: "①", text: "'don't' should be 'Don't' — capital letter to start the speech", hint: "The first word inside the speech marks always starts with a capital letter." }
    ],
    rule: "The very first word inside the speech marks starts with a capital letter — even if it's in the middle of a sentence."
  },

  {
    ruleName: "Rule 3 — Capital letter to start the spoken words",
    incorrect: `The detective looked up and said, "we found something."`,
    correct:   `The detective looked up and said, "We found something."`,
    errors: [
      { label: "①", text: "'we' should be 'We' — first word of speech needs a capital", hint: "Even though 'we' is a short word and the speech comes mid-sentence, the capital letter is still required." }
    ],
    rule: "No matter where the speech appears in the sentence, the first spoken word always starts with a capital letter."
  },

  // ── RULE 4: Reporting clause — lower case after mark ─
  {
    ruleName: "Rule 4 — Lower case for the reporting clause",
    incorrect: `"Wait for me!" She called, sprinting down the corridor.`,
    correct:   `"Wait for me!" she called, sprinting down the corridor.`,
    errors: [
      { label: "①", text: "'She' should be 'she' — the reporting clause is lower case", hint: "After the closing speech mark, the reporting clause (she called) is treated as a continuation of the same sentence — lower case, not a new sentence." }
    ],
    rule: "The reporting clause after the closing speech mark starts with a lower case letter. It is part of the same sentence, not a new one."
  },

  {
    ruleName: "Rule 4 — Lower case for the reporting clause",
    incorrect: `"Look at this," She said, holding out the old map.`,
    correct:   `"Look at this," she said, holding out the old map.`,
    errors: [
      { label: "①", text: "'She' should be 'she' — lower case after the closing speech mark", hint: "The comma after the closing speech mark signals that the sentence continues with a lower case reporting verb." }
    ],
    rule: "After a closing speech mark followed by a comma, the reporting verb (said, whispered, shouted...) is always lower case."
  },

  // ── MIXED: !/? placement ──────────────────────────────
  {
    ruleName: "Punctuation — ! and ? go INSIDE the speech marks",
    incorrect: `"Where did the map go"? she asked nervously.`,
    correct:   `"Where did the map go?" she asked nervously.`,
    errors: [
      { label: "①", text: "The ? is outside the speech marks — it should be inside", hint: 'Punctuation that belongs to the spoken words (? and !) goes INSIDE the closing speech mark: "...go?" not "...go"?' }
    ],
    rule: "Question marks (?) and exclamation marks (!) that belong to the spoken words go INSIDE the closing speech mark."
  },

  {
    ruleName: "Punctuation — ! and ? go INSIDE the speech marks",
    incorrect: `"Run"! he yelled as the lights went out.`,
    correct:   `"Run!" he yelled as the lights went out.`,
    errors: [
      { label: "①", text: "The ! is outside the speech marks — it should be inside", hint: "The exclamation is part of what is being shouted. It belongs inside: \"Run!\" not \"Run\"!" }
    ],
    rule: "Exclamation marks that express how something is spoken go INSIDE the closing speech mark."
  },

  // ── MIXED: two-speaker dialogue ───────────────────────
  {
    ruleName: "Mixed — all four rules in one sentence",
    incorrect: `she said quietly, I know where he went.`,
    correct:   `"I know where he went," she said quietly.`,
    errors: [
      { label: "①", text: "Opening speech mark missing — speech comes before the reporting clause here", hint: 'The spoken words "I know where he went" need opening and closing speech marks.' },
      { label: "②", text: "'I' should be the first word — capital letter starts the speech", hint: "Reordering: the speech comes first, then the reporting clause." },
      { label: "③", text: "Comma needed before the closing speech mark", hint: "The reporting clause 'she said quietly' follows the speech, so a comma goes before the closing mark." }
    ],
    rule: "Speech can come before or after the reporting clause. Either way: speech marks around the words, comma before closing mark (if reporting clause follows), capital to open speech."
  },

  {
    ruleName: "Mixed — spot ALL the errors",
    incorrect: `"the cave is just ahead." She called back, "keep following the light!"`,
    correct:   `"The cave is just ahead," she called back, "keep following the light!"`,
    errors: [
      { label: "①", text: "'the' should be 'The' — capital letter to start the speech", hint: "First word inside the speech marks is always capitalised." },
      { label: "②", text: "Full stop should be a comma after 'ahead'", hint: "The speech is interrupted by a reporting clause, so a comma (not full stop) ends the first part." },
      { label: "③", text: "'She' should be 'she' — lower case reporting clause", hint: "After the closing speech mark + comma, the reporting verb is lower case." }
    ],
    rule: "Check all four rules together: ① speech marks around speech ② comma before closing mark ③ capital to start speech ④ lower case for reporting clause."
  }

];

// ── Team colours ──────────────────────────────────────────
const TEAM_COLORS = ['#00c9a7','#f7b731','#e74c3c','#a29bfe','#fd79a8','#74b9ff'];

// ── State ─────────────────────────────────────────────────
let teams    = [];
let scores   = [];
let order    = [];
let current  = 0;
let revealedErrors = 0;
let totalErrors    = 0;

// ── Setup ─────────────────────────────────────────────────
document.getElementById('teamCount').addEventListener('input', renderTeamInputs);
renderTeamInputs();

function renderTeamInputs() {
  const n = Math.min(6, Math.max(2, parseInt(document.getElementById('teamCount').value) || 3));
  const defaults = ['Team 1','Team 2','Team 3','Team 4','Team 5','Team 6'];
  const container = document.getElementById('teamInputs');
  const existing  = Array.from(container.querySelectorAll('input')).map(i => i.value);
  container.innerHTML = '';
  for (let i = 0; i < n; i++) {
    const row = document.createElement('div');
    row.className = 'team-row';
    const dot = document.createElement('div');
    dot.className = 'team-dot';
    dot.style.background = TEAM_COLORS[i];
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.placeholder = defaults[i];
    inp.value = existing[i] || defaults[i];
    row.appendChild(dot); row.appendChild(inp);
    container.appendChild(row);
  }
}

function startGame() {
  const inputs = document.querySelectorAll('#teamInputs input');
  teams  = Array.from(inputs).map(i => i.value.trim() || i.placeholder);
  scores = teams.map(() => 0);
  order  = shuffleArray([...Array(SENTENCES.length).keys()]);
  current = 0;

  document.getElementById('setup').style.display    = 'none';
  document.getElementById('game').style.display     = 'block';
  document.getElementById('endScreen').style.display = 'none';

  buildScoreStrip();
  buildPips();
  loadQuestion();
}

// ── Pips ──────────────────────────────────────────────────
function buildPips() {
  const c = document.getElementById('pips');
  c.innerHTML = '';
  SENTENCES.forEach((_, i) => {
    const p = document.createElement('div');
    p.className = 'pip' + (i === 0 ? ' active' : '');
    p.id = 'pip-' + i;
    c.appendChild(p);
  });
}
function updatePips() {
  SENTENCES.forEach((_, i) => {
    const p = document.getElementById('pip-' + i);
    if (!p) return;
    p.className = 'pip' + (i < current ? ' done' : i === current ? ' active' : '');
  });
}

// ── Score strip ───────────────────────────────────────────
function buildScoreStrip() {
  const strip = document.getElementById('scoreStrip');
  strip.innerHTML = '';
  teams.forEach((name, i) => {
    const card = document.createElement('div');
    card.className = 'score-card';
    card.id = 'sc-' + i;
    card.style.borderColor = TEAM_COLORS[i] + '55';
    card.innerHTML = `
      <div class="sc-name" style="color:${TEAM_COLORS[i]}">${name}</div>
      <div class="sc-score" style="color:${TEAM_COLORS[i]}" id="score-${i}">0</div>
      <div class="sc-hint">tap to +1</div>
    `;
    card.addEventListener('click', () => awardPoint(i));
    strip.appendChild(card);
  });
}
function awardPoint(i) {
  scores[i]++;
  document.getElementById('score-' + i).textContent = scores[i];
  const card = document.getElementById('sc-' + i);
  card.classList.remove('bumped');
  void card.offsetWidth;
  card.classList.add('bumped');
  setTimeout(() => card.classList.remove('bumped'), 350);
}

// ── Load question ─────────────────────────────────────────
function loadQuestion() {
  if (current >= SENTENCES.length) { showEndScreen(); return; }

  revealedErrors = 0;
  const s = SENTENCES[order[current]];
  totalErrors = s.errors.length;

  document.getElementById('progressText').textContent = `Sentence ${current + 1} / ${SENTENCES.length}`;
  document.getElementById('ruleBadge').textContent = s.ruleName;
  document.getElementById('incorrectSentence').textContent = s.incorrect;
  document.getElementById('correctSentence').textContent   = s.correct;
  document.getElementById('correctSentence').className = 'sentence-display correct-hidden';
  document.getElementById('ruleBox').classList.remove('visible');
  document.getElementById('ruleText').textContent = s.rule;
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('revealAllBtn').disabled  = false;

  // Build error items
  const container = document.getElementById('errorItems');
  container.innerHTML = '';
  s.errors.forEach((err, idx) => {
    const item = document.createElement('div');
    item.className = 'error-item';
    item.id = 'err-' + idx;
    item.innerHTML = `
      <div class="error-badge">${err.label}</div>
      <div>
        <div class="error-text">???  Click to reveal</div>
        <div class="error-hint"></div>
      </div>
    `;
    item.addEventListener('click', () => revealError(idx));
    container.appendChild(item);
  });

  updatePips();
}

function revealError(idx) {
  const s   = SENTENCES[order[current]];
  const err = s.errors[idx];
  const item = document.getElementById('err-' + idx);
  if (item.classList.contains('revealed')) return;

  item.classList.add('revealed');
  item.querySelector('.error-text').textContent = err.text;
  item.querySelector('.error-hint').textContent = err.hint;
  revealedErrors++;

  if (revealedErrors >= totalErrors) {
    showCorrect();
  }
}

function revealAll() {
  const s = SENTENCES[order[current]];
  s.errors.forEach((_, i) => revealError(i));
  document.getElementById('revealAllBtn').disabled = true;
}

function showCorrect() {
  document.getElementById('correctSentence').className = 'sentence-display correct-revealed';
  document.getElementById('ruleBox').classList.add('visible');
  document.getElementById('nextBtn').style.display = 'inline-block';
  document.getElementById('revealAllBtn').disabled  = true;

  const flash = document.getElementById('flash');
  flash.className = 'show';
  setTimeout(() => { flash.className = ''; }, 600);
}

function nextQuestion() {
  current++;
  if (current >= SENTENCES.length) showEndScreen();
  else loadQuestion();
}

// ── End screen ────────────────────────────────────────────
function showEndScreen() {
  document.getElementById('game').style.display     = 'none';
  document.getElementById('endScreen').style.display = 'block';

  const max = Math.max(...scores);
  const container = document.getElementById('endScores');
  container.innerHTML = '';

  const ranked = teams.map((name, i) => ({name, score: scores[i], color: TEAM_COLORS[i]}))
    .sort((a, b) => b.score - a.score);

  ranked.forEach(t => {
    const card = document.createElement('div');
    card.className = 'end-card' + (t.score === max ? ' winner' : '');
    card.style.color = t.color;
    card.innerHTML = `<div class="end-name">${t.name}</div>${t.score}`;
    container.appendChild(card);
  });
}

// ── Utils ─────────────────────────────────────────────────
function restartGame() {
  document.getElementById('setup').style.display    = 'block';
  document.getElementById('game').style.display     = 'none';
  document.getElementById('endScreen').style.display = 'none';
}
function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
}
</script>
