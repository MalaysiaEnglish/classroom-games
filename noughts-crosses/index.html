<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Noughts & Crosses</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    /* ── Setup ───────────────────────────────────────────── */
    .nc-setup        { display:flex; flex-direction:column; align-items:center; gap:20px; max-width:560px; margin:0 auto; }
    .picker-label    { font-size:0.78rem; font-weight:800; text-transform:uppercase; letter-spacing:0.1em; color:var(--accent); margin-bottom:7px; }

    /* Team name inputs */
    .team-inputs { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; width:100%; }
    .team-input-group { display:flex; flex-direction:column; gap:6px; flex:1; min-width:160px; max-width:220px; }
    .team-input-group label { font-size:0.75rem; font-weight:800; text-transform:uppercase; letter-spacing:0.08em; }
    .team-symbol { font-size:1.6rem; text-align:center; margin-bottom:2px; }

    /* ── Game ────────────────────────────────────────────── */
    .nc-game         { display:none; flex-direction:column; align-items:center; gap:14px; }
    .nc-game.active  { display:flex; }

    .nc-status {
      font-size:clamp(1rem,2.5vw,1.3rem); font-weight:800;
      padding:10px 24px; border-radius:12px;
      background:var(--glass-hi); border:1px solid var(--glass-border);
      text-align:center; letter-spacing:0.03em; transition:color 0.3s;
    }

    .nc-scores { display:flex; gap:12px; justify-content:center; width:100%; }
    .nc-score-card {
      flex:1; max-width:180px; text-align:center;
      background:var(--glass); border:2px solid var(--glass-border);
      border-radius:12px; padding:10px 14px; transition:all 0.3s;
    }
    .nc-score-card.active-turn { border-color:var(--accent); background:var(--glass-hi); }
    .nc-score-card.winner      { border-color:var(--accent2); background:rgba(247,183,49,0.12); }
    .nc-score-card .card-sym   { font-size:2rem; line-height:1.2; }
    .nc-score-card .card-name  { font-weight:800; font-size:0.88rem; margin-top:2px; }
    .nc-score-card .card-wins  { font-size:1.1rem; font-weight:900; color:var(--accent); }
    .nc-score-card .card-wlabel{ font-size:0.65rem; color:var(--text-dim); }

    .nc-board {
      display:grid; grid-template-columns:repeat(3,1fr);
      gap:8px; width:100%; max-width:480px;
    }
    .nc-cell {
      aspect-ratio:1; border-radius:16px; cursor:pointer;
      background:var(--glass); border:2px solid var(--glass-border);
      display:flex; align-items:center; justify-content:center;
      transition:all 0.2s; position:relative; overflow:hidden;
      padding:8px;
    }
    .nc-cell:hover:not(.taken) { background:var(--glass-hi); border-color:var(--accent); transform:scale(1.03); }
    .nc-cell.taken    { cursor:default; }
    .nc-cell.x-cell   { background:rgba(239,68,68,0.18);  border-color:#ef4444; }
    .nc-cell.o-cell   { background:rgba(0,201,167,0.18);  border-color:var(--accent); }
    .nc-cell.win-cell { animation:winPulse 0.6s ease infinite alternate; }
    @keyframes winPulse {
      from { filter:brightness(1); }
      to   { filter:brightness(1.5) drop-shadow(0 0 12px currentColor); }
    }
    .cell-sym {
      font-size:clamp(1.8rem,8vw,3.5rem); font-weight:900; line-height:1;
      animation:stampIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes stampIn {
      from { transform:scale(0) rotate(-15deg); opacity:0; }
      to   { transform:scale(1) rotate(0deg); opacity:1; }
    }
    .cell-num { font-size:clamp(0.9rem,3vw,1.4rem); opacity:0.2; }

    .nc-round-ctrl { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }

    .nc-win-overlay {
      position:fixed; inset:0; z-index:500;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      background:rgba(0,0,0,0.75); animation:fadeIn 0.4s ease both;
    }
    .win-box {
      background:var(--glass-hi); border:2px solid var(--accent2);
      border-radius:20px; padding:32px 40px; text-align:center;
      animation:popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes popIn { from{transform:scale(0.5);opacity:0;} to{transform:scale(1);opacity:1;} }
    .win-box .w-emoji { font-size:4rem; }
    .win-box h2 { font-size:clamp(1.6rem,5vw,2.8rem); font-weight:900; color:var(--accent2); margin:8px 0; }
    .win-box p  { color:var(--text-dim); margin-bottom:18px; }

    /* ── Question filter bar ── */
    .qf-bar {
      width:100%; max-width:480px;
      background:rgba(10,18,30,0.92); border:1px solid rgba(255,255,255,0.1);
      border-radius:12px; overflow:hidden; margin-bottom:4px;
    }
    .qf-summary { display:flex; align-items:center; gap:10px; padding:8px 14px; cursor:pointer; user-select:none; font-size:0.82rem; color:#c8bfb0; }
    .qf-summary:hover { background:rgba(255,255,255,0.04); }
    .qf-summary-text { flex:1; }
    .qf-chevron { font-size:0.7rem; transition:transform 0.2s; }
    .qf-bar.open .qf-chevron { transform:rotate(180deg); }
    .qf-detail { display:none; padding:10px 14px 14px; border-top:1px solid rgba(255,255,255,0.07); }
    .qf-bar.open .qf-detail { display:block; }
    .qf-row { display:flex; gap:8px; align-items:flex-start; margin-bottom:8px; flex-wrap:wrap; }
    .qf-col { flex:1; min-width:120px; }
    .qf-col-label { font-size:0.68rem; font-weight:800; text-transform:uppercase; letter-spacing:0.08em; color:rgba(240,180,41,0.8); margin-bottom:5px; }
    .qf-units { display:flex; flex-wrap:wrap; gap:4px; }
    .qf-unit-btn { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.15); color:#c8bfb0; padding:3px 9px; border-radius:5px; font-size:0.72rem; cursor:pointer; transition:all 0.18s; white-space:nowrap; }
    .qf-unit-btn:hover { background:rgba(240,180,41,0.12); border-color:rgba(240,180,41,0.4); }
    .qf-unit-btn.active { background:rgba(240,180,41,0.22); border-color:rgba(240,180,41,0.65); color:#f0c842; font-weight:600; }
    .qf-checks { display:flex; flex-wrap:wrap; gap:4px; }
    .qf-check-label { display:flex; align-items:center; gap:5px; font-size:0.75rem; color:#c8bfb0; cursor:pointer; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); border-radius:5px; padding:3px 8px; transition:all 0.15s; }
    .qf-check-label:hover { background:rgba(240,180,41,0.1); }
    .qf-check-label input { accent-color:#f0c842; }
    .qf-count { font-size:0.65rem; color:rgba(240,180,41,0.7); margin-left:2px; }
    .qf-empty { font-size:0.75rem; color:rgba(255,255,255,0.3); font-style:italic; }
    .qf-status-bar { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; padding-top:8px; border-top:1px solid rgba(255,255,255,0.06); margin-top:6px; }
    .qf-status { font-size:0.75rem; color:#c8bfb0; }
    .qf-mode-btns { display:flex; gap:5px; }
    .qf-mode-btn { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.14); color:#c8bfb0; padding:3px 10px; border-radius:5px; font-size:0.72rem; cursor:pointer; transition:all 0.18s; white-space:nowrap; }
    .qf-mode-btn.active { background:rgba(240,180,41,0.22); border-color:rgba(240,180,41,0.6); color:#f0c842; font-weight:600; }

    /* ── Question modal ── */
    .q-modal-overlay { position:fixed; inset:0; z-index:500; background:rgba(0,0,0,0.6); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; padding:16px; }
    .q-modal-box { background:#111828; border:2px solid rgba(240,180,41,0.35); border-radius:18px; padding:22px 24px; width:100%; max-width:520px; animation:popIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both; }
    .q-team-label { font-size:0.72rem; font-weight:800; text-transform:uppercase; letter-spacing:0.1em; margin-bottom:8px; }
    .q-question-text { font-size:clamp(0.92rem,2.4vw,1.15rem); color:#f0e6d0; font-weight:500; line-height:1.45; margin-bottom:14px; }
    .q-options { display:flex; flex-direction:column; gap:7px; margin-bottom:14px; }
    .q-opt-btn { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.15); color:#f0e6d0; padding:9px 14px; border-radius:9px; font-size:0.88rem; cursor:pointer; text-align:left; transition:all 0.18s; }
    .q-opt-btn:hover { background:rgba(240,180,41,0.15); border-color:rgba(240,180,41,0.5); }
    .q-opt-btn.correct { background:rgba(39,174,96,0.25); border-color:#27ae60; color:#7dffb3; pointer-events:none; }
    .q-opt-btn.wrong   { background:rgba(192,57,43,0.2); border-color:#c0392b; color:#ff9b9b; pointer-events:none; }
    .q-opt-btn.reveal  { background:rgba(39,174,96,0.15); border-color:rgba(39,174,96,0.4); }
    .q-opt-btn.disabled { pointer-events:none; opacity:0.65; }
    .q-ctrl-row { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
    .q-ctrl-btn { background:rgba(240,180,41,0.14); border:1px solid rgba(240,180,41,0.38); color:#f0c842; padding:7px 18px; border-radius:7px; font-size:0.8rem; cursor:pointer; transition:all 0.2s; }
    .q-ctrl-btn:hover { background:rgba(240,180,41,0.28); }
    .q-ctrl-btn.primary { background:rgba(240,180,41,0.8); color:#0e0b08; font-weight:700; }
    .q-ctrl-btn.primary:hover { background:#f0c842; }
    .q-ctrl-btn.danger { background:rgba(192,57,43,0.2); border-color:#c0392b; color:#ff9b9b; }
    select, select option { background: #1a2a38 !important; color: white !important; }
  </style>
</head>

<body class="hangman-page">
  <h1>⭕ Noughts &amp; Crosses</h1>

  <div class="controls">
    <button id="newGameBtn">New Game</button>
    <button onclick="document.documentElement.requestFullscreen?.()">Fullscreen</button>
    <button onclick="window.location.href='../index.html'">Home</button>
  </div>

  <div class="game-wrapper">

    <!-- ══ SETUP ══════════════════════════════════════════════ -->
    <div id="setupScreen" class="nc-setup">

      <!-- Team names -->
      <div style="width:100%;">
        <div class="picker-label" style="text-align:center;">Team Names</div>
        <div class="team-inputs">
          <div class="team-input-group">
            <div class="team-symbol" style="color:#ef4444;">✕</div>
            <label style="color:#ef4444;">Team X</label>
            <input type="text" id="nameX" value="Team X" style="padding:9px 12px;border-radius:8px;border:1px solid rgba(239,68,68,0.5);background:rgba(239,68,68,0.08);color:white;font-size:0.95rem;text-align:center;">
          </div>
          <div class="team-input-group">
            <div class="team-symbol" style="color:var(--accent);">〇</div>
            <label style="color:var(--accent);">Team O</label>
            <input type="text" id="nameO" value="Team O" style="padding:9px 12px;border-radius:8px;border:1px solid rgba(0,201,167,0.5);background:rgba(0,201,167,0.08);color:white;font-size:0.95rem;text-align:center;">
          </div>
        </div>
      </div>

      <button id="startBtn" style="font-size:1.1rem;padding:14px 48px;background:var(--accent);color:#000;border:none;border-radius:12px;font-weight:900;cursor:pointer;letter-spacing:0.05em;">
        ▶ START GAME
      </button>
    </div>

    <!-- ══ GAME ════════════════════════════════════════════════ -->
    <div id="gameScreen" class="nc-game">

      <!-- Question filter bar -->
      <div class="qf-bar" id="qfBar">
        <div class="qf-summary" onclick="toggleQF()">
          <span>❓</span>
          <span class="qf-summary-text" id="qfSummary">No questions — free play</span>
          <span class="qf-chevron">▼</span>
        </div>
        <div class="qf-detail">
          <div class="qf-row">
            <div class="qf-col">
<div class="qf-col-label">Level / Unit</div>
              <div style="display:flex;flex-direction:column;gap:5px;">
                <select class="qf-cascade-level" onchange="cascadeQLevelChange()" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);color:#c8bfb0;border-radius:6px;padding:4px 8px;font-size:0.78rem;cursor:pointer;width:100%;">
                  <option value="">Level…</option>
                </select>
                <select class="qf-cascade-unit" onchange="cascadeQUnitChange()" disabled style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);color:#c8bfb0;border-radius:6px;padding:4px 8px;font-size:0.78rem;cursor:pointer;width:100%;opacity:0.5;">
                  <option value="">Unit…</option>
                </select>
                <button onclick="cascadeQClear()" style="background:none;border:none;color:rgba(255,255,255,0.3);font-size:0.72rem;cursor:pointer;padding:2px 4px;text-align:left;">✕ clear</button>
              </div>
            </div>
            <div class="qf-col">
              <div class="qf-col-label">Topic</div>
              <div style="margin-bottom:5px;">
                <input id="qTopicSearch" type="text" placeholder="🔍 Search topics…" oninput="qFilterTopics()" style="width:100%;box-sizing:border-box;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);color:#c8bfb0;border-radius:6px;padding:4px 8px;font-size:0.75rem;outline:none;">
              </div>
              <div class="qf-checks" id="qfTopics"><span class="qf-empty">Select a unit first</span></div>
            </div>
            <div class="qf-col">
              <div class="qf-col-label">Lesson</div>
              <div class="qf-checks" id="qfLessons"><span class="qf-empty">Select a unit first</span></div>
            </div>
          </div>
          <div class="qf-status-bar">
            <span class="qf-status" id="qfStatus">No questions selected — free play</span>
            <div class="qf-mode-btns">
              <button class="qf-mode-btn active" id="modeScreen" onclick="setQMode('screen')">On Screen</button>
              <button class="qf-mode-btn" id="modeTeacher" onclick="setQMode('teacher')">Teacher Reads</button>
            </div>
          </div>
        </div>
      </div>

      <div class="nc-status" id="statusBar">Ready</div>

      <div class="nc-scores">
        <div class="nc-score-card active-turn" id="cardX">
          <div class="card-sym" style="color:#ef4444;">✕</div>
          <div class="card-name" id="nameDisplayX">Team X</div>
          <div class="card-wins" id="winsX">0</div>
          <div class="card-wlabel">wins</div>
        </div>
        <div class="nc-score-card" id="cardO">
          <div class="card-sym" style="color:var(--accent);">〇</div>
          <div class="card-name" id="nameDisplayO">Team O</div>
          <div class="card-wins" id="winsO">0</div>
          <div class="card-wlabel">wins</div>
        </div>
      </div>

      <div class="nc-board" id="board"></div>

      <div class="nc-round-ctrl">
        <button onclick="newRound()" style="padding:9px 22px;border-radius:10px;border:1px solid var(--glass-border);background:var(--glass);color:white;font-weight:700;cursor:pointer;">🔄 New Round</button>
        <button onclick="showSetup()" style="padding:9px 22px;border-radius:10px;border:1px solid var(--glass-border);background:var(--glass);color:var(--text-dim);font-weight:700;cursor:pointer;">⚙ Setup</button>
      </div>
    </div>

  </div><!-- game-wrapper -->

  <!-- Win overlay -->
  <div id="winOverlay" class="nc-win-overlay" style="display:none;">
    <div class="win-box">
      <div class="w-emoji" id="winEmoji">🎉</div>
      <h2 id="winMsg">Team X Wins!</h2>
      <p id="winSub">Round over</p>
      <button onclick="newRound()" style="padding:11px 32px;background:var(--accent);color:#000;border:none;border-radius:10px;font-weight:900;cursor:pointer;font-size:1rem;margin-right:8px;">Next Round</button>
      <button onclick="showSetup()" style="padding:11px 24px;background:var(--glass);border:1px solid var(--glass-border);color:white;border-radius:10px;font-weight:700;cursor:pointer;font-size:1rem;">New Game</button>
    </div>
  </div>

  <!-- Question modal -->
  <div id="qModal" class="q-modal-overlay" style="display:none;">
    <div class="q-modal-box">
      <div class="q-team-label" id="qModalTeam"></div>
      <div class="q-question-text" id="qModalQuestion"></div>
      <div class="q-options" id="qModalOptions"></div>
      <div class="q-ctrl-row" id="qModalCtrl"></div>
    </div>
  </div>

  <script>
    // ── State ──────────────────────────────────────────────
    let currentPlayer = 'X';
    let board = Array(9).fill('');
    let pendingCell = -1;
    let winsX = 0, winsO = 0;
    let gameOver = false;

    const SYMBOLS = { X: '✕', O: '〇' };
    const COLORS  = { X: '#ef4444', O: 'var(--accent)' };

    // ── Question system ────────────────────────────────────
    let qPool = [], qIndex = 0, qMode = 'screen', selectedUnit = null;

    function toggleQF() { document.getElementById('qfBar').classList.toggle('open'); }

    function setQMode(m) {
      qMode = m;
      document.getElementById('modeScreen').classList.toggle('active', m==='screen');
      document.getElementById('modeTeacher').classList.toggle('active', m==='teacher');
      updateQFSummary();
    }


    
    // ── Cascade picker for questions ─────────────────────────
    function getQuestionsForFilter() {
      const level = document.querySelector('.qf-cascade-level')?.value;
      const unit  = document.querySelector('.qf-cascade-unit')?.value;
      let qs = window.QUESTIONS || [];
      if (level) qs = qs.filter(q => String(q.level) === level);
      if (unit)  qs = qs.filter(q => String(q.unit)  === unit);
      return qs;
    }

    function buildTopicsAndLessons() {
      const qs = getQuestionsForFilter();
      const topicsEl  = document.getElementById('qfTopics') || document.getElementById('qf-topics');
      const lessonsEl = document.getElementById('qfLessons') || document.getElementById('qf-lessons');
      if (!topicsEl) return;

      // Preserve currently checked topics
      const prevChecked = new Set([...document.querySelectorAll('#qfTopics input:checked, #qf-topics input:checked')].map(cb => cb.value));

      const topics = [...new Set(qs.map(q => q.topic).filter(Boolean))].sort((a,b) => a.localeCompare(b, undefined, { numeric: true }));
      topicsEl.innerHTML = '';
      if (!topics.length) {
        topicsEl.innerHTML = '<span class="qf-empty">No topics found</span>';
      } else {
        topics.forEach(t => {
          const count = qs.filter(q => q.topic === t).length;
          const label = document.createElement('label'); label.className = 'qf-check-label';
          const cb = document.createElement('input'); cb.type = 'checkbox'; cb.value = t;
          cb.checked = prevChecked.has(t);
          cb.addEventListener('change', rebuildPool);
          const span = document.createElement('span'); span.textContent = t;
          const cspan = document.createElement('span'); cspan.className = 'qf-count'; cspan.textContent = count;
          label.appendChild(cb); label.appendChild(span); label.appendChild(cspan);
          topicsEl.appendChild(label);
        });
      }

      if (lessonsEl) {
        const prevCheckedL = new Set([...document.querySelectorAll('#qfLessons input:checked, #qf-lessons input:checked')].map(cb => cb.value));
        const lessonNums = [...new Set(qs.filter(q => q.lesson != null).map(q => q.lesson))].sort((a,b) => a-b);
        lessonsEl.innerHTML = '';
        if (!lessonNums.length) {
          lessonsEl.innerHTML = '<span class="qf-empty">No lesson data</span>';
        } else {
          lessonNums.forEach(l => {
            const count = qs.filter(q => q.lesson === l).length;
            const label = document.createElement('label'); label.className = 'qf-check-label';
            const cb = document.createElement('input'); cb.type = 'checkbox'; cb.value = l;
            cb.checked = prevCheckedL.has(String(l));
            cb.addEventListener('change', rebuildPool);
            const span = document.createElement('span'); span.textContent = 'Lesson ' + l;
            const cspan = document.createElement('span'); cspan.className = 'qf-count'; cspan.textContent = count;
            label.appendChild(cb); label.appendChild(span); label.appendChild(cspan);
            lessonsEl.appendChild(label);
          });
        }
      }

      if (typeof rebuildPool === 'function') rebuildPool();
    }

    function cascadeQLevelChange() {
      const level = document.querySelector('.qf-cascade-level').value;
      const unitSel = document.querySelector('.qf-cascade-unit');
      unitSel.innerHTML = '<option value="">Unit…</option>';
      unitSel.disabled = !level; unitSel.style.opacity = level ? '1' : '0.5';
      if (level) {
        const units = new Set((window.QUESTIONS||[]).filter(q => String(q.level) === level && q.unit != null).map(q => q.unit));
        [...units].sort((a,b) => a-b).forEach(u => {
          const opt = document.createElement('option'); opt.value = u; opt.textContent = 'Unit ' + u;
          unitSel.appendChild(opt);
        });
      }
      buildTopicsAndLessons();
    }

    function cascadeQUnitChange() {
      buildTopicsAndLessons();
    }

    function qFilterTopics() {
      const search = (document.getElementById('qTopicSearch')?.value || '').toLowerCase();
      const allLabels = document.querySelectorAll('#qfTopics .qf-check-label');
      allLabels.forEach(label => {
        const text = label.textContent.toLowerCase();
        label.style.display = search && !text.includes(search) ? 'none' : '';
      });
    }

    function cascadeQClear() {
      document.querySelector('.qf-cascade-level').value = '';
      const unitSel = document.querySelector('.qf-cascade-unit');
      unitSel.innerHTML = '<option value="">Unit…</option>';
      unitSel.disabled = true; unitSel.style.opacity = '0.5';
      buildTopicsAndLessons();
    }

    function buildUnitButtons() {
      const levelSel = document.querySelector('.qf-cascade-level');
      if (!levelSel) return;
      if (typeof window.QUESTIONS === 'undefined' || !window.QUESTIONS.length) {
        levelSel.innerHTML = '<option value="">No questions loaded</option>';
        return;
      }
      const levels = [...new Set(window.QUESTIONS.filter(q => q.level != null).map(q => q.level))].sort((a,b) => a-b);
      levelSel.innerHTML = '<option value="">Level…</option>';
      levels.forEach(l => {
        const opt = document.createElement('option'); opt.value = l; opt.textContent = 'Level ' + l;
        levelSel.appendChild(opt);
      });
      // Show all topics immediately
      buildTopicsAndLessons();
    }
    
    
    function selectUnit(level, unit, btnEl) {
      if (btnEl.classList.contains('active')) {
        btnEl.classList.remove('active'); selectedUnit = null;
        document.getElementById('qfTopics').innerHTML = '<span class="qf-empty">Select a unit first</span>';
        document.getElementById('qfLessons').innerHTML = '<span class="qf-empty">Select a unit first</span>';
        rebuildPool(); return;
      }
      document.querySelectorAll('.qf-unit-btn').forEach(b => b.classList.remove('active'));
      btnEl.classList.add('active');
      selectedUnit = {level:parseInt(level), unit:parseInt(unit)};
      buildTopicsAndLessons();
    }

    function questionsForUnit() {
      if (!selectedUnit) return [];
      return window.QUESTIONS.filter(q => q.level===selectedUnit.level && q.unit===selectedUnit.unit);
    }

    

    function shuffle(arr) {
      for (let i=arr.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
      return arr;
    }

    function rebuildPool() {
      const checkedTopics = [...document.querySelectorAll('#qfTopics input:checked')].map(i=>i.value);
      const checkedLessons = [...document.querySelectorAll('#qfLessons input:checked')].map(i=>parseInt(i.value));
      const candidates = questionsForUnit();
      if (!checkedTopics.length && !checkedLessons.length) { qPool = []; }
      else {
        const seen = new Set();
        qPool = shuffle(candidates.filter(q => {
          const hit = (checkedTopics.length && checkedTopics.includes(q.topic)) ||
                      (checkedLessons.length && q.lesson!=null && checkedLessons.includes(q.lesson));
          if (!hit || seen.has(q.question)) return false;
          seen.add(q.question); return true;
        }));
      }
      qIndex = 0; updateQFSummary();
    }

    function updateQFSummary() {
      const el = document.getElementById('qfSummary'), st = document.getElementById('qfStatus');
      if (!qPool.length) {
        el.textContent = 'No questions — free play';
        st.textContent = 'No questions selected — free play';
      } else {
        const topics = [...new Set(qPool.map(q=>q.topic))];
        const unitStr = selectedUnit ? 'L'+selectedUnit.level+'/U'+selectedUnit.unit+' · ' : '';
        const topicStr = topics.length===1 ? topics[0] : topics.length+' topics';
        el.innerHTML = unitStr+'<strong>'+qPool.length+' questions</strong> · '+topicStr+' · '+(qMode==='teacher'?'Teacher reads':'On screen');
        st.innerHTML = '<strong>'+qPool.length+' questions</strong> ready — '+topicStr;
      }
    }

    function showQuestion(player, cb) {
      if (!qPool.length) { cb(true); return; }
      const q = qPool[qIndex % qPool.length]; qIndex++;
      const name = player==='X' ? (document.getElementById('nameX').value||'Team X') : (document.getElementById('nameO').value||'Team O');
      document.getElementById('qModal').style.display = 'flex';
      document.getElementById('qModalTeam').textContent = SYMBOLS[player]+' '+name+' — answer to claim the square!';
      document.getElementById('qModalTeam').style.color = COLORS[player];
      document.getElementById('qModalQuestion').textContent = q.question;
      const optsEl = document.getElementById('qModalOptions'), ctrlEl = document.getElementById('qModalCtrl');
      optsEl.innerHTML = ''; ctrlEl.innerHTML = '';
      const allOpts = shuffle([q.answer, ...q.distractors]);
      if (qMode === 'screen') {
        allOpts.forEach(opt => {
          const btn = document.createElement('button'); btn.className = 'q-opt-btn'; btn.textContent = opt;
          btn.onclick = () => {
            document.querySelectorAll('.q-opt-btn').forEach(b => { b.classList.add('disabled'); if(b.textContent===q.answer) b.classList.add('correct'); });
            btn.classList.add(opt===q.answer ? 'correct' : 'wrong');
            setTimeout(() => { document.getElementById('qModal').style.display='none'; cb(opt===q.answer); }, 1100);
          };
          optsEl.appendChild(btn);
        });
      } else {
        allOpts.forEach(opt => {
          const btn = document.createElement('button'); btn.className = 'q-opt-btn'; btn.textContent = opt;
          btn.style.visibility = 'hidden'; btn.dataset.correct = opt===q.answer?'1':'0'; optsEl.appendChild(btn);
        });
        const revBtn = document.createElement('button'); revBtn.className = 'q-ctrl-btn'; revBtn.textContent = '👁 Reveal Options';
        revBtn.onclick = () => { document.querySelectorAll('.q-opt-btn').forEach(b => { b.style.visibility='visible'; if(b.dataset.correct==='1') b.classList.add('reveal'); }); revBtn.style.display='none'; };
        const okBtn = document.createElement('button'); okBtn.className = 'q-ctrl-btn primary'; okBtn.textContent = '✓ Correct — Claim Square';
        okBtn.onclick = () => { document.getElementById('qModal').style.display='none'; cb(true); };
        const wrongBtn = document.createElement('button'); wrongBtn.className = 'q-ctrl-btn danger'; wrongBtn.textContent = '✗ Wrong — Pass';
        wrongBtn.onclick = () => { document.getElementById('qModal').style.display='none'; cb(false); };
        ctrlEl.appendChild(revBtn); ctrlEl.appendChild(okBtn); ctrlEl.appendChild(wrongBtn);
      }
    }

    // ── Setup UI ───────────────────────────────────────────
    document.getElementById('startBtn').onclick = () => {
      winsX = 0; winsO = 0;
      document.getElementById('nameDisplayX').textContent = document.getElementById('nameX').value || 'Team X';
      document.getElementById('nameDisplayO').textContent = document.getElementById('nameO').value || 'Team O';
      document.getElementById('winsX').textContent = '0';
      document.getElementById('winsO').textContent = '0';
      document.getElementById('setupScreen').style.display = 'none';
      document.getElementById('gameScreen').classList.add('active');
      newRound();
    };
    document.getElementById('newGameBtn').onclick = showSetup;

    function showSetup() {
      document.getElementById('winOverlay').style.display = 'none';
      document.getElementById('setupScreen').style.display = 'flex';
      document.getElementById('gameScreen').classList.remove('active');
    }

    function newRound() {
      board = Array(9).fill('');
      currentPlayer = 'X'; pendingCell = -1; gameOver = false;
      document.getElementById('winOverlay').style.display = 'none';
      renderBoard(); updateStatus(); updateScoreCards();
    }

    // ── Board ──────────────────────────────────────────────
    function renderBoard() {
      const el = document.getElementById('board'); el.innerHTML = '';
      board.forEach((val, i) => {
        const cell = document.createElement('div'); cell.className = 'nc-cell'; cell.id = 'cell-'+i;
        if (val) {
          cell.classList.add('taken', val==='X'?'x-cell':'o-cell');
          cell.innerHTML = '<div class="cell-sym" style="color:'+COLORS[val]+'">'+SYMBOLS[val]+'</div>';
        } else {
          cell.innerHTML = '<div class="cell-num">'+(i+1)+'</div>';
          cell.onclick = () => attemptClaim(i);
        }
        el.appendChild(cell);
      });
    }

    function attemptClaim(i) {
      if (gameOver || board[i] || pendingCell !== -1) return;
      pendingCell = i;
      // Highlight selected cell
      const cellEl = document.getElementById('cell-'+i);
      if (cellEl) cellEl.style.outline = '3px solid '+COLORS[currentPlayer];
      showQuestion(currentPlayer, (correct) => {
        if (cellEl) cellEl.style.outline = '';
        pendingCell = -1;
        if (correct) {
          board[i] = currentPlayer;
          playStamp();
          renderBoard();
          if (!checkWin()) { switchPlayer(); updateStatus(); }
        } else {
          playWrong();
          switchPlayer(); updateStatus();
        }
      });
    }

    // ── Win detection ──────────────────────────────────────
    const WIN_LINES = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

    function checkWin() {
      for (const [a,b,c] of WIN_LINES) {
        if (board[a] && board[a]===board[b] && board[b]===board[c]) {
          const winner = board[a];
          highlightWin([a,b,c]);
          if (winner==='X') winsX++; else winsO++;
          updateScoreCards(winner);
          setTimeout(()=>showWin(winner), 600);
          gameOver = true; return true;
        }
      }
      if (board.every(v=>v)) {
        setTimeout(()=>showDraw(), 400); gameOver = true; return true;
      }
      return false;
    }

    function highlightWin(cells) { cells.forEach(i => { const el=document.getElementById('cell-'+i); if(el) el.classList.add('win-cell'); }); }

    function showWin(p) {
      const name = p==='X' ? document.getElementById('nameX').value||'Team X' : document.getElementById('nameO').value||'Team O';
      document.getElementById('winEmoji').textContent = SYMBOLS[p];
      document.getElementById('winEmoji').style.color = COLORS[p];
      document.getElementById('winMsg').textContent = name+' Wins!';
      document.getElementById('winSub').textContent =
        'Score: '+(document.getElementById('nameX').value||'Team X')+' '+winsX+' – '+winsO+' '+(document.getElementById('nameO').value||'Team O');
      document.getElementById('winOverlay').style.display = 'flex';
      playWin();
    }

    function showDraw() {
      document.getElementById('winEmoji').textContent = '🤝';
      document.getElementById('winEmoji').style.color = 'white';
      document.getElementById('winMsg').textContent = "It's a Draw!";
      document.getElementById('winSub').textContent =
        'Score: '+(document.getElementById('nameX').value||'Team X')+' '+winsX+' – '+winsO+' '+(document.getElementById('nameO').value||'Team O');
      document.getElementById('winOverlay').style.display = 'flex';
      playDraw();
    }

    function switchPlayer() { currentPlayer = currentPlayer==='X' ? 'O' : 'X'; }

    function updateStatus(msg) {
      const name = currentPlayer==='X' ? document.getElementById('nameX').value||'Team X' : document.getElementById('nameO').value||'Team O';
      const el = document.getElementById('statusBar');
      el.textContent = msg || SYMBOLS[currentPlayer]+' '+name+"'s turn";
      el.style.color = COLORS[currentPlayer];
    }

    function updateScoreCards(justWon) {
      ['X','O'].forEach(p => {
        const card = document.getElementById('card'+p);
        card.classList.toggle('active-turn', p===currentPlayer && !gameOver);
        card.classList.toggle('winner', p===justWon);
        card.style.borderColor = p===currentPlayer && !gameOver ? COLORS[p] : '';
      });
      document.getElementById('winsX').textContent = winsX;
      document.getElementById('winsO').textContent = winsO;
    }

    // ── Audio ──────────────────────────────────────────────
    let actx = null;
    function ac() { if (!actx) actx = new (window.AudioContext||window.webkitAudioContext)(); return actx; }
    function playStamp() {
      const ctx=ac(),t=ctx.currentTime;
      const o=ctx.createOscillator(); o.type='sine';
      o.frequency.setValueAtTime(currentPlayer==='X'?220:330,t); o.frequency.exponentialRampToValueAtTime(currentPlayer==='X'?110:180,t+0.12);
      const g=ctx.createGain(); g.gain.setValueAtTime(0.4,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.18);
      o.connect(g); g.connect(ctx.destination); o.start(t); o.stop(t+0.18);
    }
    function playWrong() {
      const ctx=ac(),t=ctx.currentTime;
      [330,280].forEach((f,i)=>{ const st=t+i*0.12; const o=ctx.createOscillator(); o.type='sawtooth'; o.frequency.value=f; const g=ctx.createGain(); g.gain.setValueAtTime(0.25,st); g.gain.exponentialRampToValueAtTime(0.001,st+0.15); o.connect(g); g.connect(ctx.destination); o.start(st); o.stop(st+0.15); });
    }
    function playWin() {
      const ctx=ac(); [523,659,784,1047].forEach((f,i)=>{ const t=ctx.currentTime+i*0.14; const o=ctx.createOscillator(); o.type='triangle'; o.frequency.value=f; const g=ctx.createGain(); g.gain.setValueAtTime(0.35,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.4); o.connect(g); g.connect(ctx.destination); o.start(t); o.stop(t+0.4); });
    }
    function playDraw() {
      const ctx=ac(),t=ctx.currentTime; const o=ctx.createOscillator(); o.type='triangle';
      o.frequency.setValueAtTime(440,t); o.frequency.setValueAtTime(330,t+0.2);
      const g=ctx.createGain(); g.gain.setValueAtTime(0.3,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.5);
      o.connect(g); g.connect(ctx.destination); o.start(t); o.stop(t+0.5);
    }

    window.addEventListener('load', async () => { if (window.SHEET_LOADED) await window.SHEET_LOADED; buildUnitButtons(); });
  </script>
  <script src="../questions.js"></script>
  <script src="../sheet-loader.js" onerror="console.log('No sheet-loader.js')"></script>
</body>
