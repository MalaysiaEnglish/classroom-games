<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Antagonist Decoder — Year 7</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    #setup {
      max-width: 520px; margin: 40px auto;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px; padding: 32px 28px; text-align: center;
    }
    #setup h2 { font-size: 1.3rem; color: #fca5a5; margin-bottom: 6px; font-weight: 700; }
    #setup p  { font-size: 0.88rem; color: rgba(255,255,255,0.55); margin-bottom: 24px; }
    .team-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
    .team-row input[type="text"] {
      flex:1; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.18);
      border-radius:8px; color:#fff; font-size:0.95rem; padding:7px 12px;
    }
    .team-dot { width:18px; height:18px; border-radius:50%; flex-shrink:0; }
    .setup-row { display:flex; gap:10px; justify-content:center; align-items:center; margin-bottom:20px; }
    .setup-row label { font-size:0.88rem; color:rgba(255,255,255,0.7); }
    .setup-row input[type="number"] {
      width:64px; padding:6px 10px; background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.18); border-radius:8px;
      color:#fff; font-size:0.95rem; text-align:center;
    }
    #startBtn {
      background: linear-gradient(135deg,#ef4444,#991b1b);
      border:none; color:#fff; font-size:1.1rem;
      padding:13px 40px; border-radius:12px;
      cursor:pointer; font-weight:800; margin-top:8px;
      transition:filter 0.15s, transform 0.1s;
    }
    #startBtn:hover { filter:brightness(1.15); transform:translateY(-2px); }

    #game { display:none; }

    .progress-bar { display:flex; justify-content:center; align-items:center; gap:12px; margin-bottom:10px; font-size:0.82rem; color:rgba(255,255,255,0.5); }
    .progress-pips { display:flex; gap:5px; }
    .pip { width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,0.15); transition:background 0.3s; }
    .pip.done   { background:#22c55e; }
    .pip.active { background:#f7b731; }

    .quote-card {
      background:rgba(30,0,0,0.35); border:1px solid rgba(239,68,68,0.25);
      border-radius:18px; padding:28px 32px 20px; margin:0 auto 18px;
      max-width:860px; text-align:center;
      transition:border-color 0.4s, background 0.4s;
    }
    .quote-card.correct { border-color:#22c55e; background:rgba(34,197,94,0.07); }

    .quote-text {
      font-size:clamp(1.2rem,3vw,1.85rem); font-weight:500;
      color:#fde8e8; line-height:1.5; margin-bottom:14px;
      font-family: Georgia, serif; font-style:italic;
    }
    .explanation {
      font-size:clamp(0.82rem,1.8vw,1rem); color:#fca5a5;
      min-height:1.4em; transition:opacity 0.3s; font-style:normal;
    }
    .explanation.hidden { opacity:0; }

    .category-row {
      display:grid; grid-template-columns:repeat(2,1fr);
      gap:12px; max-width:860px; margin:0 auto 20px;
    }
    @media(min-width:700px) { .category-row { grid-template-columns:repeat(4,1fr); } }

    .cat-btn {
      padding:18px 10px; border-radius:14px;
      font-size:clamp(0.8rem,1.8vw,1rem); font-weight:800;
      cursor:pointer; border:2px solid transparent;
      transition:all 0.2s; line-height:1.3;
    }
    .cat-btn.pathetic    { background:rgba(96,165,250,0.15); border-color:rgba(96,165,250,0.4);   color:#93c5fd; }
    .cat-btn.figurative  { background:rgba(167,139,250,0.15); border-color:rgba(167,139,250,0.4); color:#c4b5fd; }
    .cat-btn.implied     { background:rgba(251,146,60,0.15); border-color:rgba(251,146,60,0.4);   color:#fdba74; }
    .cat-btn.direct      { background:rgba(244,63,94,0.15); border-color:rgba(244,63,94,0.4);     color:#fda4af; }

    .cat-btn:hover:not(:disabled) { filter:brightness(1.25); transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,0.3); }
    .cat-btn:disabled { cursor:default; }
    .cat-btn.revealed-correct { background:rgba(34,197,94,0.28); border-color:#22c55e; color:#fff; transform:scale(1.04); }
    .cat-btn.revealed-wrong   { opacity:0.3; }

    .cat-emoji { display:block; font-size:1.6rem; margin-bottom:6px; }
    .cat-name  { display:block; font-size:0.9em; }
    .cat-sub   { display:block; font-size:0.68em; font-weight:400; opacity:0.75; margin-top:3px; }

    .next-bar { display:flex; justify-content:center; margin-top:4px; }
    #nextBtn {
      background:linear-gradient(135deg,#f7b731,#d97706);
      border:none; color:#1a0f00; font-size:1rem;
      padding:11px 36px; border-radius:10px;
      cursor:pointer; font-weight:800;
      transition:filter 0.15s, transform 0.1s; display:none;
    }
    #nextBtn:hover { filter:brightness(1.12); transform:translateY(-2px); }

    .score-strip { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; max-width:900px; margin:12px auto 4px; }
    .score-card {
      display:flex; flex-direction:column; align-items:center;
      background:rgba(255,255,255,0.07); border:2px solid rgba(255,255,255,0.12);
      border-radius:12px; padding:8px 18px; min-width:90px;
      cursor:pointer; transition:all 0.18s; user-select:none;
    }
    .score-card:hover { border-color:rgba(247,183,49,0.6); background:rgba(247,183,49,0.1); }
    .score-card:active { transform:scale(0.95); }
    .sc-name  { font-size:0.78rem; font-weight:700; color:rgba(255,255,255,0.75); text-transform:uppercase; letter-spacing:0.06em; }
    .sc-score { font-size:1.8rem; font-weight:900; line-height:1.1; }
    .sc-hint  { font-size:0.62rem; color:rgba(255,255,255,0.3); margin-top:1px; }
    @keyframes bump { 0%{transform:scale(1)} 40%{transform:scale(1.22)} 100%{transform:scale(1)} }
    .score-card.bumped { animation:bump 0.3s ease; }

    #endScreen { display:none; text-align:center; padding:40px 20px; }
    #endScreen h2 { font-size:2.2rem; font-weight:900; color:#f7b731; margin-bottom:24px; }
    .end-scores { display:flex; flex-wrap:wrap; gap:14px; justify-content:center; margin-bottom:32px; }
    .end-card { background:rgba(255,255,255,0.08); border-radius:16px; padding:18px 28px; font-size:2.4rem; font-weight:900; }
    .end-card .end-name { font-size:0.85rem; font-weight:700; color:rgba(255,255,255,0.6); text-transform:uppercase; letter-spacing:0.07em; margin-bottom:4px; }
    .end-card.winner { border:2px solid #f7b731; background:rgba(247,183,49,0.12); }

    #flash { pointer-events:none; position:fixed; inset:0; z-index:999; opacity:0; transition:opacity 0.5s; }
    #flash.show { background:rgba(239,68,68,0.12); opacity:1; }
  </style>
</head>
<body>
<div id="flash"></div>

<div id="setup">
  <h2>🦹 Antagonist Decoder</h2>
  <p>Year 7 · Unit 9 — Identify how the writer makes the villain menacing</p>
  <div class="setup-row">
    <label>Number of teams: <input type="number" id="teamCount" min="2" max="6" value="3"></label>
  </div>
  <div id="teamInputs"></div>
  <button id="startBtn" onclick="startGame()">Start Game</button>
</div>

<div id="game">
  <h1>Antagonist Decoder</h1>
  <div class="controls">
    <button onclick="location.href='../index.html'" id="home">🏠 Home</button>
    <button onclick="toggleFullscreen()" id="fullscreen">⛶ Fullscreen</button>
    <button onclick="restartGame()">↺ Restart</button>
  </div>
  <div class="progress-bar">
    <span id="progressText">Quote 1 / 16</span>
    <div class="progress-pips" id="pips"></div>
  </div>

  <div class="quote-card" id="quoteCard">
    <div class="quote-text" id="quoteText"></div>
    <div class="explanation hidden" id="explanation"></div>
  </div>

  <div class="category-row">
    <button class="cat-btn pathetic"   data-type="pathetic"   onclick="checkAnswer('pathetic')">
      <span class="cat-emoji">⛈️</span>
      <span class="cat-name">PATHETIC FALLACY</span>
      <span class="cat-sub">Weather / setting mirrors threat</span>
    </button>
    <button class="cat-btn figurative" data-type="figurative" onclick="checkAnswer('figurative')">
      <span class="cat-emoji">🐍</span>
      <span class="cat-name">FIGURATIVE LANGUAGE</span>
      <span class="cat-sub">Simile / metaphor / personification</span>
    </button>
    <button class="cat-btn implied"    data-type="implied"    onclick="checkAnswer('implied')">
      <span class="cat-emoji">🤫</span>
      <span class="cat-name">IMPLIED THREAT</span>
      <span class="cat-sub">What is NOT said is most chilling</span>
    </button>
    <button class="cat-btn direct"     data-type="direct"     onclick="checkAnswer('direct')">
      <span class="cat-emoji">👁️</span>
      <span class="cat-name">DIRECT MENACE</span>
      <span class="cat-sub">Controlled description / action</span>
    </button>
  </div>

  <div class="next-bar">
    <button id="nextBtn" onclick="nextQuestion()">Next Quote →</button>
  </div>
  <div class="score-strip" id="scoreStrip"></div>
  <p style="text-align:center;font-size:0.75rem;color:rgba(255,255,255,0.3);margin-top:4px;">👆 Tap a team card to award a point</p>
</div>

<div id="endScreen">
  <h2>🏆 Game Over!</h2>
  <div class="end-scores" id="endScores"></div>
  <button onclick="restartGame()" style="background:#f7b731;border:none;color:#1a0f00;font-size:1rem;padding:13px 40px;border-radius:12px;font-weight:800;cursor:pointer;">Play Again</button>
  &nbsp;
  <button onclick="location.href='../index.html'" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.25);color:#fff;font-size:1rem;padding:13px 40px;border-radius:12px;font-weight:700;cursor:pointer;">🏠 Home</button>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  QUOTE BANK — Y7 Unit 9: Villains & Antagonists
//  Four techniques: pathetic fallacy · figurative language
//                   implied threat · direct menace
// ═══════════════════════════════════════════════════════
const QUOTES = [
  // PATHETIC FALLACY — weather/setting mirrors villain
  { text: "The storm had been building all day, and as he stepped from the shadows, the first crack of lightning split the sky.", type:"pathetic", explanation:"PATHETIC FALLACY — the storm mirrors the villain's arrival. The writer uses weather to signal danger before a word of threat is spoken." },
  { text: "The sun disappeared behind a bank of black cloud the moment she heard his footsteps on the stairs.", type:"pathetic", explanation:"PATHETIC FALLACY — sudden darkness at the villain's approach. The environment responds to the threat as if nature itself is afraid." },
  { text: "A bitter wind cut through the alley as the figure emerged, turning the puddles to ice under his feet.", type:"pathetic", explanation:"PATHETIC FALLACY — cold and ice reflect the villain's frozen, inhuman nature. The setting becomes hostile alongside the character." },
  { text: "Even the gulls fell silent. The sea went grey and still, as flat as a held breath.", type:"pathetic", explanation:"PATHETIC FALLACY — nature going quiet and grey creates dread. The held-breath simile adds to the eerie, threatening atmosphere." },

  // FIGURATIVE LANGUAGE — simile / metaphor / personification
  { text: "His eyes were two chips of black ice, utterly without warmth or mercy.", type:"figurative", explanation:"FIGURATIVE LANGUAGE — metaphor. Comparing eyes to black ice suggests coldness, hardness and a complete lack of human feeling." },
  { text: "She moved like a spider at the edge of its web — patient, precise, and absolutely deadly.", type:"figurative", explanation:"FIGURATIVE LANGUAGE — simile. Comparing the villain to a spider emphasises predatory patience. The three adjectives build to 'deadly'." },
  { text: "His voice was silk drawn slowly across a blade.", type:"figurative", explanation:"FIGURATIVE LANGUAGE — metaphor. Silk suggests smoothness and charm; the blade underneath it reveals hidden danger. Two opposites create the villain's double nature." },
  { text: "The captain's laugh was a thing with claws — it scratched at the air and left silence behind it.", type:"figurative", explanation:"FIGURATIVE LANGUAGE — personification. Giving the laugh claws makes it a creature in its own right. The violence of 'scratched' is unexpected and deeply unsettling." },

  // IMPLIED THREAT — what is NOT said
  { text: '"I do hope," he said softly, adjusting his gloves, "that you have not made plans for next week."', type:"implied", explanation:"IMPLIED THREAT — he says nothing threatening directly. The gloves (a detail of calm preparation), the softness of his voice, and the strange question about next week all suggest something awful without naming it." },
  { text: "She looked at the photograph on his desk. He noticed. He said nothing, but he smiled.", type:"implied", explanation:"IMPLIED THREAT — the silence and the smile are more frightening than any words. The villain has communicated a threat without speaking it." },
  { text: '"Of course," said Mr Crane, "you are free to leave whenever you wish." He did not move from the doorway.', type:"implied", explanation:"IMPLIED THREAT — the words say one thing; the action (blocking the exit) says the opposite. The gap between speech and action creates the menace." },
  { text: "He picked up the small glass figurine from her shelf, studied it carefully, and then set it down again in exactly the same place.", type:"implied", explanation:"IMPLIED THREAT — touching something precious and fragile, without breaking it, is a controlled warning. He could break it. He chose not to. Yet." },

  // DIRECT MENACE — controlled description / physical threat
  { text: "He did not shout. He did not need to. He simply waited until the room was completely silent, and then he spoke.", type:"direct", explanation:"DIRECT MENACE — control is terrifying. A villain who does not need to raise his voice has complete power. Short sentences build the stillness." },
  { text: "Her hands moved with the same unhurried precision as always — as if what she was doing was entirely ordinary.", type:"direct", explanation:"DIRECT MENACE — the contrast between the casual manner and the terrible act is what creates horror. Ordinary precision in an extraordinary situation." },
  { text: "He was not a large man. He did not look frightening. That, of course, was the point.", type:"direct", explanation:"DIRECT MENACE — subverting expectations. The most dangerous villains often look least threatening. The final short sentence is the twist that makes it chilling." },
  { text: "The guard at the door had been replaced. Nobody mentioned it. Nobody asked.", type:"direct", explanation:"DIRECT MENACE — something has happened and everyone knows better than to comment. Silence as fear. The villain's power is shown through what others dare not say." },
];

const TEAM_COLORS = ['#00c9a7','#f7b731','#e74c3c','#a29bfe','#fd79a8','#74b9ff'];
let teams=[], scores=[], order=[], current=0, answered=false;

document.getElementById('teamCount').addEventListener('input', renderTeamInputs);
renderTeamInputs();

function renderTeamInputs(){
  const n=Math.min(6,Math.max(2,parseInt(document.getElementById('teamCount').value)||3));
  const defaults=['Team 1','Team 2','Team 3','Team 4','Team 5','Team 6'];
  const c=document.getElementById('teamInputs');
  const existing=Array.from(c.querySelectorAll('input')).map(i=>i.value);
  c.innerHTML='';
  for(let i=0;i<n;i++){
    const row=document.createElement('div'); row.className='team-row';
    const dot=document.createElement('div'); dot.className='team-dot'; dot.style.background=TEAM_COLORS[i];
    const inp=document.createElement('input'); inp.type='text'; inp.placeholder=defaults[i]; inp.value=existing[i]||defaults[i];
    row.appendChild(dot); row.appendChild(inp); c.appendChild(row);
  }
}

function startGame(){
  const inputs=document.querySelectorAll('#teamInputs input');
  teams=Array.from(inputs).map(i=>i.value.trim()||i.placeholder);
  scores=teams.map(()=>0);
  order=shuffle([...Array(QUOTES.length).keys()]);
  current=0; answered=false;
  document.getElementById('setup').style.display='none';
  document.getElementById('game').style.display='block';
  document.getElementById('endScreen').style.display='none';
  buildScoreStrip(); buildPips(); loadQ();
}

function buildPips(){
  const c=document.getElementById('pips'); c.innerHTML='';
  QUOTES.forEach((_,i)=>{ const p=document.createElement('div'); p.className='pip'+(i===0?' active':''); p.id='pip-'+i; c.appendChild(p); });
}
function updatePips(){
  QUOTES.forEach((_,i)=>{ const p=document.getElementById('pip-'+i); if(!p)return; p.className='pip'+(i<current?' done':i===current?' active':''); });
}
function buildScoreStrip(){
  const s=document.getElementById('scoreStrip'); s.innerHTML='';
  teams.forEach((name,i)=>{
    const card=document.createElement('div'); card.className='score-card'; card.id='sc-'+i;
    card.style.borderColor=TEAM_COLORS[i]+'55';
    card.innerHTML=`<div class="sc-name" style="color:${TEAM_COLORS[i]}">${name}</div><div class="sc-score" style="color:${TEAM_COLORS[i]}" id="score-${i}">0</div><div class="sc-hint">tap to +1</div>`;
    card.addEventListener('click',()=>award(i)); s.appendChild(card);
  });
}
function award(i){
  scores[i]++;
  document.getElementById('score-'+i).textContent=scores[i];
  const c=document.getElementById('sc-'+i); c.classList.remove('bumped'); void c.offsetWidth; c.classList.add('bumped');
  setTimeout(()=>c.classList.remove('bumped'),350);
}
function loadQ(){
  if(current>=QUOTES.length){ showEnd(); return; }
  answered=false;
  const q=QUOTES[order[current]];
  document.getElementById('quoteText').textContent=q.text;
  document.getElementById('explanation').textContent='';
  document.getElementById('explanation').classList.add('hidden');
  document.getElementById('quoteCard').className='quote-card';
  document.getElementById('nextBtn').style.display='none';
  document.getElementById('progressText').textContent=`Quote ${current+1} / ${QUOTES.length}`;
  document.querySelectorAll('.cat-btn').forEach(b=>{ b.classList.remove('revealed-correct','revealed-wrong'); b.disabled=false; });
  updatePips();
}
function checkAnswer(chosen){
  if(answered)return; answered=true;
  const q=QUOTES[order[current]];
  document.querySelectorAll('.cat-btn').forEach(b=>{
    b.disabled=true;
    b.classList.add(b.dataset.type===q.type?'revealed-correct':'revealed-wrong');
  });
  const ex=document.getElementById('explanation'); ex.textContent=q.explanation; ex.classList.remove('hidden');
  document.getElementById('quoteCard').classList.add('correct');
  const fl=document.getElementById('flash'); fl.className='show'; setTimeout(()=>{ fl.className=''; },600);
  document.getElementById('nextBtn').style.display='inline-block';
}
function nextQuestion(){ current++; if(current>=QUOTES.length) showEnd(); else loadQ(); }
function showEnd(){
  document.getElementById('game').style.display='none';
  document.getElementById('endScreen').style.display='block';
  const max=Math.max(...scores);
  const c=document.getElementById('endScores'); c.innerHTML='';
  teams.map((name,i)=>({name,score:scores[i],color:TEAM_COLORS[i]}))
    .sort((a,b)=>b.score-a.score)
    .forEach(t=>{ const d=document.createElement('div'); d.className='end-card'+(t.score===max?' winner':''); d.style.color=t.color; d.innerHTML=`<div class="end-name">${t.name}</div>${t.score}`; c.appendChild(d); });
}
function restartGame(){
  document.getElementById('setup').style.display='block';
  document.getElementById('game').style.display='none';
  document.getElementById('endScreen').style.display='none';
}
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function toggleFullscreen(){ if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
</script>
</body>
</html>
