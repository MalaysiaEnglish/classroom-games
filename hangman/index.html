<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hangman Modes</title>
  <link rel="stylesheet" href="../style.css">
  <script src="../content.js" onerror="console.log('No content.js')"></script>
  <script src="../questions.js" onerror="console.log('No questions.js')"></script>
  <script src="../sheet-loader.js" onerror="console.log('No sheet-loader.js')"></script>
  <style>
    /* ── Word filter bar ── */
    .qf-bar {
      width:100%; background:rgba(10,18,30,0.92); border:1px solid rgba(255,255,255,0.1);
      border-radius:12px; overflow:hidden; margin-bottom:8px;
    }
    .qf-summary { display:flex; align-items:center; gap:10px; padding:8px 14px; cursor:pointer; user-select:none; font-size:0.82rem; color:#c8bfb0; }
    .qf-summary:hover { background:rgba(255,255,255,0.04); }
    .qf-summary-text { flex:1; }
    .qf-chevron { font-size:0.7rem; transition:transform 0.2s; }
    .qf-bar.open .qf-chevron { transform:rotate(180deg); }
    .qf-detail { display:none; padding:10px 14px 14px; border-top:1px solid rgba(255,255,255,0.07); }
    .qf-bar.open .qf-detail { display:block; }
    .qf-section-label { font-size:0.68rem; font-weight:800; text-transform:uppercase; letter-spacing:0.08em; color:rgba(240,180,41,0.8); margin:8px 0 5px; }
    .qf-section-label:first-child { margin-top:0; }
    .qf-units { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:6px; }
    .qf-unit-btn {
      background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.15);
      color:#c8bfb0; padding:3px 9px; border-radius:5px; font-size:0.72rem;
      cursor:pointer; transition:all 0.18s; white-space:nowrap;
    }
    .qf-unit-btn:hover { background:rgba(240,180,41,0.12); border-color:rgba(240,180,41,0.4); }
    .qf-unit-btn.active { background:rgba(240,180,41,0.22); border-color:rgba(240,180,41,0.65); color:#f0c842; font-weight:600; }
    .qf-checks { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:4px; }
    .qf-check-label {
      display:flex; align-items:center; gap:5px; font-size:0.75rem; color:#c8bfb0;
      cursor:pointer; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1);
      border-radius:5px; padding:3px 8px; transition:all 0.15s;
    }
    .qf-check-label:hover { background:rgba(240,180,41,0.1); }
    .qf-check-label input { accent-color:#f0c842; }
    .qf-count { font-size:0.65rem; color:rgba(240,180,41,0.7); margin-left:2px; }
    .qf-empty { font-size:0.75rem; color:rgba(255,255,255,0.3); font-style:italic; }
    .qf-status { font-size:0.75rem; color:#c8bfb0; padding-top:8px; border-top:1px solid rgba(255,255,255,0.06); margin-top:6px; }
  </style>
</head>

<body class="hangman-page">
  <h1>Hangman Modes</h1>

  <div class="controls">
    <button id="newGame">⚙️ New Game</button>
    <button id="fullscreen">⛶ Fullscreen</button>
    <button id="home">🏠 Home</button>
  </div>

  <div class="game-wrapper">

    <!-- ── SETUP SCREEN ─────────────────────────────── -->
    <div class="hm-setup" id="setupScreen">
      <h2>Set up your game</h2>

      <div class="hm-setup-section">
        <label>How many teams?</label>
        <div class="hm-picker" id="teamPicker">
          <button data-n="2">2</button>
          <button data-n="3">3</button>
          <button data-n="4" class="hm-selected">4</button>
          <button data-n="5">5</button>
        </div>
      </div>

      <div class="hm-setup-section">
        <label>Mode</label>
        <div class="hm-picker" id="modePicker">
          <button data-mode="basic"      class="hm-selected">🔤 Basic</button>
          <button data-mode="consonant">🔡 Consonant</button>
          <button data-mode="diceman">🎲 Diceman</button>
        </div>
      </div>

      <div class="hm-setup-section">
        <label>Word Topics</label>
        <!-- qf-bar style picker -->
        <div class="qf-bar open" id="wordFilterBar">
          <div class="qf-summary" onclick="document.getElementById('wordFilterBar').classList.toggle('open')">
            <span>📚</span>
            <span class="qf-summary-text" id="wordFilterSummary">All built-in topics</span>
            <span class="qf-chevron">▼</span>
          </div>
          <div class="qf-detail">
            <!-- Curriculum words (from content.js / Sheet) -->
            <div id="curriculumSection" style="display:none;">
              <div class="qf-section-label">Curriculum</div>
              <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;align-items:center;">
                <select id="cascadeLevel" onchange="cascadeLevelChange()" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);color:#c8bfb0;border-radius:6px;padding:4px 8px;font-size:0.78rem;cursor:pointer;">
                  <option value="">Level…</option>
                </select>
                <select id="cascadeUnit" onchange="cascadeUnitChange()" disabled style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);color:#c8bfb0;border-radius:6px;padding:4px 8px;font-size:0.78rem;cursor:pointer;opacity:0.5;">
                  <option value="">Unit…</option>
                </select>
                <select id="cascadeLesson" onchange="cascadeLessonChange()" disabled style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);color:#c8bfb0;border-radius:6px;padding:4px 8px;font-size:0.78rem;cursor:pointer;opacity:0.5;">
                  <option value="">All lessons</option>
                </select>
                <button onclick="cascadeClear()" style="background:none;border:none;color:rgba(255,255,255,0.3);font-size:0.72rem;cursor:pointer;padding:2px 4px;">✕ clear</button>
              </div>
              <div style="margin-bottom:6px;">
                <input id="topicSearch" type="text" placeholder="🔍 Search topics…" oninput="filterTopicDisplay()" style="width:100%;box-sizing:border-box;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);color:#c8bfb0;border-radius:6px;padding:5px 10px;font-size:0.78rem;outline:none;">
              </div>
              <div class="qf-checks" id="curriculumTopics"><span class="qf-empty">Select a level to begin</span></div>
            </div>
            <!-- Built-in categories -->
            <div id="builtinSection">
              <div class="qf-section-label">Built-in Topics</div>
              <div class="qf-checks" id="builtinChecks"></div>
            </div>
            <div class="qf-status" id="wordFilterStatus">All built-in topics selected</div>
          </div>
        </div>
      </div>

      <div class="hm-setup-section">
        <label>Custom Words <span style="font-weight:400;opacity:.6;font-size:.8em;">(optional — paste a list for this session)</span></label>
        <textarea id="customWordInput" placeholder="One word or phrase per line, e.g.&#10;PHOTOSYNTHESIS&#10;ROTI CANAI&#10;SOLAR SYSTEM&#10;&#10;These are added to (or replace) the topic selection above." style="width:100%;min-height:110px;background:rgba(10,18,30,0.85);border:1px solid rgba(255,255,255,0.15);border-radius:10px;color:#e8e0cc;font-family:'DM Mono',monospace;font-size:.82rem;padding:12px 14px;resize:vertical;outline:none;line-height:1.6;box-sizing:border-box;"></textarea>
        <div id="customWordCount" style="font-size:.72rem;color:var(--slate,#8a9ab5);margin-top:5px;min-height:1em;font-family:'DM Mono',monospace;letter-spacing:.04em;"></div>
      </div>

      <button class="hm-start-btn" id="startBtn">▶ Start Game</button>
    </div>

    <!-- ── GAME AREA ──────────────────────────────────── -->
    <div class="hm-game" id="gameArea">

      <div id="currentTurn">Get ready!</div>

      <div class="hm-top">
        <canvas id="hangmanCanvas" width="220" height="260"></canvas>
        <div class="hm-word-col">
          <div class="hm-word-board" id="gameBoard"></div>
          <div class="hm-diceman" id="dicePanel">
            <div class="hm-dice-face" id="diceFace">🎲</div>
            <table class="hm-dice-table">
              <tr><td>⚀ 1</td><td>× 10 pts</td></tr>
              <tr><td>⚁ 2</td><td>× 20 pts</td></tr>
              <tr><td>⚂ 3</td><td>× 30 pts</td></tr>
              <tr><td>⚃ 4</td><td class="hm-bankrupt">💸 Bankrupt</td></tr>
              <tr><td>⚄ 5</td><td>× 50 pts</td></tr>
              <tr><td>⚅ 6</td><td>× 100 pts</td></tr>
            </table>
          </div>
        </div>
      </div>

      <div class="hm-letters" id="letters"></div>
      <div class="scoreboard" id="scoreboard"></div>

    </div>

  </div>

  <script>
    const canvas = document.getElementById('hangmanCanvas');
    const ctx    = canvas.getContext('2d');
    const MAX_WRONG = 10;

    let currentWord = '', revealed = [], guessedLetters = new Set();
    let wrongGuesses = 0, totalScores = [], currentWordPoints = [];
    let currentTeam = 0, totalTeams = 0, mode = '', lastRolls = [];
    let words = [];
    let selTeams = 4, selMode = 'basic';

    // ── Built-in word lists ────────────────────────────────
    const BUILT_IN = {
      "animals":    { label:"🐘 Animals",         words:["CAT","DOG","COW","PIG","HEN","FOX","OWL","BAT","BEE","ANT","FISH","FROG","BEAR","DUCK","DEER","LION","WOLF","CRAB","WORM","BIRD","TIGER","HORSE","SHARK","WHALE","EAGLE","SNAKE","MOUSE","RABBIT","PARROT","MONKEY","DOLPHIN","PENGUIN","GIRAFFE","CHEETAH","LEOPARD","GORILLA","FLAMINGO","CROCODILE","TORTOISE","HEDGEHOG","PORCUPINE","CHAMELEON","PELICAN","OCTOPUS","LOBSTER","SEAHORSE","JELLYFISH","STINGRAY","PIRANHA","TOUCAN","PEACOCK","OSTRICH","MEERKAT","PLATYPUS","CHIPMUNK","SQUIRREL","ORANGUTAN","CHIMPANZEE","HIPPOPOTAMUS","RHINOCEROS","ARMADILLO","AXOLOTL","KOMODO DRAGON","NARWHAL","CAPYBARA","PANGOLIN","OKAPI","CASSOWARY","MANATEE","DUGONG","BELUGA WHALE"] },
      "food":       { label:"🍕 Food",             words:["CAKE","RICE","BREAD","MILK","EGGS","SOUP","FISH","MEAT","CORN","APPLE","MANGO","GRAPE","MELON","PIZZA","PASTA","CHIPS","JUICE","TOAST","SALAD","NOODLES","BURGER","COOKIE","HONEY","BUTTER","CHEESE","YOGURT","CEREAL","WAFFLE","SUSHI","TACOS","LAKSA","SATAY","RENDANG","BIRYANI","CURRY","DUMPLING","ROTI CANAI","NASI LEMAK","SPRING ROLLS","CROISSANT","BROWNIE","CHEESECAKE","TIRAMISU","SMOOTHIE","MILKSHAKE","CAPPUCCINO","GUACAMOLE","HUMMUS","BRUSCHETTA","ENCHILADA","BURRITO","PAELLA","RISOTTO","GNOCCHI","FALAFEL","SHAWARMA","SAMOSA","PAKORA","BOUILLABAISSE","RATATOUILLE","COQ AU VIN","CEVICHE","CHIMICHURRI","EMPANADA","CHAR KUEY TEOW","CHILLI PAN MEE","HOKKIEN MEE","BAKKUT TEH","POUTINE","GOULASH","STROGANOFF","SCHNITZEL","MOUSSAKA","SHAKSHUKA","TAGINE","PHO","BIBIMBAP","OKONOMIYAKI"] },
      "sports":     { label:"⚽ Sports",           words:["RUN","SWIM","JUMP","KICK","THROW","CATCH","HIT","RACE","FOOTBALL","TENNIS","CRICKET","HOCKEY","RUGBY","BOXING","CYCLING","SKATING","CLIMBING","DANCING","BOWLING","GOLF","BADMINTON","BASKETBALL","VOLLEYBALL","GYMNASTICS","ATHLETICS","TAEKWONDO","JUDO","WRESTLING","FENCING","ARCHERY","SQUASH","SNOOKER","SKATEBOARDING","SURFING","KAYAKING","ROWING","SAILING","MARATHON","TRIATHLON","DECATHLON","GOALKEEPER","MIDFIELDER","DEFENDER","STRIKER","REFEREE","WEIGHTLIFTING","EQUESTRIAN","PARAGLIDING","POLE VAULT","HAMMER THROW","SHOT PUT","JAVELIN","DISCUS","CHAMPIONSHIP","TOURNAMENT","QUALIFIER","SEMIFINAL","KNOCKOUT","SPONSORSHIP","COMMENTATOR","PENALTY SHOOTOUT","GOLDEN GOAL","SUDDEN DEATH"] },
      "adjectives": { label:"💬 Adjectives",       words:["BIG","TINY","HOT","COLD","WET","DRY","SOFT","HARD","FAST","SLOW","LOUD","QUIET","LIGHT","DARK","CLEAN","DIRTY","HAPPY","SAD","KIND","MEAN","BRAVE","FUNNY","SILLY","SMART","CUTE","UGLY","SWEET","SOUR","SHARP","ROUND","ENORMOUS","MINIATURE","ANCIENT","MODERN","FURIOUS","PEACEFUL","GENEROUS","GREEDY","COWARDLY","FEARLESS","TALENTED","CLUMSY","MYSTERIOUS","OBVIOUS","FILTHY","SPOTLESS","CHEERFUL","MISERABLE","GORGEOUS","HIDEOUS","FRAGILE","STURDY","SHALLOW","RECKLESS","CAUTIOUS","ARROGANT","HUMBLE","SINCERE","DECEITFUL","MELANCHOLIC","EUPHORIC","AMBIVALENT","SYCOPHANTIC","OSTENTATIOUS","MAGNANIMOUS","BELLICOSE","OBSTINATE","LOQUACIOUS","TACITURN","PERSPICACIOUS","OBSEQUIOUS","TENACIOUS","CAPRICIOUS","FASTIDIOUS","SAGACIOUS","MENDACIOUS","NEFARIOUS","VOCIFEROUS","GREGARIOUS","LACONIC","PEDANTIC","SARDONIC","ENIGMATIC"] },
      "igcse_english":{ label:"📝 IGCSE English", words:["METAPHOR","SIMILE","ALLITERATION","ONOMATOPOEIA","PERSONIFICATION","HYPERBOLE","IRONY","SARCASM","OXYMORON","PARADOX","FORESHADOWING","FLASHBACK","NARRATIVE","PROTAGONIST","ANTAGONIST","CHARACTERISATION","SOLILOQUY","MONOLOGUE","DIALOGUE","SYNOPSIS","ATMOSPHERE","IMAGERY","SYMBOLISM","INFERENCE","CONNOTATION","DENOTATION","AMBIGUITY","RHETORIC","PERSUASION","ANAPHORA","JUXTAPOSITION"] },
      "countries":  { label:"🌍 Countries",        words:["MALAYSIA","SINGAPORE","INDONESIA","THAILAND","VIETNAM","PHILIPPINES","CAMBODIA","MYANMAR","BRUNEI","LAOS","CHINA","JAPAN","SOUTH KOREA","MONGOLIA","TAIWAN","INDIA","PAKISTAN","SRI LANKA","NEPAL","BANGLADESH","AUSTRALIA","NEW ZEALAND","EGYPT","MOROCCO","KENYA","BRAZIL","ARGENTINA","COLOMBIA","MEXICO","CANADA","UNITED KINGDOM","FRANCE","GERMANY","ITALY","SPAIN","PORTUGAL","NETHERLANDS","SWEDEN","NORWAY","TURKEY"] },
      "malaysia":   { label:"🇲🇾 Malaysia",        words:["KUALA LUMPUR","PENANG","MALACCA","JOHOR BAHRU","KOTA KINABALU","KUCHING","PUTRAJAYA","PETRONAS","BATU CAVES","LANGKAWI","CAMERON HIGHLANDS","GENTING HIGHLANDS","SUNWAY LAGOON","KLCC","NASI LEMAK","ROTI CANAI","CHAR KUEY TEOW","LAKSA","SATAY","TEH TARIK","CENDOL","DURIAN","MANGOSTEEN","RAMBUTAN","MERDEKA","RINGGIT","HORNBILL","PROBOSCIS MONKEY","ORANGUTAN","TAPIR","SUNBEAR"] },
      "science":    { label:"🔬 Science",          words:["PHOTOSYNTHESIS","MITOCHONDRIA","CHROMOSOME","ECOSYSTEM","EVOLUTION","RESPIRATION","DIGESTION","CIRCULATION","GERMINATION","COMBUSTION","GRAVITY","MAGNETISM","ELECTRICITY","RADIATION","REFRACTION","CONDENSATION","EVAPORATION","PRECIPITATION","SUBLIMATION","HYDROGEN","NITROGEN","OXYGEN","CARBON DIOXIDE","AMMONIA","ELEMENT","COMPOUND","MOLECULE","ATOM","NEUTRON","PROTON","ELECTROMAGNETISM","THERMODYNAMICS","BIOLUMINESCENCE","CHEMOSYNTHESIS","TECTONIC PLATES","SEISMOGRAPH","SPECTROSCOPY","ELECTROLYSIS","CATALYSIS","STOICHIOMETRY","QUANTUM MECHANICS","SUPERCONDUCTOR","SEMICONDUCTOR","TRANSISTOR","PHOTOELECTRIC","RADIOACTIVE DECAY","NUCLEAR FISSION","CENTRIPETAL FORCE"] },
      "technology": { label:"💻 Technology",       words:["ALGORITHM","ARTIFICIAL INTELLIGENCE","BLOCKCHAIN","ENCRYPTION","CYBERSECURITY","PROGRAMMING","DEBUGGING","FRAMEWORK","REPOSITORY","CLOUD STORAGE","VIRTUAL REALITY","AUGMENTED REALITY","MACHINE LEARNING","NEURAL NETWORK","DEEP LEARNING","SEMICONDUCTOR","MICROPROCESSOR","QUANTUM COMPUTING","BANDWIDTH","LATENCY","FIREWALL","MALWARE","PHISHING","OPEN SOURCE","CONTAINERISATION","VERSION CONTROL","AGILE METHODOLOGY"] },
      "jobs":       { label:"💼 Jobs",             words:["ARCHITECT","ACCOUNTANT","ASTRONAUT","ARCHAEOLOGIST","SURGEON","PHYSIOTHERAPIST","PHARMACIST","PARAMEDIC","ENGINEER","PROGRAMMER","TECHNICIAN","ELECTRICIAN","PLUMBER","JOURNALIST","PHOTOGRAPHER","FILMMAKER","BROADCASTER","BARRISTER","SOLICITOR","MAGISTRATE","DETECTIVE","AMBASSADOR","DIPLOMAT","POLITICIAN","CHOREOGRAPHER","CONDUCTOR","COMPOSER","ILLUSTRATOR","SCULPTOR","ENTREPRENEUR","CONSULTANT","ANALYST","VETERINARIAN","BOTANIST"] },
    };

    // ── Word selection state ───────────────────────────────
    // selectedSources: Set of keys — each key is either a builtin key or a curriculum topic string
    const selectedSources = new Set(); // empty = all built-ins
    let curriculumWordMap = {}; // topic → [words]

    function parseCustomWords() {
      const raw = (document.getElementById('customWordInput') || {}).value || '';
      return raw.split('\n')
        .map(l => l.split('|')[0].trim().toUpperCase())
        .filter(l => l && !l.startsWith('#'));
    }

    function buildWordPool() {
      const custom = parseCustomWords();
      if (custom.length) {
        // Custom words only — ignore topic picker
        return custom;
      }
      if (selectedSources.size === 0) {
        // All built-ins
        return Object.values(BUILT_IN).flatMap(c => c.words);
      }
      const pool = [];
      selectedSources.forEach(key => {
        if (BUILT_IN[key]) pool.push(...BUILT_IN[key].words);
        else if (curriculumWordMap[key]) pool.push(...curriculumWordMap[key]);
      });
      return pool.length ? pool : Object.values(BUILT_IN).flatMap(c => c.words);
    }

    function updateWordFilterSummary() {
      const pool = buildWordPool();
      const summaryEl = document.getElementById('wordFilterSummary');
      const statusEl  = document.getElementById('wordFilterStatus');
      if (selectedSources.size === 0) {
        summaryEl.textContent = 'All built-in topics';
        statusEl.textContent  = pool.length + ' words available';
      } else {
        summaryEl.textContent = selectedSources.size + ' topic' + (selectedSources.size > 1 ? 's' : '') + ' selected · ' + pool.length + ' words';
        statusEl.textContent  = pool.length + ' words available';
      }
    }

    function buildWordPicker() {
      // ── Curriculum section ──
      const hasCurriculum = window.CUSTOM_CONTENT?.words?.length > 0;
      const currSection = document.getElementById('curriculumSection');
      currSection.style.display = hasCurriculum ? 'block' : 'none';

      if (hasCurriculum) {
        window.CUSTOM_CONTENT.words.forEach(w => {
          const t = w.topic || 'Custom';
          if (!curriculumWordMap[t]) curriculumWordMap[t] = [];
          curriculumWordMap[t].push(w.word);
        });

        // Populate level dropdown from topic strings AND numeric level field
        const levelSet = new Set();
        window.CUSTOM_CONTENT.words.forEach(w => {
          const m = w.topic && w.topic.match(/^L(\d+)\//);
          if (m) levelSet.add(parseInt(m[1]));
          else if (w.level) levelSet.add(parseInt(w.level));
        });
        const levelSel = document.getElementById('cascadeLevel');
        [...levelSet].sort((a,b) => a-b).forEach(l => {
          const opt = document.createElement('option');
          opt.value = l; opt.textContent = 'Level ' + l;
          levelSel.appendChild(opt);
        });

        renderTopicChips(Object.keys(curriculumWordMap).sort((a,b) => a.localeCompare(b, undefined, {numeric:true})));
      }

      // ── Built-in section ──
      const builtinEl = document.getElementById('builtinChecks');
      builtinEl.innerHTML = '';
      Object.entries(BUILT_IN).forEach(([key, cat]) => {
        const label = document.createElement('label'); label.className = 'qf-check-label';
        const cb = document.createElement('input'); cb.type = 'checkbox';
        cb.onchange = () => {
          if (cb.checked) selectedSources.add(key);
          else selectedSources.delete(key);
          updateWordFilterSummary();
        };
        const span = document.createElement('span'); span.textContent = cat.label;
        const cs = document.createElement('span'); cs.className = 'qf-count'; cs.textContent = cat.words.length;
        label.appendChild(cb); label.appendChild(span); label.appendChild(cs);
        builtinEl.appendChild(label);
      });

      updateWordFilterSummary();
    }

    // ── Cascade picker functions ──────────────────────────────
    function getFilteredTopics() {
      const level = document.getElementById('cascadeLevel').value;
      const unit  = document.getElementById('cascadeUnit').value;
      const lesson = document.getElementById('cascadeLesson').value;
      const search = (document.getElementById('topicSearch').value || '').toLowerCase();

      return Object.keys(curriculumWordMap).filter(t => {
        const mL = t.match(/^L(\d+)\//);
        const mU = t.match(/^L\d+\/U(\d+)/);
        const mLs = t.match(/^L\d+\/U\d+\/L(\d+)/);
        if (level  && (!mL  || mL[1]  !== level))  return false;
        if (unit   && (!mU  || mU[1]  !== unit))   return false;
        if (lesson && (!mLs || mLs[1] !== lesson)) return false;
        if (search && !t.toLowerCase().includes(search)) return false;
        return true;
      }).sort((a,b) => a.localeCompare(b, undefined, {numeric:true}));
    }

    function renderTopicChips(topics) {
      const el = document.getElementById('curriculumTopics');
      if (!topics.length) { el.innerHTML = '<span class="qf-empty">No topics found</span>'; return; }
      el.innerHTML = '';
      topics.forEach(topic => {
        const words = curriculumWordMap[topic] || [];
        const label = document.createElement('label'); label.className = 'qf-check-label';
        const cb = document.createElement('input'); cb.type = 'checkbox';
        cb.checked = selectedSources.has(topic);
        cb.onchange = () => {
          if (cb.checked) selectedSources.add(topic);
          else selectedSources.delete(topic);
          updateWordFilterSummary();
        };
        const span = document.createElement('span'); span.textContent = topic;
        const cs = document.createElement('span'); cs.className = 'qf-count'; cs.textContent = words.length;
        label.appendChild(cb); label.appendChild(span); label.appendChild(cs);
        el.appendChild(label);
      });
    }

    function cascadeLevelChange() {
      const level = document.getElementById('cascadeLevel').value;
      const unitSel = document.getElementById('cascadeUnit');
      const lessonSel = document.getElementById('cascadeLesson');
      unitSel.innerHTML = '<option value="">Unit…</option>';
      lessonSel.innerHTML = '<option value="">All lessons</option>';
      unitSel.disabled = !level; unitSel.style.opacity = level ? '1' : '0.5';
      lessonSel.disabled = true; lessonSel.style.opacity = '0.5';
      if (level) {
        const units = new Set();
        Object.keys(curriculumWordMap).forEach(t => {
          const m = t.match(/^L(\d+)\/U(\d+)/);
          if (m && m[1] === level) units.add(parseInt(m[2]));
        });
        [...units].sort((a,b) => a-b).forEach(u => {
          const opt = document.createElement('option'); opt.value = u; opt.textContent = 'Unit ' + u;
          unitSel.appendChild(opt);
        });
      }
      renderTopicChips(getFilteredTopics());
    }

    function cascadeUnitChange() {
      const level = document.getElementById('cascadeLevel').value;
      const unit  = document.getElementById('cascadeUnit').value;
      const lessonSel = document.getElementById('cascadeLesson');
      lessonSel.innerHTML = '<option value="">All lessons</option>';
      lessonSel.disabled = !unit; lessonSel.style.opacity = unit ? '1' : '0.5';
      if (unit) {
        const lessons = new Set();
        Object.keys(curriculumWordMap).forEach(t => {
          const m = t.match(/^L(\d+)\/U(\d+)\/L(\d+)/);
          if (m && m[1] === level && m[2] === unit) lessons.add(parseInt(m[3]));
        });
        [...lessons].sort((a,b) => a-b).forEach(l => {
          const opt = document.createElement('option'); opt.value = l; opt.textContent = 'Lesson ' + l;
          lessonSel.appendChild(opt);
        });
      }
      renderTopicChips(getFilteredTopics());
    }

    function cascadeLessonChange() {
      renderTopicChips(getFilteredTopics());
    }

    function cascadeClear() {
      document.getElementById('cascadeLevel').value = '';
      document.getElementById('cascadeUnit').innerHTML = '<option value="">Unit…</option>';
      document.getElementById('cascadeUnit').disabled = true; document.getElementById('cascadeUnit').style.opacity = '0.5';
      document.getElementById('cascadeLesson').innerHTML = '<option value="">All lessons</option>';
      document.getElementById('cascadeLesson').disabled = true; document.getElementById('cascadeLesson').style.opacity = '0.5';
      document.getElementById('topicSearch').value = '';
      renderTopicChips(Object.keys(curriculumWordMap).sort((a,b) => a.localeCompare(b, undefined, {numeric:true})));
    }

    function filterTopicDisplay() {
      renderTopicChips(getFilteredTopics());
    }

    // ── Picker setup ───────────────────────────────────────
    function pickBtn(groupId, key, val) {
      document.querySelectorAll('#'+groupId+' button').forEach(b =>
        b.classList.toggle('hm-selected', b.dataset[key] === val)
      );
    }

    document.querySelectorAll('#teamPicker button').forEach(b =>
      b.onclick = () => { selTeams = +b.dataset.n; pickBtn('teamPicker','n',b.dataset.n); }
    );
    document.querySelectorAll('#modePicker button').forEach(b =>
      b.onclick = () => { selMode = b.dataset.mode; pickBtn('modePicker','mode',b.dataset.mode); }
    );

    document.getElementById('startBtn').onclick = () => {
      words = buildWordPool();
      if (!words.length) words = Object.values(BUILT_IN).flatMap(c => c.words);
      document.getElementById('setupScreen').style.display = 'none';
      document.getElementById('gameArea').style.display    = 'flex';
      initGame(selTeams, selMode);
    };

    document.getElementById('newGame').onclick = () => {
      document.getElementById('setupScreen').style.display = 'flex';
      document.getElementById('gameArea').style.display    = 'none';
    };

    // ── Hangman drawing ────────────────────────────────────
    function drawHangman(s) {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.lineWidth = 5; ctx.strokeStyle = '#222'; ctx.lineCap = 'round';
      const d = (x,y,x2,y2) => { ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x2,y2); ctx.stroke(); };
      if (s>=1)  d(10,240,210,240);
      if (s>=2)  d(50,240,50,30);
      if (s>=3)  d(50,30,150,30);
      if (s>=4)  d(150,30,150,65);
      if (s>=5)  { ctx.beginPath(); ctx.arc(150,88,23,0,Math.PI*2); ctx.stroke(); }
      if (s>=6)  d(150,111,150,175);
      if (s>=7)  d(150,130,115,160);
      if (s>=8)  d(150,130,185,160);
      if (s>=9)  d(150,175,120,220);
      if (s>=10) d(150,175,180,220);
    }

    function updateVowelLocks() {
      if (mode !== 'consonant') return;
      document.querySelectorAll('#letters button').forEach(btn => {
        if (!'AEIOU'.includes(btn.textContent) || guessedLetters.has(btn.textContent)) return;
        const locked = currentWordPoints[currentTeam] < 1;
        btn.disabled = locked;
        btn.classList.toggle('hm-vowel-locked', locked);
      });
    }

    function renderScoreboard() {
      const sb = document.getElementById('scoreboard'); sb.innerHTML = '';
      totalScores.forEach((pts, i) => {
        const d = document.createElement('div');
        d.className = 'team-score' + (i === currentTeam ? ' active' : '');
        d.innerHTML = '<strong>Team '+(i+1)+'</strong><br>'+pts;
        if (currentWordPoints[i] > 0) d.innerHTML += '<br><small>+'+currentWordPoints[i]+' this word</small>';
        if (lastRolls[i])             d.innerHTML += '<br><small>'+lastRolls[i]+'</small>';
        sb.appendChild(d);
      });
      updateVowelLocks();
    }

    function buildLetters() {
      const l = document.getElementById('letters'); l.innerHTML = '';
      'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(ch => {
        const b = document.createElement('button'); b.textContent = ch;
        b.onclick = () => guessLetter(ch, b); l.appendChild(b);
      });
      updateVowelLocks();
    }

    function renderBoard() {
      const board = document.getElementById('gameBoard');
      const available = (board.offsetWidth || window.innerWidth * 0.9) - 40;
      const slots = revealed.reduce((n, ch) => n + (ch === '/' ? 0.6 : 1.2), 0);
      const px = Math.min(48, Math.max(14, Math.floor(available / slots)));
      const size = px + 'px';
      board.style.flexWrap = 'nowrap'; board.style.overflowX = 'auto';
      board.innerHTML = revealed.map(ch => {
        if (ch === '/') return '<span style="display:inline-block;width:'+Math.round(px*0.6)+'px;flex-shrink:0"> </span>';
        const isLetter = ch !== '_';
        return '<span style="display:inline-block;width:'+Math.round(px*1.05)+'px;flex-shrink:0;text-align:center;font-size:'+size+';border-bottom:'+Math.max(2,Math.round(px/14))+'px solid #0f172a;margin:0 1px;line-height:1.4;font-weight:900;color:'+(isLetter?'#c0392b':'#0f172a')+'">'+(isLetter?ch:'_')+'</span>';
      }).join('');
    }

    function showNextWordButton() {
      // disable all letter buttons while waiting
      document.querySelectorAll('.letter-btn').forEach(b => b.disabled = true);
      let btn = document.getElementById('nextWordBtn');
      if (!btn) {
        btn = document.createElement('button');
        btn.id = 'nextWordBtn';
        btn.style.cssText = 'display:block;margin:1rem auto;padding:0.75rem 2rem;font-size:1.4rem;background:#22c55e;color:#fff;border:none;border-radius:0.5rem;cursor:pointer;font-weight:bold;';
        btn.textContent = '▶ Next Word';
        const board = document.getElementById('gameBoard');
        board.parentNode.insertBefore(btn, board.nextSibling);
      }
      btn.style.display = 'block';
      btn.onclick = () => { btn.style.display = 'none'; nextWord(); };
    }

    function nextWord() {
      currentWord       = words[Math.floor(Math.random()*words.length)].toUpperCase();
      revealed          = currentWord.split('').map(c => c===' ' ? '/' : '_');
      guessedLetters    = new Set();
      wrongGuesses      = 0;
      currentWordPoints = Array(totalTeams).fill(0);
      lastRolls         = Array(totalTeams).fill(null);
      renderBoard(); drawHangman(0); renderScoreboard(); buildLetters();
    }

    function initGame(teamCount, gameMode) {
      totalTeams        = teamCount;
      totalScores       = Array(teamCount).fill(0);
      currentWordPoints = Array(teamCount).fill(0);
      currentTeam       = 0;
      lastRolls         = Array(teamCount).fill(null);
      mode              = gameMode;
      document.getElementById('dicePanel').style.display = gameMode==='diceman' ? 'block' : 'none';
      document.getElementById('currentTurn').textContent = "Team 1's turn!";
      nextWord();
    }

    function guessLetter(letter, btn) {
      if (guessedLetters.has(letter)) return;
      guessedLetters.add(letter);
      const isVowel = 'AEIOU'.includes(letter);
      if (mode==='consonant' && isVowel) {
        if (currentWordPoints[currentTeam] < 1) {
          document.getElementById('currentTurn').textContent = 'Team '+(currentTeam+1)+' needs 1 point this word to buy a vowel!';
          guessedLetters.delete(letter); return;
        }
        totalScores[currentTeam]--;
      }
      btn.disabled = true;
      let hits = 0;
      currentWord.split('').forEach((ch,i) => { if(ch===letter){ revealed[i]=letter; hits++; } });
      renderBoard();
      if (hits === 0) {
        wrongGuesses++; drawHangman(wrongGuesses);
        currentTeam = (currentTeam+1) % totalTeams;
        document.getElementById('currentTurn').textContent = 'Wrong! Team '+(currentTeam+1)+"'s turn";
        if (wrongGuesses >= MAX_WRONG) {
          setTimeout(() => {
            document.getElementById('currentTurn').textContent = 'Game over! The word was: '+currentWord;
            showNextWordButton();
          }, 500);
        }
      } else {
        if (mode==='consonant' && !isVowel) {
          currentWordPoints[currentTeam] += hits; totalScores[currentTeam] += hits;
        } else if (mode==='diceman') { rollDie(hits);
        } else { totalScores[currentTeam] += hits; }
      }
      renderScoreboard();
      if (!revealed.includes('_')) {
        setTimeout(() => {
          document.getElementById('currentTurn').textContent = '🎉 Team '+(currentTeam+1)+' solved it! +10 bonus!';
          totalScores[currentTeam] += 10; renderScoreboard(); showNextWordButton();
        }, 400);
      }
    }

    function rollDie(hits) {
      const faces = ['⚀','⚁','⚂','⚃','⚄','⚅'];
      const roll  = Math.floor(Math.random()*6)+1;
      document.getElementById('diceFace').textContent = faces[roll-1];
      let pts=0, effect='';
      switch(roll){
        case 1: pts=hits*10;  effect='×10 (+'+pts+')'; break;
        case 2: pts=hits*20;  effect='×20 (+'+pts+')'; break;
        case 3: pts=hits*30;  effect='×30 (+'+pts+')'; break;
        case 4: pts=-totalScores[currentTeam]; effect='💸 Bankrupt'; break;
        case 5: pts=hits*50;  effect='×50 (+'+pts+')'; break;
        case 6: pts=hits*100; effect='×100 (+'+pts+')'; break;
      }
      totalScores[currentTeam] += pts; lastRolls[currentTeam] = effect; renderScoreboard();
    }

    document.getElementById('fullscreen').onclick = () => document.documentElement.requestFullscreen?.();
    document.getElementById('home').onclick       = () => window.location.href = '../index.html';

    drawHangman(0);
    window.addEventListener('resize', () => { if (currentWord) renderBoard(); });
    window.addEventListener('load', async () => {
      if (window.SHEET_LOADED) await window.SHEET_LOADED;
      buildWordPicker();
      const ta = document.getElementById('customWordInput');
      const countEl = document.getElementById('customWordCount');
      ta.addEventListener('input', () => {
        const words = parseCustomWords();
        countEl.textContent = words.length
          ? words.length + ' word' + (words.length > 1 ? 's' : '') + ' ready — topic selection will be ignored'
          : '';
      });
    });
  </script>
</body>
</html>
