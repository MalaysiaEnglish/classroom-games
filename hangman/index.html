<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hangman Modes</title>
  <link rel="stylesheet" href="../style.css">
  <script src="../content.js" onerror="console.log('No content.js')"></script>
</head>

<body class="hangman-page">
  <h1>Hangman Modes</h1>

  <div class="controls">
    <button id="newGame">⚙️ New Game</button>
    <button id="fullscreen">⛶ Fullscreen</button>
    <button id="home">🏠 Home</button>
  </div>

  <div class="game-wrapper">

    <!-- ── SETUP SCREEN ─────────────────────────────── -->
    <div class="hm-setup" id="setupScreen">
      <h2>Set up your game</h2>

      <div class="hm-setup-section">
        <label>How many teams?</label>
        <div class="hm-picker" id="teamPicker">
          <button data-n="2">2</button>
          <button data-n="3">3</button>
          <button data-n="4" class="hm-selected">4</button>
          <button data-n="5">5</button>
        </div>
      </div>

      <div class="hm-setup-section">
        <label>Mode</label>
        <div class="hm-picker" id="modePicker">
          <button data-mode="basic"      class="hm-selected">🔤 Basic</button>
          <button data-mode="consonant">🔡 Consonant</button>
          <button data-mode="diceman">🎲 Diceman</button>
        </div>
      </div>

      <div class="hm-setup-section">

      </div>

      <div class="hm-setup-section">
        <label>Word Topics <span id="wordlistCount" style="font-weight:400;font-size:0.8rem;color:var(--text-dim);margin-left:6px;">All topics selected</span></label>
        <div class="hm-picker" id="wordlistPicker" style="display:flex;flex-direction:column;gap:6px;max-height:260px;overflow-y:auto;padding-right:4px;">
          <!-- Populated dynamically -->
        </div>
      </div>

      <button class="hm-start-btn" id="startBtn">▶ Start Game</button>
    </div>

    <!-- ── GAME AREA ──────────────────────────────────── -->
    <div class="hm-game" id="gameArea">

      <div id="currentTurn">Get ready!</div>

      <!-- Top section: canvas + word board side by side -->
      <div class="hm-top">
        <canvas id="hangmanCanvas" width="220" height="260"></canvas>
        <div class="hm-word-col">
          <div class="hm-word-board" id="gameBoard"></div>
          <!-- Diceman panel lives HERE, beside the word, not floating -->
          <div class="hm-diceman" id="dicePanel">
            <div class="hm-dice-face" id="diceFace">🎲</div>
            <table class="hm-dice-table">
              <tr><td>⚀ 1</td><td>× 10 pts</td></tr>
              <tr><td>⚁ 2</td><td>× 20 pts</td></tr>
              <tr><td>⚂ 3</td><td>× 30 pts</td></tr>
              <tr><td>⚃ 4</td><td class="hm-bankrupt">💸 Bankrupt</td></tr>
              <tr><td>⚄ 5</td><td>× 50 pts</td></tr>
              <tr><td>⚅ 6</td><td>× 100 pts</td></tr>
            </table>
          </div>
        </div>
      </div>

      <!-- Letter grid -->
      <div class="hm-letters" id="letters"></div>

      <!-- Scoreboard -->
      <div class="scoreboard" id="scoreboard"></div>

    </div><!-- end gameArea -->

  </div><!-- end game-wrapper -->

  <script>
    const canvas = document.getElementById('hangmanCanvas');
    const ctx    = canvas.getContext('2d');
    const MAX_WRONG = 10;

    let currentWord = '', revealed = [], guessedLetters = new Set();
    let wrongGuesses = 0, totalScores = [], currentWordPoints = [];
    let currentTeam = 0, totalTeams = 0, mode = '', lastRolls = [];

    const wordLists = {};   // filled from wordlists.json
    let words = [];
    let selTeams = 4, selMode = 'basic', selList = '';

    // ── Build category picker (multi-select checkboxes) ─────
    const selectedTopics = new Set(); // tracks which topic keys are ticked

    function buildWordPool() {
      if (selectedTopics.size === 0) {
        words = buildRandomPool();
      } else {
        words = [];
        for (const [key, cat] of Object.entries(wordLists)) {
          if (selectedTopics.has(key)) words.push(...cat.words);
        }
        if (!words.length) words = buildRandomPool();
      }
    }

    function buildCategoryPicker() {
      const picker = document.getElementById('wordlistPicker');
      picker.innerHTML = '';

      // Collect topics — merge words from all matching entries per topic label
      const topicMap = {};   // label → { keys[], words[] }
      for (const [key, cat] of Object.entries(wordLists)) {
        if (key.startsWith('_')) continue;
        const lbl = cat.label;
        if (!topicMap[lbl]) topicMap[lbl] = { keys: [], words: [] };
        topicMap[lbl].keys.push(key);
        topicMap[lbl].words.push(...cat.words);
      }

      // Helper: rebuild word pool and update count label
      function refreshPool() {
        buildWordPool();
        const countEl = document.getElementById('wordlistCount');
        if (countEl) {
          if (selectedTopics.size === 0) {
            countEl.textContent = 'All topics · ' + words.length + ' words';
          } else {
            countEl.textContent = selectedTopics.size + ' topic' + (selectedTopics.size > 1 ? 's' : '') + ' selected · ' + words.length + ' words';
          }
        }
      }

      // "All topics" toggle at the top
      const allBtn = document.createElement('button');
      allBtn.textContent = '🎲 All topics';
      allBtn.className = 'hm-selected';
      allBtn.style.cssText = 'margin-bottom:6px;';
      allBtn.onclick = () => {
        selectedTopics.clear();
        picker.querySelectorAll('.topic-cb').forEach(cb => cb.checked = false);
        allBtn.classList.add('hm-selected');
        refreshPool();
      };
      picker.appendChild(allBtn);

      // One checkbox row per topic
      for (const [lbl, data] of Object.entries(topicMap)) {
        const keys = data.keys;
        const row = document.createElement('label');
        row.style.cssText = 'display:flex;align-items:center;gap:8px;cursor:pointer;padding:5px 10px;border-radius:8px;border:1px solid var(--glass-border);background:var(--glass);transition:background 0.15s;';
        row.onmouseover = () => row.style.background = 'var(--glass-hi)';
        row.onmouseout  = () => { if (!row.querySelector('input').checked) row.style.background = 'var(--glass)'; };

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.className = 'topic-cb';
        cb.style.cssText = 'accent-color:var(--accent);width:15px;height:15px;cursor:pointer;';
        cb.onchange = () => {
          keys.forEach(k => cb.checked ? selectedTopics.add(k) : selectedTopics.delete(k));
          // Update "All topics" button state
          allBtn.classList.toggle('hm-selected', selectedTopics.size === 0);
          row.style.background = cb.checked ? 'rgba(0,201,167,0.12)' : 'var(--glass)';
          refreshPool();
        };

        const span = document.createElement('span');
        span.textContent = lbl;
        span.style.cssText = 'font-size:0.88rem;font-weight:600;';

        row.appendChild(cb);
        row.appendChild(span);
        picker.appendChild(row);
      }

      // Initial pool
      refreshPool();
    }

    function buildRandomPool() {
      const pool = [];
      for (const [key, cat] of Object.entries(wordLists)) {
        if (key.startsWith('_')) continue;
        pool.push(...cat.words);
      }
      return pool.length ? pool : ['ELEPHANT','TIGER','PENGUIN','DOLPHIN','GIRAFFE'];
    }

    // ── Full word list embedded (works without a server) ──
    const BUILT_IN = {
      "animals":    { label:"🐘 Animals",         words:["CAT","DOG","COW","PIG","HEN","FOX","OWL","BAT","BEE","ANT","FISH","FROG","BEAR","DUCK","DEER","LION","WOLF","CRAB","WORM","BIRD","TIGER","HORSE","SHARK","WHALE","EAGLE","SNAKE","MOUSE","RABBIT","PARROT","MONKEY","DOLPHIN","PENGUIN","GIRAFFE","CHEETAH","LEOPARD","GORILLA","FLAMINGO","CROCODILE","TORTOISE","HEDGEHOG","PORCUPINE","CHAMELEON","PELICAN","OCTOPUS","LOBSTER","SEAHORSE","JELLYFISH","STINGRAY","PIRANHA","TOUCAN","PEACOCK","OSTRICH","MEERKAT","PLATYPUS","CHIPMUNK","SQUIRREL","ORANGUTAN","CHIMPANZEE","HIPPOPOTAMUS","RHINOCEROS","ARMADILLO","AXOLOTL","KOMODO DRAGON","NARWHAL","CAPYBARA","PANGOLIN","OKAPI","CASSOWARY","MANATEE","DUGONG","BELUGA WHALE"] },
      "food":       { label:"🍕 Food",             words:["CAKE","RICE","BREAD","MILK","EGGS","SOUP","FISH","MEAT","CORN","APPLE","MANGO","GRAPE","MELON","PIZZA","PASTA","CHIPS","JUICE","TOAST","SALAD","NOODLES","BURGER","COOKIE","HONEY","BUTTER","CHEESE","YOGURT","CEREAL","WAFFLE","SUSHI","TACOS","LAKSA","SATAY","RENDANG","BIRYANI","CURRY","DUMPLING","ROTI CANAI","NASI LEMAK","SPRING ROLLS","CROISSANT","BROWNIE","CHEESECAKE","TIRAMISU","SMOOTHIE","MILKSHAKE","CAPPUCCINO","GUACAMOLE","HUMMUS","BRUSCHETTA","ENCHILADA","BURRITO","PAELLA","RISOTTO","GNOCCHI","FALAFEL","SHAWARMA","SAMOSA","PAKORA","BOUILLABAISSE","RATATOUILLE","COQ AU VIN","CEVICHE","CHIMICHURRI","EMPANADA","CHAR KUEY TEOW","CHILLI PAN MEE","HOKKIEN MEE","BAKKUT TEH","POUTINE","GOULASH","STROGANOFF","SCHNITZEL","MOUSSAKA","SHAKSHUKA","TAGINE","PHO","BIBIMBAP","OKONOMIYAKI"] },
      "sports":     { label:"⚽ Sports",           words:["RUN","SWIM","JUMP","KICK","THROW","CATCH","HIT","RACE","FOOTBALL","TENNIS","CRICKET","HOCKEY","RUGBY","BOXING","CYCLING","SKATING","CLIMBING","DANCING","BOWLING","GOLF","BADMINTON","BASKETBALL","VOLLEYBALL","GYMNASTICS","ATHLETICS","TAEKWONDO","JUDO","WRESTLING","FENCING","ARCHERY","SQUASH","SNOOKER","SKATEBOARDING","SURFING","KAYAKING","ROWING","SAILING","MARATHON","TRIATHLON","DECATHLON","GOALKEEPER","MIDFIELDER","DEFENDER","STRIKER","REFEREE","WEIGHTLIFTING","EQUESTRIAN","PARAGLIDING","POLE VAULT","HAMMER THROW","SHOT PUT","JAVELIN","DISCUS","CHAMPIONSHIP","TOURNAMENT","QUALIFIER","SEMIFINAL","KNOCKOUT","SPONSORSHIP","COMMENTATOR","PENALTY SHOOTOUT","GOLDEN GOAL","SUDDEN DEATH"] },
      "adjectives": { label:"💬 Adjectives",       words:["BIG","TINY","HOT","COLD","WET","DRY","SOFT","HARD","FAST","SLOW","LOUD","QUIET","LIGHT","DARK","CLEAN","DIRTY","HAPPY","SAD","KIND","MEAN","BRAVE","FUNNY","SILLY","SMART","CUTE","UGLY","SWEET","SOUR","SHARP","ROUND","ENORMOUS","MINIATURE","ANCIENT","MODERN","FURIOUS","PEACEFUL","GENEROUS","GREEDY","COWARDLY","FEARLESS","TALENTED","CLUMSY","MYSTERIOUS","OBVIOUS","FILTHY","SPOTLESS","CHEERFUL","MISERABLE","GORGEOUS","HIDEOUS","FRAGILE","STURDY","SHALLOW","RECKLESS","CAUTIOUS","ARROGANT","HUMBLE","SINCERE","DECEITFUL","MELANCHOLIC","EUPHORIC","AMBIVALENT","SYCOPHANTIC","OSTENTATIOUS","MAGNANIMOUS","BELLICOSE","OBSTINATE","LOQUACIOUS","TACITURN","PERSPICACIOUS","OBSEQUIOUS","TENACIOUS","CAPRICIOUS","FASTIDIOUS","SAGACIOUS","MENDACIOUS","NEFARIOUS","VOCIFEROUS","GREGARIOUS","LACONIC","PEDANTIC","SARDONIC","ENIGMATIC"] },
      "igcse_english":{ label:"📝 IGCSE English", words:["METAPHOR","SIMILE","ALLITERATION","ONOMATOPOEIA","PERSONIFICATION","HYPERBOLE","IRONY","SARCASM","OXYMORON","PARADOX","FORESHADOWING","FLASHBACK","NARRATIVE","PROTAGONIST","ANTAGONIST","CHARACTERISATION","SOLILOQUY","MONOLOGUE","DIALOGUE","SYNOPSIS","ATMOSPHERE","IMAGERY","SYMBOLISM","INFERENCE","CONNOTATION","DENOTATION","AMBIGUITY","RHETORIC","PERSUASION","ANAPHORA","JUXTAPOSITION"] },
      "countries":  { label:"🌍 Countries",        words:["MALAYSIA","SINGAPORE","INDONESIA","THAILAND","VIETNAM","PHILIPPINES","CAMBODIA","MYANMAR","BRUNEI","LAOS","CHINA","JAPAN","SOUTH KOREA","MONGOLIA","TAIWAN","INDIA","PAKISTAN","SRI LANKA","NEPAL","BANGLADESH","AUSTRALIA","NEW ZEALAND","EGYPT","MOROCCO","KENYA","BRAZIL","ARGENTINA","COLOMBIA","MEXICO","CANADA","UNITED KINGDOM","FRANCE","GERMANY","ITALY","SPAIN","PORTUGAL","NETHERLANDS","SWEDEN","NORWAY","TURKEY"] },
      "malaysia":   { label:"🇲🇾 Malaysia",        words:["KUALA LUMPUR","PENANG","MALACCA","JOHOR BAHRU","KOTA KINABALU","KUCHING","PUTRAJAYA","PETRONAS","BATU CAVES","LANGKAWI","CAMERON HIGHLANDS","GENTING HIGHLANDS","SUNWAY LAGOON","KLCC","NASI LEMAK","ROTI CANAI","CHAR KUEY TEOW","LAKSA","SATAY","TEH TARIK","CENDOL","DURIAN","MANGOSTEEN","RAMBUTAN","MERDEKA","RINGGIT","HORNBILL","PROBOSCIS MONKEY","ORANGUTAN","TAPIR","SUNBEAR"] },
      "science":    { label:"🔬 Science",          words:["PHOTOSYNTHESIS","MITOCHONDRIA","CHROMOSOME","ECOSYSTEM","EVOLUTION","RESPIRATION","DIGESTION","CIRCULATION","GERMINATION","COMBUSTION","GRAVITY","MAGNETISM","ELECTRICITY","RADIATION","REFRACTION","CONDENSATION","EVAPORATION","PRECIPITATION","SUBLIMATION","HYDROGEN","NITROGEN","OXYGEN","CARBON DIOXIDE","AMMONIA","ELEMENT","COMPOUND","MOLECULE","ATOM","NEUTRON","PROTON","ELECTROMAGNETISM","THERMODYNAMICS","BIOLUMINESCENCE","CHEMOSYNTHESIS","TECTONIC PLATES","SEISMOGRAPH","SPECTROSCOPY","ELECTROLYSIS","CATALYSIS","STOICHIOMETRY","QUANTUM MECHANICS","SUPERCONDUCTOR","SEMICONDUCTOR","TRANSISTOR","PHOTOELECTRIC","RADIOACTIVE DECAY","NUCLEAR FISSION","CENTRIPETAL FORCE"] },
      "technology": { label:"💻 Technology",       words:["ALGORITHM","ARTIFICIAL INTELLIGENCE","BLOCKCHAIN","ENCRYPTION","CYBERSECURITY","PROGRAMMING","DEBUGGING","FRAMEWORK","REPOSITORY","CLOUD STORAGE","VIRTUAL REALITY","AUGMENTED REALITY","MACHINE LEARNING","NEURAL NETWORK","DEEP LEARNING","SEMICONDUCTOR","MICROPROCESSOR","QUANTUM COMPUTING","BANDWIDTH","LATENCY","FIREWALL","MALWARE","PHISHING","OPEN SOURCE","CONTAINERISATION","VERSION CONTROL","AGILE METHODOLOGY"] },
      "jobs":       { label:"💼 Jobs",             words:["ARCHITECT","ACCOUNTANT","ASTRONAUT","ARCHAEOLOGIST","SURGEON","PHYSIOTHERAPIST","PHARMACIST","PARAMEDIC","ENGINEER","PROGRAMMER","TECHNICIAN","ELECTRICIAN","PLUMBER","JOURNALIST","PHOTOGRAPHER","FILMMAKER","BROADCASTER","BARRISTER","SOLICITOR","MAGISTRATE","DETECTIVE","AMBASSADOR","DIPLOMAT","POLITICIAN","CHOREOGRAPHER","CONDUCTOR","COMPOSER","ILLUSTRATOR","SCULPTOR","ENTREPRENEUR","CONSULTANT","ANALYST","VETERINARIAN","BOTANIST"] },
    };;
    // ── Load word lists: custom content.js if available, built-ins as fallback ──
    const hasCustomWords = window.CUSTOM_CONTENT &&
                           window.CUSTOM_CONTENT.words &&
                           window.CUSTOM_CONTENT.words.length > 0;

    // Always load built-in word lists as a base
    Object.assign(wordLists, BUILT_IN);

    if (hasCustomWords) {
      // Group custom words by topic → one category per topic, added on top of built-ins
      const groups = {};
      window.CUSTOM_CONTENT.words.forEach(w => {
        const key  = w.topic || 'Custom';
        if (!groups[key]) groups[key] = { label: key, words: [] };
        groups[key].words.push(w.word);
      });
      Object.entries(groups).forEach(([key, cat]) => {
        const safeKey = 'custom_' + key.toLowerCase().replace(/[^a-z0-9]/g, '_');
        wordLists[safeKey] = cat;
      });
    }

    // Try to load wordlists.json to add any extra lists (non-destructive merge)
    fetch('../wordlists.json')
      .then(r => r.json())
      .then(data => {
        Object.assign(wordLists, data);
        selList = '';
        buildCategoryPicker();
      })
      .catch(() => {
        // JSON not available — use what we have
        selList = '';
        buildCategoryPicker();
      });

    function pickBtn(groupId, key, val) {
      document.querySelectorAll(`#${groupId} button`).forEach(b =>
        b.classList.toggle('hm-selected', b.dataset[key] === val)
      );
    }

    document.querySelectorAll('#teamPicker button').forEach(b =>
      b.onclick = () => { selTeams = +b.dataset.n; pickBtn('teamPicker','n',b.dataset.n); }
    );
    document.querySelectorAll('#modePicker button').forEach(b =>
      b.onclick = () => { selMode = b.dataset.mode; pickBtn('modePicker','mode',b.dataset.mode); }
    );

    document.getElementById('startBtn').onclick = () => {
      document.getElementById('setupScreen').style.display = 'none';
      document.getElementById('gameArea').style.display    = 'flex';
      initGame(selTeams, selMode);
    };

    document.getElementById('newGame').onclick = () => {
      document.getElementById('setupScreen').style.display = 'flex';
      document.getElementById('gameArea').style.display    = 'none';
    };

    // ── Hangman drawing ──────────────────────────────
    function drawHangman(s) {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.lineWidth = 5; ctx.strokeStyle = '#222'; ctx.lineCap = 'round';
      const d = (x,y,x2,y2) => { ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x2,y2); ctx.stroke(); };
      if (s>=1)  d(10,240,210,240);
      if (s>=2)  d(50,240,50,30);
      if (s>=3)  d(50,30,150,30);
      if (s>=4)  d(150,30,150,65);
      if (s>=5)  { ctx.beginPath(); ctx.arc(150,88,23,0,Math.PI*2); ctx.stroke(); }
      if (s>=6)  d(150,111,150,175);
      if (s>=7)  d(150,130,115,160);
      if (s>=8)  d(150,130,185,160);
      if (s>=9)  d(150,175,120,220);
      if (s>=10) d(150,175,180,220);
    }

    // ── Vowel locks ──────────────────────────────────
    function updateVowelLocks() {
      if (mode !== 'consonant') return;
      document.querySelectorAll('#letters button').forEach(btn => {
        if (!'AEIOU'.includes(btn.textContent) || guessedLetters.has(btn.textContent)) return;
        const locked = totalScores[currentTeam] < 1;
        btn.disabled = locked;
        btn.classList.toggle('hm-vowel-locked', locked);
      });
    }

    // ── Scoreboard ───────────────────────────────────
    function renderScoreboard() {
      const sb = document.getElementById('scoreboard');
      sb.innerHTML = '';
      totalScores.forEach((pts, i) => {
        const d = document.createElement('div');
        d.className = 'team-score' + (i === currentTeam ? ' active' : '');
        d.innerHTML = `<strong>Team ${i+1}</strong><br>${pts}`;
        if (currentWordPoints[i] > 0) d.innerHTML += `<br><small>+${currentWordPoints[i]} this word</small>`;
        if (lastRolls[i])             d.innerHTML += `<br><small>${lastRolls[i]}</small>`;
        sb.appendChild(d);
      });
      updateVowelLocks();
    }

    // ── Letter buttons ───────────────────────────────
    function buildLetters() {
      const l = document.getElementById('letters');
      l.innerHTML = '';
      'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(ch => {
        const b = document.createElement('button');
        b.textContent = ch;
        b.onclick = () => guessLetter(ch, b);
        l.appendChild(b);
      });
      updateVowelLocks();
    }

    // ── Render word board ────────────────────────────
    function renderBoard() {
      const board = document.getElementById('gameBoard');
      // Each char slot = 1 char + margins. Fit ALL chars on one line.
      // Available width ≈ min(board.offsetWidth, 90vw) minus padding
      const available = (board.offsetWidth || window.innerWidth * 0.9) - 40;
      // Number of character slots (spaces count as half a slot)
      const slots = revealed.reduce((n, ch) => n + (ch === '/' ? 0.6 : 1.2), 0);
      // px per slot, capped between 14px and 48px
      const px = Math.min(48, Math.max(14, Math.floor(available / slots)));
      const size = px + 'px';
      board.style.flexWrap = 'nowrap';
      board.style.overflowX = 'auto';
      board.innerHTML = revealed.map(ch => {
        if (ch === '/') return `<span style="display:inline-block;width:${Math.round(px*0.6)}px;flex-shrink:0"> </span>`;
        const isLetter = ch !== '_';
        return `<span style="display:inline-block;width:${Math.round(px*1.05)}px;flex-shrink:0;text-align:center;font-size:${size};border-bottom:${Math.max(2,Math.round(px/14))}px solid #0f172a;margin:0 1px;line-height:1.4;font-weight:900;color:${isLetter?'#c0392b':'#0f172a'}">${isLetter?ch:'_'}</span>`;
      }).join('');
    }

    // ── New word ─────────────────────────────────────
    function nextWord() {
      currentWord       = words[Math.floor(Math.random()*words.length)].toUpperCase();
      revealed          = currentWord.split('').map(c => c===' ' ? '/' : '_');
      guessedLetters    = new Set();
      wrongGuesses      = 0;
      currentWordPoints = Array(totalTeams).fill(0);
      lastRolls         = Array(totalTeams).fill(null);
      renderBoard();
      drawHangman(0);
      renderScoreboard();
      buildLetters();
    }

    // ── Init ─────────────────────────────────────────
    function initGame(teamCount, gameMode) {
      totalTeams        = teamCount;
      totalScores       = Array(teamCount).fill(0);
      currentWordPoints = Array(teamCount).fill(0);
      currentTeam       = 0;
      lastRolls         = Array(teamCount).fill(null);
      mode              = gameMode;
      document.getElementById('dicePanel').style.display = gameMode==='diceman' ? 'block' : 'none';
      document.getElementById('currentTurn').textContent = "Team 1's turn!";
      nextWord();
    }

    // ── Guess ────────────────────────────────────────
    function guessLetter(letter, btn) {
      if (guessedLetters.has(letter)) return;
      guessedLetters.add(letter);
      const isVowel = 'AEIOU'.includes(letter);

      if (mode==='consonant' && isVowel) {
        if (totalScores[currentTeam] < 1) {
          document.getElementById('currentTurn').textContent = `Team ${currentTeam+1} needs 1 point to buy a vowel!`;
          guessedLetters.delete(letter);
          return;
        }
        totalScores[currentTeam]--;
      }

      btn.disabled = true;
      let hits = 0;
      currentWord.split('').forEach((ch,i) => { if(ch===letter){ revealed[i]=letter; hits++; } });
      renderBoard();

      if (hits === 0) {
        wrongGuesses++;
        drawHangman(wrongGuesses);
        currentTeam = (currentTeam+1) % totalTeams;
        document.getElementById('currentTurn').textContent = `Wrong! Team ${currentTeam+1}'s turn`;
        if (wrongGuesses >= MAX_WRONG) {
          setTimeout(() => {
            document.getElementById('currentTurn').textContent = `Game over! The word was: ${currentWord}`;
            setTimeout(nextWord, 3000);
          }, 500);
        }
      } else {
        if (mode==='consonant' && !isVowel) {
          currentWordPoints[currentTeam] += hits;
          totalScores[currentTeam]       += hits;
        } else if (mode==='diceman') {
          rollDie(hits);
        } else {
          totalScores[currentTeam] += hits;
        }
      }

      renderScoreboard();

      if (!revealed.includes('_')) {
        setTimeout(() => {
          document.getElementById('currentTurn').textContent = `🎉 Team ${currentTeam+1} solved it! +10 bonus!`;
          totalScores[currentTeam] += 10;
          renderScoreboard();
          setTimeout(nextWord, 2500);
        }, 400);
      }
    }

    // ── Dice ─────────────────────────────────────────
    function rollDie(hits) {
      const faces = ['⚀','⚁','⚂','⚃','⚄','⚅'];
      const roll  = Math.floor(Math.random()*6)+1;
      document.getElementById('diceFace').textContent = faces[roll-1];
      let pts=0, effect='';
      switch(roll){
        case 1: pts=hits*10;  effect=`×10 (+${pts})`; break;
        case 2: pts=hits*20;  effect=`×20 (+${pts})`; break;
        case 3: pts=hits*30;  effect=`×30 (+${pts})`; break;
        case 4: pts=-totalScores[currentTeam]; effect='💸 Bankrupt'; break;
        case 5: pts=hits*50;  effect=`×50 (+${pts})`; break;
        case 6: pts=hits*100; effect=`×100 (+${pts})`; break;
      }
      totalScores[currentTeam] += pts;
      lastRolls[currentTeam]    = effect;
      renderScoreboard();
    }

    document.getElementById('fullscreen').onclick = () => document.documentElement.requestFullscreen?.();
    document.getElementById('home').onclick       = () => window.location.href = '../index.html';

    drawHangman(0);
    // Re-render on resize so word always fits
    window.addEventListener('resize', () => { if (currentWord) renderBoard(); });
  </script>
</body>
</html>
