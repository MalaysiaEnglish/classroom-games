<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Para-Sort — IGCSE English</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Unbounded:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-dark: #0a0d14;
      --gold: #f0b429;
      --teal: #3ecfcf;
      --green: #4caf50;
      --red: #e53e3e;
      --text-light: #e8ecf1;
      --text-muted: #a0aac0;
      --card-bg: #1a1f2e;
    }

    html, body {
      height: 100%;
      background-color: var(--bg-dark);
      color: var(--text-light);
      font-family: 'DM Sans', sans-serif;
      font-size: 18px;
      line-height: 1.6;
    }

    body {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .screen {
      display: none;
      width: 100%;
      height: 100%;
      flex: 1;
      overflow-y: auto;
      padding: 40px;
    }

    .screen.active {
      display: flex;
      flex-direction: column;
    }

    /* ============================================
       PICKER SCREEN
       ============================================ */

    #pickerScreen {
      justify-content: flex-start;
      padding: 60px 40px;
    }

    .picker-header {
      text-align: center;
      margin-bottom: 80px;
    }

    .picker-header h1 {
      font-family: 'Unbounded', sans-serif;
      font-size: 3.5rem;
      font-weight: 900;
      color: var(--gold);
      margin-bottom: 20px;
      letter-spacing: -1px;
    }

    .picker-header p {
      font-size: 1.5rem;
      color: var(--text-muted);
    }

    .articles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 40px;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }

    .article-card {
      background-color: var(--card-bg);
      border: 3px solid transparent;
      border-radius: 8px;
      padding: 40px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    .article-card:hover {
      border-color: var(--gold);
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(240, 180, 41, 0.15);
    }

    .article-card h2 {
      font-family: 'Unbounded', sans-serif;
      font-size: 1.8rem;
      margin-bottom: 16px;
      color: var(--gold);
    }

    .article-card p {
      font-size: 1.1rem;
      color: var(--text-light);
      margin-bottom: 24px;
      flex: 1;
    }

    .article-type {
      display: inline-block;
      background-color: var(--teal);
      color: var(--bg-dark);
      padding: 8px 16px;
      border-radius: 4px;
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* ============================================
       INTRO SCREEN
       ============================================ */

    #introScreen {
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .intro-content {
      max-width: 900px;
    }

    .intro-content h1 {
      font-family: 'Unbounded', sans-serif;
      font-size: 3.5rem;
      font-weight: 900;
      color: var(--gold);
      margin-bottom: 40px;
    }

    .intro-content p {
      font-size: 1.8rem;
      color: var(--text-light);
      margin-bottom: 60px;
      line-height: 1.8;
    }

    .intro-content button {
      background-color: var(--teal);
      color: var(--bg-dark);
      border: none;
      padding: 24px 60px;
      font-size: 1.6rem;
      font-weight: 700;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .intro-content button:hover {
      background-color: var(--gold);
      transform: scale(1.05);
    }

    .intro-content button:active {
      transform: scale(0.98);
    }

    /* ============================================
       GAME SCREEN
       ============================================ */

    #gameScreen {
      flex-direction: column;
      padding: 40px;
    }

    .game-header {
      margin-bottom: 40px;
    }

    .game-header h2 {
      font-family: 'Unbounded', sans-serif;
      font-size: 2rem;
      color: var(--gold);
      margin-bottom: 12px;
    }

    .game-header p {
      font-size: 1.1rem;
      color: var(--text-muted);
    }

    .drop-zone {
      flex: 1;
      background-color: var(--card-bg);
      border: 3px dashed var(--text-muted);
      border-radius: 8px;
      padding: 30px;
      margin-bottom: 30px;
      min-height: 400px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: all 0.2s ease;
    }

    .drop-zone.drag-over {
      border-color: var(--teal);
      background-color: rgba(62, 207, 207, 0.05);
    }

    .paragraph-card {
      background-color: #252d3a;
      border-left: 4px solid var(--gold);
      border-radius: 6px;
      padding: 24px;
      cursor: move;
      display: flex;
      align-items: flex-start;
      gap: 20px;
      user-select: none;
      transition: all 0.2s ease;
      touch-action: none;
    }

    .paragraph-card:hover {
      background-color: #2d3542;
      box-shadow: 0 4px 12px rgba(240, 180, 41, 0.1);
    }

    .paragraph-card.dragging {
      opacity: 0.5;
      background-color: #1a1f2e;
    }

    .drag-handle {
      color: var(--gold);
      font-size: 1.4rem;
      flex-shrink: 0;
      padding-top: 2px;
    }

    .paragraph-text {
      font-size: 1.05rem;
      color: var(--text-light);
      flex: 1;
    }

    .game-buttons {
      display: flex;
      gap: 20px;
      justify-content: center;
    }

    .game-buttons button {
      padding: 16px 40px;
      font-size: 1.1rem;
      font-weight: 700;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: all 0.3s ease;
    }

    #submitBtn {
      background-color: var(--teal);
      color: var(--bg-dark);
    }

    #submitBtn:hover {
      background-color: #2dc4d4;
      transform: scale(1.02);
    }

    #submitBtn:active {
      transform: scale(0.98);
    }

    #shuffleBtn {
      background-color: var(--text-muted);
      color: var(--bg-dark);
    }

    #shuffleBtn:hover {
      background-color: var(--text-light);
      transform: scale(1.02);
    }

    /* ============================================
       RESULTS SCREEN
       ============================================ */

    #resultsScreen {
      padding: 40px;
      flex-direction: column;
    }

    .results-header {
      text-align: center;
      margin-bottom: 50px;
    }

    .results-header h2 {
      font-family: 'Unbounded', sans-serif;
      font-size: 2.5rem;
      color: var(--gold);
      margin-bottom: 16px;
    }

    .results-header p {
      font-size: 1.2rem;
      color: var(--text-muted);
    }

    .results-container {
      flex: 1;
      overflow-y: auto;
      margin-bottom: 40px;
    }

    .result-card {
      background-color: var(--card-bg);
      border-left: 6px solid var(--green);
      border-radius: 6px;
      padding: 32px;
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .result-card.incorrect {
      border-left-color: var(--red);
    }

    .result-card-header {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .result-label {
      background-color: var(--gold);
      color: var(--bg-dark);
      padding: 8px 16px;
      border-radius: 4px;
      font-size: 0.95rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      min-width: fit-content;
    }

    .result-position {
      font-size: 1.1rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .result-text {
      font-size: 1.1rem;
      color: var(--text-light);
      line-height: 1.7;
    }

    .result-explanation {
      background-color: rgba(62, 207, 207, 0.1);
      border-left: 3px solid var(--teal);
      padding: 16px;
      border-radius: 4px;
      font-size: 1.05rem;
      color: var(--text-light);
    }

    .result-discussion {
      background-color: rgba(240, 180, 41, 0.1);
      border-left: 3px solid var(--gold);
      padding: 16px;
      border-radius: 4px;
      font-size: 1.05rem;
      color: var(--text-light);
      font-style: italic;
    }

    .results-buttons {
      display: flex;
      gap: 20px;
      justify-content: center;
    }

    .results-buttons button {
      padding: 16px 40px;
      font-size: 1.1rem;
      font-weight: 700;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: all 0.3s ease;
    }

    #tryAnotherBtn {
      background-color: var(--teal);
      color: var(--bg-dark);
    }

    #tryAnotherBtn:hover {
      background-color: #2dc4d4;
      transform: scale(1.02);
    }

    /* ============================================
       SCROLLBAR STYLING
       ============================================ */

    .screen::-webkit-scrollbar {
      width: 10px;
    }

    .screen::-webkit-scrollbar-track {
      background: var(--bg-dark);
    }

    .screen::-webkit-scrollbar-thumb {
      background: var(--text-muted);
      border-radius: 5px;
    }

    .screen::-webkit-scrollbar-thumb:hover {
      background: var(--gold);
    }
  </style>
</head>
<body>
  <!-- PICKER SCREEN -->
  <div id="pickerScreen" class="screen active">
    <div class="picker-header">
      <h1>Choose an Article</h1>
      <p>Select the text your class will put in order today</p>
    </div>
    <div class="articles-grid" id="articlesGrid"></div>
  </div>

  <!-- INTRO SCREEN -->
  <div id="introScreen" class="screen">
    <div class="intro-content">
      <h1 id="introTitle"></h1>
      <p id="introInstruction"></p>
      <button onclick="startGame()">Start Sorting</button>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="gameScreen" class="screen">
    <div class="game-header">
      <h2 id="gameTitle"></h2>
      <p>Drag the paragraphs into the correct order, then click Submit</p>
    </div>
    <div class="drop-zone" id="dropZone"></div>
    <div class="game-buttons">
      <button id="shuffleBtn" onclick="shuffleCurrentOrder()">Shuffle</button>
      <button id="submitBtn" onclick="submitOrder()">Submit Order</button>
    </div>
  </div>

  <!-- RESULTS SCREEN -->
  <div id="resultsScreen" class="screen">
    <div class="results-header">
      <h2>Results</h2>
      <p>Here's how the paragraphs fit together:</p>
    </div>
    <div class="results-container" id="resultsContainer"></div>
    <div class="results-buttons">
      <button id="tryAnotherBtn" onclick="reset()">Try Another Article</button>
    </div>
  </div>

  <script>
    // ============================================
    // ARTICLES DATA
    // ============================================

    const ARTICLES = [
      {
        id: 0,
        title: "Trapped Underground",
        description: "A group of potholers are rescued from a flooded cave system",
        type: "News Report",
        paragraphs: [
          {
            id: 1,
            text: "A group of four experienced potholers were rescued from a flooded cave system in the Yorkshire Dales yesterday after spending more than eighteen hours trapped underground. The group had become stranded when heavy rainfall caused water levels to rise unexpectedly, blocking their exit route.",
            label: "Opening / Summary",
            explanation: "A news report opens with who, what, where and when — the key facts in brief.",
            discussion: "Ask the class: why do news reports put the most important information first rather than building up to it?"
          },
          {
            id: 2,
            text: "The four cavers — all members of a local potholing club — had entered the Gaping Gill cave system on Saturday morning with the intention of completing a route they had explored several times before. They were reported missing when they failed to return by early evening.",
            label: "Background",
            explanation: "Background gives us context about who the people are and what they were doing before the incident.",
            discussion: "Ask the class: what would the reader be left wondering if this paragraph were removed?"
          },
          {
            id: 3,
            text: "By midnight, water had risen to chest height inside the cave's main chamber, forcing the group to retreat to a narrow ledge several metres above the flood level. One of the cavers, an experienced first-aider, treated a colleague for mild hypothermia using emergency thermal foil from their kit.",
            label: "Complication",
            explanation: "The complication develops the crisis — showing how bad the situation became.",
            discussion: "Ask the class: how does the writer use specific details (chest height, narrow ledge) to build tension?"
          },
          {
            id: 4,
            text: "A specialist cave rescue team, alerted by the cavers' emergency beacon, reached the group at 6 a.m. on Sunday. Using a combination of diving equipment and ropes, the rescue team navigated the flooded passages to guide the potholers to the surface over a period of four hours.",
            label: "Resolution",
            explanation: "The resolution explains how the crisis was solved — essential to completing the narrative arc.",
            discussion: "Ask the class: why does the resolution come after the complication, not before it?"
          },
          {
            id: 5,
            text: "All four cavers were taken to hospital as a precaution, where they were described as shaken but in good spirits. The group's leader told reporters: 'We never lost hope. We trusted that people would come for us.'",
            label: "Human Response",
            explanation: "A personal quote gives the human dimension — how the experience felt.",
            discussion: "Ask the class: why do journalists include quotes from people involved? What do quotes add that facts cannot?"
          },
          {
            id: 6,
            text: "Cave rescue volunteers, who train year-round for such emergencies, are entirely unpaid. Senior rescue coordinator David Marsh warned that cavers venturing into systems during wet weather risked not only their own lives but those of the rescue teams sent after them.",
            label: "Expert Comment / Wider Significance",
            explanation: "An expert comment gives authority and broadens the story beyond the single incident.",
            discussion: "Ask the class: why do news reports often end with an expert's wider point rather than more details about the event?"
          }
        ]
      },
      {
        id: 1,
        title: "In Defence of School Uniform",
        description: "An argument for why school uniform is beneficial",
        type: "Opinion / Argument",
        paragraphs: [
          {
            id: 1,
            text: "Every September, the debate about school uniform reignites. Parents complain about the cost. Students object to having their identity suppressed. Yet the evidence in favour of uniform — when examined carefully — remains compelling, and the arguments against it reveal more about adult anxieties than about the real experience of students.",
            label: "Opening Hook / Thesis",
            explanation: "An opinion piece opens with an engaging hook and immediately states the writer's position.",
            discussion: "Ask the class: the writer addresses counterarguments straight away. What effect does this have on the reader?"
          },
          {
            id: 2,
            text: "Studies from schools in the United States, where uniform policies vary widely by state, suggest that schools with compulsory uniform see measurably lower rates of bullying related to clothing. In schools without uniform, researchers found that students from lower-income backgrounds reported feeling visibly different from wealthier peers — a source of anxiety that affected their concentration and self-esteem.",
            label: "Point 1 with Evidence",
            explanation: "The first main argument is supported by research evidence, giving it authority.",
            discussion: "Ask the class: why is research evidence more persuasive than personal opinion in an argument?"
          },
          {
            id: 3,
            text: "Opponents argue that uniform stifles self-expression and that students should be free to develop their identity through their clothing choices. This is a reasonable concern — but it misunderstands where real self-expression happens. Identity is built through ideas, values, and relationships, not through branded trainers or designer labels.",
            label: "Counterargument and Refutation",
            explanation: "Addressing the counterargument and refuting it shows the writer has considered both sides — making the argument stronger.",
            discussion: "Ask the class: does the writer's refutation actually answer the counterargument, or does it dodge it?"
          },
          {
            id: 4,
            text: "The cost objection, too, deserves scrutiny. Critics cite the expense of buying school-specific items from approved suppliers. But the alternative — dressing children in daily changing fashion items to keep up with peers — is demonstrably more expensive over an academic year. Research by the Children's Society found that school uniform costs families an average of £337 per year, compared to £716 for non-uniform clothing.",
            label: "Point 2 with Evidence",
            explanation: "A second distinct argument, again supported by specific data.",
            discussion: "Ask the class: the writer uses specific numbers (£337 vs £716). Why are exact figures more persuasive than approximate ones?"
          },
          {
            id: 5,
            text: "None of this is to say that every uniform policy is well-designed or fairly priced. Schools have a responsibility to keep costs low, to offer affordable suppliers, and to apply policies with compassion when families face genuine hardship. The argument is not that uniform is perfect — only that it is better than the alternative.",
            label: "Concession",
            explanation: "A mature argument acknowledges nuance and limitations — this makes the writer appear more reasonable.",
            discussion: "Ask the class: does making a concession weaken the writer's argument or strengthen it?"
          },
          {
            id: 6,
            text: "Clothing should be the least interesting thing about a school. When students walk through the gate in the same uniform, attention shifts — however slightly — to what they do and say rather than what they wear. In a world that increasingly judges people by their appearance, that shift, however modest, seems worth defending.",
            label: "Conclusion / Call to Think",
            explanation: "A strong conclusion returns to the central idea and leaves the reader with something to reflect on.",
            discussion: "Ask the class: the writer ends with a value statement, not a summary. Why might this be more effective?"
          }
        ]
      },
      {
        id: 2,
        title: "Maria Montessori: The Woman Who Reinvented Childhood",
        description: "A profile of the educational pioneer who shaped modern learning",
        type: "Profile / Feature",
        paragraphs: [
          {
            id: 1,
            text: "In 1907, a young Italian doctor opened a school in one of Rome's most neglected slum districts. Her pupils — children aged three to six who had previously been described as 'uneducable' — were within months reading, writing, and learning with a calm focus that astonished the educational world. The doctor's name was Maria Montessori, and what she created in that single room would go on to reshape how millions of children are taught across the world.",
            label: "Engaging Opening / Hook",
            explanation: "A feature article often opens with a vivid scene or surprising claim to draw the reader in before naming its subject.",
            discussion: "Ask the class: the writer withholds Montessori's name until the end of the paragraph. What effect does this have?"
          },
          {
            id: 2,
            text: "Montessori was born in 1870 in the small Italian town of Chiaravalle. From an early age, she defied the expectations placed on women of her era: she became one of the first women in Italy to qualify as a medical doctor, graduating from the University of Rome in 1896 despite significant opposition from male colleagues who refused to work alongside her.",
            label: "Background / Early Life",
            explanation: "After the hook, the feature steps back to provide biographical background — where the subject came from.",
            discussion: "Ask the class: why might the writer choose to mention opposition from male colleagues rather than just stating she qualified?"
          },
          {
            id: 3,
            text: "Her method, developed through years of observation, was built on a simple principle: children are natural learners who thrive when given freedom within structure. Montessori classrooms abandoned rigid rows of desks in favour of open spaces where children could choose their own activities, work at their own pace, and learn from specially designed materials that encouraged discovery rather than instruction.",
            label: "Core Ideas / Achievement",
            explanation: "The heart of a profile explains what made the subject significant — their key contribution or idea.",
            discussion: "Ask the class: the writer explains Montessori's method by contrasting it with traditional classrooms. Why is contrast an effective way to explain an idea?"
          },
          {
            id: 4,
            text: "The method spread rapidly, first through Italy and then, after Montessori's international lecture tours, across Europe and America. Presidents, politicians, and philosophers — including Thomas Edison and Alexander Graham Bell — publicly endorsed her work. By 1915, there were more than a hundred Montessori schools in the United States alone.",
            label: "Impact / Growth",
            explanation: "A profile traces the impact of the subject's ideas — the spread and reception of their work.",
            discussion: "Ask the class: why do you think the writer mentions famous names who endorsed Montessori's work?"
          },
          {
            id: 5,
            text: "Not everyone was persuaded. Critics argued that the Montessori method was too permissive, that children needed firm direction from teachers, and that allowing young pupils to 'discover' knowledge independently left dangerous gaps in their understanding. In Italy under Mussolini, Montessori schools were eventually closed by government order; Montessori herself was forced into exile in the 1930s.",
            label: "Opposition / Setback",
            explanation: "A balanced feature acknowledges challenges and opposition — this adds depth to the profile.",
            discussion: "Ask the class: why might a writer include a section about failures or opposition in a profile of someone celebrated?"
          },
          {
            id: 6,
            text: "Today, there are more than 20,000 Montessori schools in 110 countries. Her face appeared on the Italian 1,000-lire note before Italy adopted the euro. But perhaps the greatest tribute is simpler: in classrooms from Tokyo to Nairobi to São Paulo, children still work in the way she imagined — choosing their tasks, following their curiosity, learning at their own pace. Montessori's revolution never really ended. It just became normal.",
            label: "Legacy / Conclusion",
            explanation: "A profile concludes with the subject's lasting legacy — the long-term significance of their life.",
            discussion: "Ask the class: the final sentence says her revolution 'became normal'. What does this mean, and is it a compliment?"
          }
        ]
      }
    ];

    // ============================================
    // STATE MANAGEMENT
    // ============================================

    let currentArticle = null;
    let paragraphOrder = [];
    let draggedElement = null;

    // ============================================
    // SCREEN NAVIGATION
    // ============================================

    function switchScreen(screenId) {
      document.querySelectorAll('.screen').forEach(screen => {
        screen.classList.remove('active');
      });
      document.getElementById(screenId).classList.add('active');
    }

    // ============================================
    // PICKER SCREEN
    // ============================================

    function initPicker() {
      const grid = document.getElementById('articlesGrid');
      grid.innerHTML = '';
      ARTICLES.forEach((article, index) => {
        const card = document.createElement('div');
        card.className = 'article-card';
        card.onclick = () => selectArticle(index);
        card.innerHTML = `
          <h2>${article.title}</h2>
          <p>${article.description}</p>
          <span class="article-type">${article.type}</span>
        `;
        grid.appendChild(card);
      });
    }

    function selectArticle(index) {
      currentArticle = ARTICLES[index];
      document.getElementById('introTitle').textContent = currentArticle.title;
      document.getElementById('introInstruction').textContent = `You'll read ${currentArticle.paragraphs.length} paragraphs. Your task is to drag them into the correct order to show how the text is structured.`;
      document.getElementById('gameTitle').textContent = currentArticle.title;
      switchScreen('introScreen');
    }

    // ============================================
    // GAME LOGIC
    // ============================================

    function startGame() {
      if (!currentArticle) return;

      // Shuffle paragraphs
      paragraphOrder = currentArticle.paragraphs
        .map(p => p.id)
        .sort(() => Math.random() - 0.5);

      renderGameScreen();
      switchScreen('gameScreen');
    }

    function renderGameScreen() {
      const dropZone = document.getElementById('dropZone');
      dropZone.innerHTML = '';

      paragraphOrder.forEach(id => {
        const paragraph = currentArticle.paragraphs.find(p => p.id === id);
        const card = document.createElement('div');
        card.className = 'paragraph-card';
        card.draggable = true;
        card.dataset.id = id;
        card.innerHTML = `
          <div class="drag-handle">⠿</div>
          <div class="paragraph-text">${paragraph.text}</div>
        `;

        card.addEventListener('dragstart', handleDragStart);
        card.addEventListener('dragend', handleDragEnd);

        dropZone.appendChild(card);
      });

      dropZone.addEventListener('dragover', handleDragOver);
      dropZone.addEventListener('dragleave', handleDragLeave);
      dropZone.addEventListener('drop', handleDrop);
    }

    function handleDragStart(e) {
      draggedElement = this;
      this.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    }

    function handleDragEnd(e) {
      this.classList.remove('dragging');
      document.getElementById('dropZone').classList.remove('drag-over');
    }

    function handleDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      this.classList.add('drag-over');

      const afterElement = getDragAfterElement(this, e.clientY);
      if (afterElement == null) {
        this.appendChild(draggedElement);
      } else {
        this.insertBefore(draggedElement, afterElement);
      }
    }

    function handleDragLeave(e) {
      if (e.target === this) {
        this.classList.remove('drag-over');
      }
    }

    function handleDrop(e) {
      e.preventDefault();
      this.classList.remove('drag-over');
      updateParagraphOrder();
    }

    function getDragAfterElement(container, y) {
      const draggableElements = [...container.querySelectorAll('.paragraph-card:not(.dragging)')];

      return draggableElements.reduce((closest, child) => {
        const box = child.getBoundingClientRect();
        const offset = y - box.top - box.height / 2;

        if (offset < 0 && offset > closest.offset) {
          return { offset: offset, element: child };
        } else {
          return closest;
        }
      }, { offset: Number.NEGATIVE_INFINITY }).element;
    }

    function updateParagraphOrder() {
      const cards = document.querySelectorAll('.paragraph-card');
      paragraphOrder = Array.from(cards).map(card => parseInt(card.dataset.id));
    }

    function shuffleCurrentOrder() {
      paragraphOrder.sort(() => Math.random() - 0.5);
      renderGameScreen();
    }

    // ============================================
    // RESULTS LOGIC
    // ============================================

    function submitOrder() {
      const correctOrder = currentArticle.paragraphs.map(p => p.id);
      renderResults(correctOrder);
      switchScreen('resultsScreen');
    }

    function renderResults(correctOrder) {
      const container = document.getElementById('resultsContainer');
      container.innerHTML = '';

      correctOrder.forEach((id, index) => {
        const paragraph = currentArticle.paragraphs.find(p => p.id === id);
        const userPosition = paragraphOrder.indexOf(id);
        const isCorrect = userPosition === index;

        const card = document.createElement('div');
        card.className = `result-card ${isCorrect ? '' : 'incorrect'}`;
        card.innerHTML = `
          <div class="result-card-header">
            <span class="result-label">${paragraph.label}</span>
            <span class="result-position">${isCorrect ? 'Correct' : `You placed it in position ${userPosition + 1}`}</span>
          </div>
          <div class="result-text">${paragraph.text}</div>
          <div class="result-explanation"><strong>Why:</strong> ${paragraph.explanation}</div>
          <div class="result-discussion"><strong>Discuss:</strong> ${paragraph.discussion}</div>
        `;
        container.appendChild(card);
      });
    }

    // ============================================
    // RESET
    // ============================================

    function reset() {
      currentArticle = null;
      paragraphOrder = [];
      draggedElement = null;
      initPicker();
      switchScreen('pickerScreen');
    }

    // ============================================
    // INITIALIZATION
    // ============================================

    document.addEventListener('DOMContentLoaded', () => {
      initPicker();
    });
  </script>
</body>
</html>
