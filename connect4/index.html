<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Connect 4</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    /* ── Board size fix: shrink to fit screen with filter panel ── */
    .connect4-board {
      width: 70vmin !important;
      max-width: 480px !important;
      gap: 6px !important;
      padding: 12px !important;
    }
    .col-selector {
      width: calc(70vmin - 24px) !important;
      max-width: calc(480px - 24px) !important;
      gap: 6px !important;
      padding: 0 !important;
    }

    /* ── Filter panel — expanded ── */
    .qf-panel {
      background: #161c2e;
      border-bottom: 2px solid rgba(240,180,41,0.25);
      padding: 10px 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: flex-start;
    }
    .qf-panel.collapsed { display: none; }

    /* ── Collapsed summary bar ── */
    .qf-summary {
      background: #161c2e;
      border-bottom: 2px solid rgba(240,180,41,0.2);
      padding: 6px 14px;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      cursor: pointer;
      user-select: none;
    }
    .qf-summary.visible { display: flex; }
    .qf-summary:hover { background: #1c2340; }
    .qf-summary-text { font-size: 0.75rem; color: rgba(240,180,41,0.8); }
    .qf-summary-text strong { color: #f0c842; }
    .qf-summary-edit { font-size: 0.7rem; color: rgba(240,180,41,0.45); white-space: nowrap; }

    .qf-col { display: flex; flex-direction: column; gap: 5px; min-width: 150px; }
    .qf-col-wide { min-width: 200px; flex: 1; }
    .qf-heading { font-size: 0.68rem; color: rgba(240,180,41,0.7); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700; margin-bottom: 1px; }
    .qf-units { display: flex; flex-wrap: wrap; gap: 4px; }
    .qf-unit-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); color: #c8bfb0; padding: 3px 9px; border-radius: 5px; font-size: 0.72rem; cursor: pointer; transition: all 0.18s; white-space: nowrap; }
    .qf-unit-btn:hover { background: rgba(240,180,41,0.12); border-color: rgba(240,180,41,0.4); }
    .qf-unit-btn.active { background: rgba(240,180,41,0.22); border-color: rgba(240,180,41,0.65); color: #f0c842; font-weight: 600; }
    .qf-checklist { display: flex; flex-direction: column; gap: 3px; max-height: 130px; overflow-y: auto; }
    .qf-check-label { display: flex; align-items: center; gap: 6px; font-size: 0.74rem; color: #c8bfb0; cursor: pointer; padding: 2px 5px; border-radius: 4px; transition: background 0.15s; }
    .qf-check-label:hover { background: rgba(240,180,41,0.08); }
    .qf-check-label input[type=checkbox] { accent-color: #f0c842; width: 13px; height: 13px; cursor: pointer; flex-shrink: 0; }
    .qf-check-label .qf-count { font-size: 0.65rem; color: rgba(200,191,176,0.4); margin-left: auto; }
    .qf-empty { font-size: 0.72rem; color: rgba(200,191,176,0.35); font-style: italic; padding: 3px 0; }
    .qf-status-bar { width: 100%; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; padding-top: 5px; border-top: 1px solid rgba(255,255,255,0.06); }
    .qf-status { font-size: 0.74rem; color: rgba(240,180,41,0.75); }
    .qf-status strong { color: #f0c842; }
    .qf-mode-btns { display: flex; gap: 5px; }
    .qf-mode-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.14); color: #c8bfb0; padding: 3px 10px; border-radius: 5px; font-size: 0.72rem; cursor: pointer; transition: all 0.18s; white-space: nowrap; }
    .qf-mode-btn.active { background: rgba(240,180,41,0.22); border-color: rgba(240,180,41,0.6); color: #f0c842; font-weight: 600; }

    /* ── Question panel ── */
    #question-panel { display: none; background: #111828; border-bottom: 2px solid rgba(240,180,41,0.18); padding: 12px 16px; text-align: center; }
    #question-panel.visible { display: block; }
    .q-team-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(240,180,41,0.65); margin-bottom: 5px; }
    .q-question { font-size: clamp(0.88rem, 2.2vw, 1.1rem); color: #f0e6d0; font-weight: 500; margin-bottom: 10px; line-height: 1.4; }
    .q-options { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }
    .q-option { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15); color: #f0e6d0; padding: 6px 12px; border-radius: 7px; font-size: 0.82rem; cursor: pointer; transition: all 0.2s; }
    .q-option:hover { background: rgba(240,180,41,0.15); border-color: rgba(240,180,41,0.5); }
    .q-option.correct { background: rgba(39,174,96,0.25); border-color: #27ae60; color: #7dffb3; pointer-events: none; }
    .q-option.wrong   { background: rgba(192,57,43,0.2);  border-color: #c0392b; color: #ff9b9b; pointer-events: none; }
    .q-option.reveal  { background: rgba(39,174,96,0.15); border-color: rgba(39,174,96,0.4); }
    .q-option.disabled { pointer-events: none; opacity: 0.7; }
    .q-controls { display: flex; gap: 6px; justify-content: center; margin-top: 8px; flex-wrap: wrap; }
    .q-btn { background: rgba(240,180,41,0.14); border: 1px solid rgba(240,180,41,0.38); color: #f0c842; padding: 5px 14px; border-radius: 5px; font-size: 0.76rem; cursor: pointer; transition: all 0.2s; }
    .q-btn:hover { background: rgba(240,180,41,0.28); }
    .q-btn.primary { background: rgba(240,180,41,0.8); color: #0e0b08; font-weight: 600; }
    .q-btn.primary:hover { background: #f0c842; }
  </style>
</head>
<body class="connect4-page">
  <h1>Connect 4 &ndash; Classroom Edition</h1>

  <!-- Collapsed summary bar -->
  <div class="qf-summary" id="qf-summary" onclick="expandFilter()" title="Click to change questions">
    <span class="qf-summary-text" id="qf-summary-text">No questions &mdash; free play</span>
    <span class="qf-summary-edit">&#9998; change</span>
  </div>

  <!-- Full filter panel -->
  <div class="qf-panel" id="qf-panel">
    <div class="qf-col">
      <div class="qf-heading">&#127891; Level / Unit</div>
      <div class="qf-units" id="qf-units"><span class="qf-empty">Loading&hellip;</span></div>
    </div>
    <div class="qf-col qf-col-wide">
      <div class="qf-heading">&#128214; Topic</div>
      <div class="qf-checklist" id="qf-topics"><span class="qf-empty">Select a Level / Unit first</span></div>
    </div>
    <div class="qf-col">
      <div class="qf-heading">&#128203; Lesson</div>
      <div class="qf-checklist" id="qf-lessons"><span class="qf-empty">Select a Level / Unit first</span></div>
    </div>
    <div class="qf-status-bar">
      <span class="qf-status" id="qf-status">No questions selected &mdash; free play</span>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <div class="qf-mode-btns">
          <button class="qf-mode-btn active" id="mode-screen" onclick="setQMode('screen')">On Screen</button>
          <button class="qf-mode-btn" id="mode-teacher" onclick="setQMode('teacher')">Teacher Reads</button>
        </div>
        <button class="qf-mode-btn" onclick="startGame()" style="border-color:rgba(240,180,41,0.5);color:#f0c842;">&#9654; Start Game</button>
      </div>
    </div>
  </div>

  <!-- Question Display Panel -->
  <div id="question-panel">
    <div class="q-team-label" id="q-team-label"></div>
    <div class="q-question" id="q-question"></div>
    <div class="q-options" id="q-options"></div>
    <div class="q-controls">
      <button class="q-btn" id="reveal-btn" onclick="revealAnswer()" style="display:none">&#128065; Reveal</button>
      <button class="q-btn primary" id="correct-btn" onclick="questionResult(true)" style="display:none">&#10003; Correct &mdash; Drop Token</button>
      <button class="q-btn" id="wrong-btn" onclick="questionResult(false)" style="display:none">&#10007; Wrong &mdash; Pass</button>
    </div>
  </div>

  <!-- Game Controls -->
  <div class="controls">
    <button id="redBtn">Team 1 (Red)</button>
    <button id="yellowBtn">Team 2 (Yellow)</button>
    <button id="playToEnd">Play to End Mode</button>
    <button id="newBoard">New Board</button>
    <button id="fullscreen">Fullscreen</button>
    <button id="home">Home</button>
  </div>

  <div class="game-wrapper">
    <div id="currentTurn">Team 1 (Red) &mdash; pick a column!</div>
    <div class="col-selector" id="colSelector"></div>
    <div class="connect4-board" id="board"></div>
    <div class="scoreboard">
      <div class="team-score" id="team1">Team 1 (Red)<br>0 wins</div>
      <div class="team-score" id="team2">Team 2 (Yellow)<br>0 wins</div>
    </div>
  </div>

  <script>
    const boardEl = document.getElementById('board');
    const currentTurnEl = document.getElementById('currentTurn');
    const ROWS = 6, COLS = 7;
    let board, currentPlayer, gameOver, playToEnd, wins, resetTimer;
    let qMode = 'screen', qPool = [], qIndex = 0, pendingCol = null, awaitingAnswer = false;
    let selectedUnit = null, gameStarted = false;

    function initState() {
      board = Array(ROWS).fill(null).map(() => Array(COLS).fill(null));
      currentPlayer = 'red'; gameOver = false;
      wins = { red: 0, yellow: 0 }; resetTimer = null;
      awaitingAnswer = false; pendingCol = null;
    }
    function updateActiveTeam() {
      document.getElementById('team1').classList.toggle('active', currentPlayer === 'red');
      document.getElementById('team2').classList.toggle('active', currentPlayer === 'yellow');
    }
    function createBoard() {
      boardEl.innerHTML = '';
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++) {
          const cell = document.createElement('div');
          cell.className = 'connect4-cell';
          cell.onclick = () => handleColClick(c);
          boardEl.appendChild(cell);
        }
      buildColSelector();
    }
    function buildColSelector() {
      const sel = document.getElementById('colSelector');
      sel.innerHTML = '';
      for (let c = 0; c < COLS; c++) {
        const btn = document.createElement('button');
        btn.textContent = c + 1; btn.className = 'col-btn';
        btn.onclick = () => handleColClick(c);
        sel.appendChild(btn);
      }
    }
    function highlightCol(col) {
      document.querySelectorAll('.col-btn').forEach((b, i) => b.classList.toggle('col-active', i === col));
      setTimeout(() => document.querySelectorAll('.col-btn').forEach(b => b.classList.remove('col-active')), 600);
    }
    function dropToken(col) {
      if (gameOver) return;
      collapseFilter();
      highlightCol(col);
      for (let r = ROWS - 1; r >= 0; r--) {
        if (!board[r][col]) {
          board[r][col] = currentPlayer;
          const cell = boardEl.children[r * COLS + col];
          const token = document.createElement('div');
          token.className = 'connect4-token ' + currentPlayer;
          cell.appendChild(token);
          requestAnimationFrame(() => token.style.transform = 'translateY(0)');
          const newLines = countNewLines(r, col);
          if (newLines > 0) {
            wins[currentPlayer] += newLines;
            updateScoreboard();
            if (!playToEnd) {
              gameOver = true;
              currentTurnEl.textContent = (currentPlayer === 'red' ? 'Team 1' : 'Team 2') + ' WINS! New game in 4 seconds...';
              if (resetTimer) clearTimeout(resetTimer);
              resetTimer = setTimeout(resetGame, 4000);
            } else {
              currentTurnEl.textContent = (currentPlayer === 'red' ? 'Team 1' : 'Team 2') +
                (newLines > 1 ? ' scores ' + newLines + ' lines!' : ' scores a line!') + ' Keep going!';
            }
          }
          if (playToEnd && isBoardFull()) {
            gameOver = true;
            const w = wins.red > wins.yellow ? 'Team 1 (Red)' : wins.yellow > wins.red ? 'Team 2 (Yellow)' : 'Nobody';
            currentTurnEl.textContent = 'Board full! ' + w + ' wins!';
          }
          if (!gameOver) {
            currentPlayer = currentPlayer === 'red' ? 'yellow' : 'red';
            currentTurnEl.textContent = (currentPlayer === 'red' ? 'Team 1 (Red)' : 'Team 2 (Yellow)') + ' \u2014 pick a column!';
            updateActiveTeam();
          }
          return;
        }
      }
      alert('Column full!');
    }
    function countNewLines(row, col) {
      const p = board[row][col], dirs = [[1,0],[0,1],[1,1],[1,-1]];
      let newLines = 0;
      for (const [dr, dc] of dirs) {
        let count = 1;
        for (let i=1;i<7;i++){const r=row+dr*i,c=col+dc*i;if(r>=0&&r<ROWS&&c>=0&&c<COLS&&board[r][c]===p)count++;else break;}
        for (let i=1;i<7;i++){const r=row-dr*i,c=col-dc*i;if(r>=0&&r<ROWS&&c>=0&&c<COLS&&board[r][c]===p)count++;else break;}
        if (count === 4) newLines++;
      }
      return newLines;
    }
    function isBoardFull() { return board[0].every(c => c !== null); }
    function updateScoreboard() {
      document.getElementById('team1').innerHTML = 'Team 1 (Red)<br>' + wins.red + ' line' + (wins.red !== 1 ? 's' : '');
      document.getElementById('team2').innerHTML = 'Team 2 (Yellow)<br>' + wins.yellow + ' line' + (wins.yellow !== 1 ? 's' : '');
    }
    function resetGame() {
      if (resetTimer) { clearTimeout(resetTimer); resetTimer = null; }
      initState(); createBoard();
      currentTurnEl.textContent = 'Team 1 (Red) \u2014 pick a column!';
      updateScoreboard(); updateActiveTeam(); hideQuestion();
      if (gameStarted) collapseFilter();
    }

    // ── Filter collapse / expand ───────────────────────────────────
    function collapseFilter() {
      gameStarted = true;
      document.getElementById('qf-panel').classList.add('collapsed');
      document.getElementById('qf-summary').classList.add('visible');
      updateSummaryBar();
    }
    function expandFilter() {
      document.getElementById('qf-panel').classList.remove('collapsed');
      document.getElementById('qf-summary').classList.remove('visible');
    }
    function startGame() { collapseFilter(); }
    function updateSummaryBar() {
      const el = document.getElementById('qf-summary-text');
      if (!qPool.length) { el.innerHTML = 'No questions \u2014 free play'; return; }
      const unitStr = selectedUnit && selectedUnit !== 'unlinked'
        ? 'L' + selectedUnit.level + '/U' + selectedUnit.unit + ' \u00b7 ' : '';
      const topics = [...new Set(qPool.map(q => q.topic))];
      const topicStr = topics.length === 1 ? topics[0] : topics.length + ' topics';
      el.innerHTML = unitStr + '<strong>' + qPool.length + ' questions</strong> \u00b7 ' + topicStr +
        ' \u00b7 ' + (qMode === 'teacher' ? 'Teacher reads' : 'On screen');
    }

    // ── Filter system ──────────────────────────────────────────────
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
      return a;
    }
    function buildUnitButtons() {
      const container = document.getElementById('qf-units');
      if (typeof window.QUESTIONS === 'undefined' || !window.QUESTIONS.length) {
        container.innerHTML = '<span class="qf-empty">questions.js not loaded</span>';
        return;
      }
      const unitMap = new Map();
      window.QUESTIONS.forEach(q => {
        if (q.level != null && q.unit != null) {
          const key = 'L' + q.level + '/U' + q.unit;
          if (!unitMap.has(key)) unitMap.set(key, { level: q.level, unit: q.unit });
        }
      });
      const hasUnlinked = window.QUESTIONS.some(q => q.level == null);
      container.innerHTML = '';
      [...unitMap.values()]
        .sort((a, b) => a.level !== b.level ? a.level - b.level : a.unit - b.unit)
        .forEach(({ level, unit }) => {
          const btn = document.createElement('button');
          btn.className = 'qf-unit-btn';
          btn.textContent = 'L' + level + '/U' + unit;
          btn.onclick = () => selectUnit(level, unit, btn);
          container.appendChild(btn);
        });
      if (hasUnlinked) {
        const btn = document.createElement('button');
        btn.className = 'qf-unit-btn';
        btn.textContent = '\u2014 Personal \u2014';
        btn.onclick = () => selectUnit('unlinked', null, btn);
        container.appendChild(btn);
      }
    }
    function selectUnit(level, unit, btnEl) {
      if (btnEl.classList.contains('active')) {
        btnEl.classList.remove('active');
        selectedUnit = null;
        document.getElementById('qf-topics').innerHTML = '<span class="qf-empty">Select a Level / Unit first</span>';
        document.getElementById('qf-lessons').innerHTML = '<span class="qf-empty">Select a Level / Unit first</span>';
        rebuildPool(); return;
      }
      document.querySelectorAll('.qf-unit-btn').forEach(b => b.classList.remove('active'));
      btnEl.classList.add('active');
      selectedUnit = level === 'unlinked' ? 'unlinked' : { level: parseInt(level), unit: parseInt(unit) };
      buildTopicsAndLessons();
    }
    function questionsForUnit() {
      if (!selectedUnit) return [];
      if (selectedUnit === 'unlinked') return window.QUESTIONS.filter(q => q.level == null);
      return window.QUESTIONS.filter(q => q.level === selectedUnit.level && q.unit === selectedUnit.unit);
    }
    function buildTopicsAndLessons() {
      const qs = questionsForUnit();
      const topicsEl = document.getElementById('qf-topics');
      const lessonsEl = document.getElementById('qf-lessons');
      const topics = [...new Set(qs.map(q => q.topic))].sort((a,b) => a.localeCompare(b, undefined, { numeric: true }));
      topicsEl.innerHTML = '';
      if (!topics.length) {
        topicsEl.innerHTML = '<span class="qf-empty">No topics found</span>';
      } else {
        topics.forEach(t => {
          const count = qs.filter(q => q.topic === t).length;
          const label = document.createElement('label');
          label.className = 'qf-check-label';
          const cb = document.createElement('input'); cb.type = 'checkbox'; cb.value = t;
          cb.addEventListener('change', rebuildPool);
          const span = document.createElement('span'); span.textContent = t;
          const cspan = document.createElement('span'); cspan.className = 'qf-count'; cspan.textContent = count;
          label.appendChild(cb); label.appendChild(span); label.appendChild(cspan);
          topicsEl.appendChild(label);
        });
      }
      const lessonNums = [...new Set(qs.filter(q => q.lesson != null).map(q => q.lesson))].sort((a,b) => a-b);
      lessonsEl.innerHTML = '';
      if (!lessonNums.length) {
        lessonsEl.innerHTML = '<span class="qf-empty">No lesson data</span>';
      } else {
        lessonNums.forEach(l => {
          const count = qs.filter(q => q.lesson === l).length;
          const label = document.createElement('label');
          label.className = 'qf-check-label';
          const cb = document.createElement('input'); cb.type = 'checkbox'; cb.value = l;
          cb.addEventListener('change', rebuildPool);
          const span = document.createElement('span'); span.textContent = 'Lesson ' + l;
          const cspan = document.createElement('span'); cspan.className = 'qf-count'; cspan.textContent = count;
          label.appendChild(cb); label.appendChild(span); label.appendChild(cspan);
          lessonsEl.appendChild(label);
        });
      }
      rebuildPool();
    }
    function rebuildPool() {
      const checkedTopics = [...document.querySelectorAll('#qf-topics input:checked')].map(i => i.value);
      const checkedLessons = [...document.querySelectorAll('#qf-lessons input:checked')].map(i => parseInt(i.value));
      const candidates = questionsForUnit();
      if (!checkedTopics.length && !checkedLessons.length) {
        qPool = [];
      } else {
        const seen = new Set();
        qPool = shuffle(candidates.filter(q => {
          const hit = (checkedTopics.length && checkedTopics.includes(q.topic)) ||
                      (checkedLessons.length && q.lesson != null && checkedLessons.includes(q.lesson));
          if (!hit || seen.has(q.question)) return false;
          seen.add(q.question); return true;
        }));
      }
      qIndex = 0;
      updateStatus();
    }
    function updateStatus() {
      const el = document.getElementById('qf-status');
      if (!qPool.length) {
        el.innerHTML = 'No questions selected \u2014 free play';
      } else {
        const topics = [...new Set(qPool.map(q => q.topic))];
        el.innerHTML = '<strong>' + qPool.length + ' questions</strong> ready \u2014 ' +
          (topics.length === 1 ? topics[0] : topics.length + ' topics');
      }
    }
    function setQMode(mode) {
      qMode = mode;
      document.getElementById('mode-screen').classList.toggle('active', mode === 'screen');
      document.getElementById('mode-teacher').classList.toggle('active', mode === 'teacher');
    }

    // ── Question display ───────────────────────────────────────────
    function handleColClick(col) {
      if (gameOver || awaitingAnswer) return;
      if (qPool.length > 0) { pendingCol = col; highlightCol(col); showQuestion(); }
      else dropToken(col);
    }
    function showQuestion() {
      const q = qPool[qIndex % qPool.length];
      if (!q) return;
      awaitingAnswer = true;
      collapseFilter();
      document.getElementById('question-panel').classList.add('visible');
      const teamName = currentPlayer === 'red' ? 'Team 1 (Red)' : 'Team 2 (Yellow)';
      document.getElementById('q-team-label').textContent = teamName + ' \u2014 answer correctly to claim column ' + (pendingCol + 1);
      document.getElementById('q-question').textContent = q.question;
      const optionsEl = document.getElementById('q-options');
      optionsEl.innerHTML = '';
      const allOpts = shuffle([q.answer, ...q.distractors]);
      if (qMode === 'screen') {
        allOpts.forEach(opt => {
          const btn = document.createElement('button');
          btn.className = 'q-option'; btn.textContent = opt;
          btn.onclick = () => handleOptionClick(btn, opt === q.answer, q.answer);
          optionsEl.appendChild(btn);
        });
        document.getElementById('reveal-btn').style.display = 'none';
        document.getElementById('correct-btn').style.display = 'none';
        document.getElementById('wrong-btn').style.display = 'none';
      } else {
        allOpts.forEach(opt => {
          const btn = document.createElement('button');
          btn.className = 'q-option'; btn.textContent = opt;
          btn.style.visibility = 'hidden';
          btn.dataset.correct = (opt === q.answer) ? '1' : '0';
          optionsEl.appendChild(btn);
        });
        document.getElementById('reveal-btn').style.display = 'inline-block';
        document.getElementById('correct-btn').style.display = 'inline-block';
        document.getElementById('wrong-btn').style.display = 'inline-block';
      }
      currentTurnEl.textContent = teamName + ' \u2014 answer to claim column ' + (pendingCol + 1) + '!';
    }
    function handleOptionClick(btn, isCorrect, correctAnswer) {
      document.querySelectorAll('.q-option').forEach(b => {
        b.classList.add('disabled');
        if (b.textContent === correctAnswer) b.classList.add('correct');
      });
      btn.classList.add(isCorrect ? 'correct' : 'wrong');
      setTimeout(() => questionResult(isCorrect), 1200);
    }
    function revealAnswer() {
      document.querySelectorAll('.q-option').forEach(btn => {
        btn.style.visibility = 'visible';
        if (btn.dataset.correct === '1') btn.classList.add('reveal');
      });
      document.getElementById('reveal-btn').style.display = 'none';
    }
    function questionResult(correct) {
      qIndex++;
      hideQuestion(); awaitingAnswer = false;
      if (correct && pendingCol !== null) { const col = pendingCol; pendingCol = null; dropToken(col); }
      else {
        pendingCol = null;
        currentPlayer = currentPlayer === 'red' ? 'yellow' : 'red';
        currentTurnEl.textContent = (currentPlayer === 'red' ? 'Team 1 (Red)' : 'Team 2 (Yellow)') + ' \u2014 pick a column!';
        updateActiveTeam();
      }
    }
    function hideQuestion() {
      document.getElementById('question-panel').classList.remove('visible');
      document.getElementById('q-options').innerHTML = '';
    }

    // ── Controls ───────────────────────────────────────────────────
    document.getElementById('redBtn').onclick = () => { if (!gameOver && !awaitingAnswer) { currentPlayer='red'; currentTurnEl.textContent='Team 1 (Red) \u2014 pick a column!'; updateActiveTeam(); } };
    document.getElementById('yellowBtn').onclick = () => { if (!gameOver && !awaitingAnswer) { currentPlayer='yellow'; currentTurnEl.textContent='Team 2 (Yellow) \u2014 pick a column!'; updateActiveTeam(); } };
    document.getElementById('playToEnd').onclick = () => {
      playToEnd = !playToEnd;
      if (resetTimer) { clearTimeout(resetTimer); resetTimer = null; }
      document.getElementById('playToEnd').textContent = playToEnd ? 'First to 4 Mode' : 'Play to End Mode';
    };
    document.getElementById('newBoard').onclick = resetGame;
    document.getElementById('fullscreen').onclick = () => document.documentElement.requestFullscreen?.();
    document.getElementById('home').onclick = () => window.location.href = '../index.html';

    playToEnd = false;
    initState(); createBoard(); updateScoreboard(); updateActiveTeam();
    window.addEventListener('load', buildUnitButtons);
  </script>

  <script src="../questions.js"></script>
</body>
</html>
